  return '<div style="background:var(--card);border:1.5px solid '+(low?'var(--amber)':'var(--border)')+';border-radius:var(--r);padding:12px;transition:.15s"'+
    ' onmouseover="this.style.boxShadow=\'0 4px 16px rgba(0,0,0,.08)\'" onmouseout="this.style.boxShadow=\'\'">'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px">'+
      '<div>'+
        '<div style="font-size:13px;font-weight:700">'+p.name+'</div>'+
        '<div style="display:inline-flex;align-items:center;gap:3px;background:'+ht.bg+';color:'+ht.color+';border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700;margin-top:3px">'+ht.l+'</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:20px;font-weight:900;color:'+(p.quantity===0?'var(--red)':low?'var(--amber)':'var(--ink)')+'">'+p.quantity+'</div>'+
        '<div style="font-size:9px;color:var(--ink-l)">'+(p.unit||'бр')+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px">'+
      '<div style="background:var(--bg);border-radius:6px;padding:6px;text-align:center">'+
        '<div style="font-size:11px;font-weight:800;color:var(--red)">'+(p.cost_price>0?eur(p.cost_price):'—')+'</div>'+
        '<div style="font-size:8px;color:var(--ink-l);font-weight:700;margin-top:1px">СЕБЕСТ.</div>'+
      '</div>'+
      '<div style="background:var(--bg);border-radius:6px;padding:6px;text-align:center">'+
        '<div style="font-size:11px;font-weight:800;color:var(--green)">'+(p.price>0?eur(p.price):'—')+'</div>'+
        '<div style="font-size:8px;color:var(--ink-l);font-weight:700;margin-top:1px">ЦЕНА</div>'+
      '</div>'+
      '<div style="background:var(--bg);border-radius:6px;padding:6px;text-align:center">'+
        '<div style="font-size:11px;font-weight:800;color:'+(margin>=50?'var(--green)':margin>=30?'var(--amber)':'var(--red)')+'">'+margin+'%</div>'+
        '<div style="font-size:8px;color:var(--ink-l);font-weight:700;margin-top:1px">МАРЖ</div>'+
      '</div>'+
    '</div>'+
    (p.production_hours?'<div style="font-size:10px;color:var(--ink-m);margin-bottom:6px">⏱ '+p.production_hours+'ч за бр.</div>':'')+
    (p.expiry_days?'<div style="font-size:10px;color:var(--amber);margin-bottom:6px">📅 Срок: '+p.expiry_days+' дни</div>':'')+
    '<div style="display:flex;gap:4px">'+
      '<button class="btn btn-primary btn-xs" style="flex:1" onclick="quickMov(\''+p.id+'\')">+ Зареди</button>'+
      '<button class="icon-btn" onclick="openHandmadeModal(\''+p.id+'\')">✏️</button>'+
      '<button class="icon-btn danger" onclick="delProduct(\''+p.id+'\')">🗑</button>'+

    </div>
  </div>`;
  m.addEventListener('click', function(e){ if(e.target===m) cm('mod-handmade'); });

  ['mhm-cost','mhm-time','mhm-rate','mhm-price'].forEach(function(id){

    if (inp) inp.addEventListener('input', updateHMRealCost);

function updateHMRealCost() {
  var cost  = +document.getElementById('mhm-cost')?.value||0;
  var mins  = +document.getElementById('mhm-time')?.value||0;
  var rate  = +document.getElementById('mhm-rate')?.value||15;
  var price = +document.getElementById('mhm-price')?.value||0;
  var laborCost = (mins/60)*rate;
  var realCost  = cost + laborCost;
  var rec       = realCost * 2.5;
  var margin    = price>0 ? Math.round((1-realCost/price)*100) : 0;
  var div = document.getElementById('mhm-real-cost');
  if (div) div.style.display = realCost>0 ? 'block' : 'none';
  var rc = document.getElementById('mhm-rc-val');
  var rv = document.getElementById('mhm-rec-val');
  var rm = document.getElementById('mhm-margin-val');
  if (rc) rc.textContent = eur(realCost);
  if (rv) rv.textContent = eur(rec);
  if (rm) { rm.textContent = margin+'%'; rm.style.color = margin>=50?'var(--green)':margin>=30?'var(--amber)':'var(--red)'; }
}

function openHandmadeModal(id) {
  id = id||null;
  buildHandmadeModal();
  editId.handmade = id;
  var p = id ? S.products.find(function(x){ return x.id===id; }) : null;
  document.getElementById('mhm-title').textContent = id ? 'Редактирай handmade' : 'Нов Handmade продукт';
  document.getElementById('mhm-name').value    = p ? p.name : '';
  document.getElementById('mhm-type').value    = p ? (p.handmade_type||'candle') : 'candle';

  document.getElementById('mhm-unit').value    = p ? (p.unit||'бр') : 'бр';

  document.getElementById('mhm-rate').value    = p ? (p.hourly_rate||15) : 15;
  document.getElementById('mhm-expiry').value  = p ? (p.expiry_days||0) : 0;

async function saveHandmadeProduct() {
  var name = document.getElementById('mhm-name').value.trim();
  if (!name) { toast('Въведи наименование', 'err'); return; }
  var payload = {
    name: name,
    product_type:       'handmade',
    handmade_type:       document.getElementById('mhm-type').value,
    quantity:           +document.getElementById('mhm-qty').value||0,
    min_quantity:       +document.getElementById('mhm-min').value||5,
    unit:                document.getElementById('mhm-unit').value,
    cost_price:         +document.getElementById('mhm-cost').value||0,
    price:              +document.getElementById('mhm-price').value||0,
    production_minutes: +document.getElementById('mhm-time').value||0,
    hourly_rate:        +document.getElementById('mhm-rate').value||15,
    expiry_days:        +document.getElementById('mhm-expiry').value||0,
    image_url:           document.getElementById('mhm-img').value.trim()||null,
    notes:               document.getElementById('mhm-notes').value.trim()||null,
    status: 'available'
  };
  if (editId.handmade) await db.from('products').update(payload).eq('id', editId.handmade);
  else                 await db.from('products').insert(payload);
  await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
  cm('mod-handmade');
  toast('Продуктът е записан ✅', 'ok');
  go(curPage);
}

    setTimeout(function(){
      hmProds.forEach(function(p,i){
        var inp = document.getElementById('batch-qty-'+i);
        if (inp) inp.addEventListener('input', function(){
          var qty  = +this.value||0;
          var mins = +this.dataset.mins||0;
          var td   = document.getElementById('batch-time-'+i);
          if (td) td.textContent = qty>0 ? (qty*mins)+'мин' : '—';
          updateBatchTotal();
        });
      });
    }, 50);
  }
  om('mod-batch');
}

function updateBatchTotal() {
  var inputs = document.querySelectorAll('[id^="batch-qty-"]');
  var totalMins = 0, totalItems = 0;
  inputs.forEach(function(inp){
    var qty  = +inp.value||0;
    var mins = +inp.dataset.mins||0;
    totalMins  += qty * mins;
    totalItems += qty;
  });
  var el = document.getElementById('batch-total');
  if (el && totalItems>0) {
    var h = Math.floor(totalMins/60), m2 = totalMins%60;
    el.textContent = '📦 ' + totalItems + ' бр. · ⏱ ' + (h>0?h+'ч ':'')+m2+'мин производство';
  }
}

async function confirmBatchProduction() {
  var inputs = document.querySelectorAll('[id^="batch-qty-"]');
  var updates = [];
  inputs.forEach(function(inp){
    var qty = +inp.value||0;
    if (qty>0) updates.push({ id: inp.dataset.id, qty: qty });
  });
  if (!updates.length) { toast('Въведи количества', 'err'); return; }
  for (var u of updates) {
    var p = S.products.find(function(x){ return x.id===u.id; });
    if (!p) continue;
    var newQty = (p.quantity||0) + u.qty;
    await db.from('products').update({ quantity: newQty }).eq('id', u.id);
    await db.from('movements').insert({ product_id: u.id, type:'in', quantity:u.qty, note:'Партидно производство' });
  }
  await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
  await dbLoad('movements','movements','created_at','*,products(name,unit)',{asc:false,limit:200});
  cm('mod-batch');
  toast('Производството е записано ✅ — '+updates.length+' продукта обновени', 'ok');
  go(curPage);
}

function showCreativeSuggestions(hours) {
  var h = hours==='full' ? 8 : +hours;
  var td = today();
  var hmProds = S.products.filter(function(p){ return p.product_type==='handmade'; });
  var lowHm   = hmProds.filter(function(p){ return p.quantity<=(p.min_quantity||0); }).sort(function(a,b){
    return (a.quantity-(a.min_quantity||0)) - (b.quantity-(b.min_quantity||0));
  });
  var themes80 = S.themes.filter(function(t){
    return (t.studio_status==='ready80'||t.studio_status==='developing') && (t.production_hours||0)<=h;
  });

  var suggestions = [];
  var remainingH  = h;

  // Предложение 1 — попълни ниски запаси
  if (lowHm.length>0) {
    var p = lowHm[0];
    var batchQty = Math.min(20, Math.floor(remainingH*60/(p.production_minutes||30)));
    if (batchQty>0) {
      suggestions.push({
        ico:'📦', color:'var(--amber)', bg:'var(--amber-l)',
        title: 'Попълни: '+p.name,
        desc: 'Имаш '+p.quantity+' бр., минимум '+( p.min_quantity||0)+'. Направи '+batchQty+' бр. сега.',
        time: batchQty*(p.production_minutes||30),
        action: 'openBatchProductionModal()'
      });
      remainingH -= batchQty*(p.production_minutes||30)/60;
    }
  }

  // Предложение 2 — довърши тема
  if (themes80.length>0 && remainingH>0) {
    var t = themes80[0];
    suggestions.push({
      ico:'🎨', color:'var(--rose-d)', bg:'var(--rose-l)',
      title: 'Довърши тема: '+t.name,
      desc: 'Нужни '+(t.production_hours||0)+'ч. производство — визуализацията е готова!',
      time: (t.production_hours||0)*60,
      action: 'go(\'themeStudio\')'
    });
    remainingH -= t.production_hours||0;
  }

  // Предложение 3 — ако остава време
  if (remainingH >= 1) {
    suggestions.push({
      ico:'✍️', color:'var(--blue)', bg:'var(--blue-l)',
      title: 'Canva визуализация',
      desc: 'Имаш '+remainingH.toFixed(1)+'ч. — перфектно за нов дизайн в Canva.',
      time: remainingH*60,
      action: 'window.open(\'https://www.canva.com\',\'_blank\')'
    });
  }

  var el = document.getElementById('creative-suggestions');
  if (!el) return;
  el.innerHTML = '<div class="sdiv" style="margin-bottom:10px">💡 Предложен план за '+( hours==='full'?'целия ден':hours+' ч.')+'</div>'+
    suggestions.map(function(s,i){
      var hStr = Math.floor(s.time/60)>0 ? Math.floor(s.time/60)+'ч ' : '';
      var mStr = s.time%60>0 ? (s.time%60)+'мин' : '';
      return '<div style="background:'+s.bg+';border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px">'+
        '<div style="font-size:32px;flex-shrink:0">'+s.ico+'</div>'+
        '<div style="flex:1">'+
          '<div style="font-size:14px;font-weight:700;color:'+s.color+'">'+( i+1)+'. '+s.title+'</div>'+
          '<div style="font-size:12px;color:var(--ink-m);margin-top:2px">'+s.desc+'</div>'+
          '<div style="font-size:11px;color:var(--ink-l);margin-top:3px">⏱ '+hStr+mStr+'</div>'+
        '</div>'+
        '<button onclick="'+s.action+'" class="btn btn-secondary btn-sm" style="flex-shrink:0">Започни →</button>'+
      '</div>';
    }).join('') ||
    '<div class="empty-state" style="padding:20px"><p>Всичко е наред!</p><small>Нямаш спешни задачи за творческото време</small></div>';
}

        var occ    = MONTH_OCCASIONS[i]||[];
        var sColor = SEASON_COLORS[season]||'#c9748a';
        var key    = String(seasonYear)+'-'+String(i+1).padStart(2,'0');
        var isCur  = key === td.slice(0,7);
        var isPast = key < td.slice(0,7);

        // Теми подходящи за месеца
        var relevantThemes = S.themes.filter(function(t){
          return t.is_public && (t.season===season || t.season==='Целогодишна' || !t.season);
        }).length;

        var tip = '';
        if (i===0||i===1)  tip='🎄 Подгответи зимни теми от Ноември';
        else if (i===2)    tip='🌸 Стартирай пролетни теми';

        else if (i===8||i===9) tip='🏢 Корпоративни клиенти';
        else if (i===10)   tip='🎁 Коледни декорации — подгответи се рано';
        else               tip='✅ Стандартен месец';

        return '<tr style="background:'+(isCur?'var(--rose-ll)':isPast?'var(--bg)':'var(--card)')+'">' +
          '<td style="font-weight:'+(isCur?'700':'400')+'">'+MONTHS_BG[i]+(isCur?' ◀':'')+' </td>'+
          '<td><span style="background:'+sColor+'30;color:'+sColor+';border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700">'+season+'</span></td>'+
          '<td style="font-size:11px;color:var(--ink-m)">'+occ.join(' · ')+'</td>'+
          '<td style="font-size:11px">'+(relevantThemes>0?'🎨 '+relevantThemes+' теми':'—')+'</td>'+
          '<td style="font-weight:700;color:'+(rev>0?'var(--green)':'var(--ink-l)')+'">'+( rev>0?eur0(rev):'—')+'</td>'+

          '<td style="font-size:10px;color:var(--ink-m);font-style:italic">'+tip+'</td>'+
        '</tr>';
      }).join('')}
      </tbody></table>
    </div>
  </div>`;
};

function calcSignCost() {
  var h  = +document.getElementById('hr-sign-h')?.value||5;
  var r  = +document.getElementById('hr-sign-rate')?.value||15;
  var m  = +document.getElementById('hr-sign-mat')?.value||3;
  var cr = +document.getElementById('hr-sign-cricut')?.value||2;
  var realCost = h*r + m + cr;
  var rec      = realCost * 1.8;
  var curr     = 15;
  var el = document.getElementById('hr-sign-result');
  if (!el) return;
  el.innerHTML =
    '<div style="text-align:center;margin-bottom:12px">'+
      '<div style="font-size:10px;color:var(--ink-m)">Реална себестойност</div>'+
      '<div style="font-size:32px;font-weight:900;color:var(--red)">'+eur(realCost)+'</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'+
      '<div style="background:#fff;border-radius:7px;padding:8px;text-align:center">'+
        '<div style="font-size:10px;color:var(--ink-m)">Препоръчана цена</div>'+
        '<div style="font-size:18px;font-weight:800;color:var(--amber)">'+eur(rec)+'</div>'+
      '</div>'+
      '<div style="background:#fff;border-radius:7px;padding:8px;text-align:center">'+
        '<div style="font-size:10px;color:var(--ink-m)">Текуща цена</div>'+
        '<div style="font-size:18px;font-weight:800;color:var(--red)">€'+curr+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="background:var(--red-l);border-radius:7px;padding:8px;text-align:center">'+
      '<div style="font-size:11px;color:var(--red);font-weight:700">'+
        '⚠️ Губиш '+eur(realCost-curr)+' на всеки надпис!'+
      '</div>'+
      '<div style="font-size:10px;color:var(--red);margin-top:2px">'+
        'При '+eur(rec)+' ще работиш за '+eur(r)+'/ч — справедливо!'+
      '</div>'+
    '</div>';
}

function openViralTrackModal() {
  var m = document.getElementById('mod-viral');
  if (!m) {
    m = document.createElement('div');
    m.id = 'mod-viral'; m.className = 'overlay';
    m.innerHTML = `<div class="modal" style="width:440px">
      <div class="modal-hdr"><h3>🔗 Запиши препоръка</h3><button class="close-btn" onclick="cm('mod-viral')">×</button></div>
      <div class="fg"><label>Кой препоръча? (посланикът)</label><select id="mv-from"></select></div>
      <div class="fg"><label>Кого препоръча? (новият клиент)</label><select id="mv-to"></select></div>
      <div class="fg"><label>Дата на препоръката</label>
        <input type="date" id="mv-date" value="${today()}">
      </div>
      <div class="fg"><label>Бележка</label>
        <input id="mv-note" placeholder="По какъв повод, как се запознаха...">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="cm('mod-viral')">Отказ</button>
        <button class="btn btn-primary" onclick="saveViralReferral()">Запази</button>
      </div>
    </div>`;
    m.addEventListener('click', function(e){ if(e.target===m) cm('mod-viral'); });
    document.body.appendChild(m);
  }
  fillSel('mv-from', S.clients, function(c){return c.id;}, function(c){return c.name;});
  fillSel('mv-to',   S.clients, function(c){return c.id;}, function(c){return c.name;});
  om('mod-viral');
}

async function saveViralReferral() {
  var fromId = document.getElementById('mv-from').value;
  var toId   = document.getElementById('mv-to').value;
  if (!fromId||!toId||fromId===toId) { toast('Избери различни клиенти', 'err'); return; }
  var fromClient = S.clients.find(function(c){ return c.id===fromId; });
  if (!fromClient) return;
  await db.from('clients').update({ referral_count: (fromClient.referral_count||0)+1 }).eq('id', fromId);
  await db.from('clients').update({ referred_by: fromId }).eq('id', toId);
  await dbLoad('clients','clients','name');
  cm('mod-viral');
  toast('Препоръката е записана ✅', 'ok');
  go('viral');
}

async function duplicateQuote(qid) {
  var q = S.quotes.find(function(x){ return x.id===qid; });
  if (!q) return;
  if (!confirm('Копирай офертата за нова дата?')) return;
  var payload = {
    client_id:       q.client_id,
    event_type:      q.event_type,
    event_date:      null,
    event_time:      q.event_time,
    address:         q.address,
    guests:          q.guests,
    has_delivery:    q.has_delivery,
    has_assembly:    q.has_assembly,
    has_disassembly: q.has_disassembly,
    delivery_price:  q.delivery_price,
    total_price:     q.total_price,
    total_cost:      q.total_cost,
    deposit_amount:  q.deposit_amount,
    notes:           q.notes,
    status:          'draft'
  };
  var res = await db.from('quotes').insert(payload).select().single();
  var newId = res.data?.id;
  if (newId && q.quote_items?.length) {
    await db.from('quote_items').insert(q.quote_items.map(function(i){
      return { quote_id:newId, product_id:i.product_id, description:i.description,
               section:i.section, quantity:i.quantity, unit_price:i.unit_price, cost_price:i.cost_price };
    }));
  }
  await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});

}

var BG_MONTHS = ['януари','февруари','март','април','май','юни',
                 'юли','август','септември','октомври','ноември','декември'];
var BG_MONTHS_SHORT = ['яну','фев','мар','апр','май','юни','юли','авг','сеп','окт','ное','дек'];
var BG_DAYS = ['нед','пон','вто','сря','чет','пет','съб'];

function fmtDateBG(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  return d.getDate() + ' ' + BG_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function fmtDateShortBG(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  return d.getDate() + ' ' + BG_MONTHS_SHORT[d.getMonth()];
}

function fmtTimeBG(timeStr) {
  if (!timeStr) return '';
  // Осигуряваме 24-часов формат HH:MM
  var parts = timeStr.split(':');
  if (parts.length >= 2) return parts[0].padStart(2,'0') + ':' + parts[1].padStart(2,'0') + 'ч';

}

function daysFromBG(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr + 'T00:00:00');

var _origProcessTemuPDF = window.processTemuPDF;
window.processTemuPDF = async function(file) {
  var status = document.getElementById('temu-status');
  var statusText = document.getElementById('temu-status-text');
  if (status) { status.style.display='flex'; status.className='alert blue'; }
  if (statusText) statusText.textContent = '🔄 Чета PDF файла...';

  try {
    var base64 = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() {
        var result = reader.result;
        var b64 = result.indexOf(',') !== -1 ? result.split(',')[1] : result;
        resolve(b64);
      };
      reader.onerror = function() { reject(new Error('Грешка при четене на файла')); };
      reader.readAsDataURL(file);
    });

    if (statusText) statusText.textContent = '🤖 Claude анализира поръчката...';

    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'document',
              source: { type: 'base64', media_type: 'application/pdf', data: base64 }
            },
            {
              type: 'text',
              text: 'Това е фактура или поръчка от онлайн магазин (Temu, Shein или друг).\n\nИзвлечи ВСИЧКИ артикули и върни САМО валиден JSON масив без markdown:\n[\n  {\n    "name": "кратко наименование на BG (макс 60 символа)",\n    "name_original": "оригинално наименование",\n    "quantity": 1,\n    "unit": "бр",\n    "price_eur": 10.95,\n    "category": "Покривала за арки или Балони или Декорации или Консумативи или Производство или Фигури или Осветление или Друго",\n    "supplier": "Temu",\n    "size": "размер ако е посочен",\n    "order_id": "номер на поръчката ако има",\n    "order_date": "дата YYYY-MM-DD ако има"\n  }\n]\n\nВАЖНО: Върни САМО JSON масив. Нищо друго.'
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      var errData = await response.json().catch(function(){ return {}; });
      throw new Error('API грешка: ' + (errData.error?.message || response.status));
    }

    var data = await response.json();
    var text = (data.content||[]).map(function(c){ return c.text||''; }).join('');

    // Почистваме текста
    var clean = text.trim();
    clean = clean.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();

    var items;
    try {
      items = JSON.parse(clean);
    } catch(e1) {
      // Опит за извличане на JSON масив
      var match = clean.match(/\[[\s\S]*\]/);
      if (match) {
        try { items = JSON.parse(match[0]); }
        catch(e2) { throw new Error('Не мога да разпарсна отговора от Claude'); }
      } else {
        throw new Error('Невалиден JSON отговор');
      }
    }

    if (!Array.isArray(items) || items.length === 0) {
      throw new Error('Не намерих артикули в документа');
    }

    window.importItems = items.map(function(item, i) {
      return Object.assign({ _id:'imp_'+i, _selected:true }, item);
    });

    if (status) status.className = 'alert green';
    if (statusText) statusText.textContent = '✅ Разпознах ' + importItems.length + ' артикула!';

    if (typeof renderImportResults === 'function') renderImportResults(file.name);
    if (typeof saveImportHistory === 'function') saveImportHistory(file.name, importItems.length, importItems[0]?.order_id);

  } catch(e) {
    console.error('Temu PDF error:', e);
    if (status) status.className = 'alert red';
    if (statusText) statusText.textContent = '❌ ' + e.message;
    toast('PDF грешка: ' + e.message, 'err');
  }
};

function formatDateBG(dateStr) {
  if (!dateStr) return '—';
  var d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yyyy = d.getFullYear();
  return dd + '/' + mm + '/' + yyyy;
}

function formatTimeBG(timeStr) {
  if (!timeStr) return '';
  var parts = timeStr.split(':');
  return parts[0].padStart(2,'0') + ':' + (parts[1]||'00').padStart(2,'0');

// ── 8. Gemar Excel импорт ─────────────────────────────────────
window.handleGemarExcelImport = async function(file) {
  var status = document.getElementById('temu-status');
  var statusText = document.getElementById('temu-status-text');
  if (status) { status.style.display='flex'; status.className='alert blue'; }
  if (statusText) statusText.textContent = '📊 Чета Gemar Excel...';

  try {
    var arrayBuffer = await file.arrayBuffer();
    var data = new Uint8Array(arrayBuffer);

    // Използваме SheetJS ако е наличен
    if (typeof XLSX === 'undefined') {
      // Зареждаме SheetJS динамично
      await new Promise(function(resolve, reject){
        var script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    var workbook = XLSX.read(data, { type: 'array' });
    // Търсим лист "Моят Инвентар"
    var sheetName = workbook.SheetNames.find(function(n){
      return n.toLowerCase().includes('инвент') || n.toLowerCase().includes('inventar');
    }) || workbook.SheetNames[1] || workbook.SheetNames[0];

    var sheet = workbook.Sheets[sheetName];
    var rows  = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });

    // Намираме header row (търсим "Налично" или "Артикул")
    var headerRow = -1;
    for (var i=0; i<Math.min(rows.length,10); i++) {
      var r = rows[i];
      if (r.some(function(c){ return String(c).toLowerCase().includes('налич') || String(c).toLowerCase().includes('арти'); })) {
        headerRow = i; break;
      }
    }
    if (headerRow < 0) { throw new Error('Не намерих хедър ред в Excel файла'); }

    var headers = rows[headerRow].map(function(h){ return String(h).trim().toLowerCase(); });
    var colLine   = headers.findIndex(function(h){ return h.includes('лини'); });
    var colCode   = headers.findIndex(function(h){ return h.includes('код'); });
    var colColor  = headers.findIndex(function(h){ return h.includes('цвят') && !h.includes('hex') && !h.includes('◼'); });
    var colArt    = headers.findIndex(function(h){ return h.includes('артик'); });
    var colSize   = headers.findIndex(function(h){ return h.includes('разм'); });
    var colPrice  = headers.findIndex(function(h){ return h.includes('цена') && h.includes('бр'); });
    var colQty    = headers.findIndex(function(h){ return h.includes('налич') || h.includes('⭐'); });

    var items = [];
    for (var j=headerRow+1; j<rows.length; j++) {
      var row = rows[j];
      if (!row || !row[colArt]) continue;
      var artVal = String(row[colArt]||'').trim();
      if (!artVal || artVal.toLowerCase().includes('арти')) continue;

      var qty = parseFloat(String(row[colQty]||'0').replace(',','.')) || 0;
      if (qty <= 0) continue; // Само с налични бройки

      var colorVal = colColor>=0 ? String(row[colColor]||'').split('/')[0].trim() : '';
      var codeVal  = colCode>=0  ? String(row[colCode]||'').trim() : '';
      var lineVal  = colLine>=0  ? String(row[colLine]||'').trim() : 'Gemar';
      var priceVal = colPrice>=0 ? parseFloat(String(row[colPrice]||'0').replace(',','.')) || 0 : 0;
      var sizeVal  = colSize>=0  ? String(row[colSize]||'').trim() : '';

      var name = [artVal, codeVal, colorVal, sizeVal].filter(Boolean).join(' · ');

      items.push({
        _id:        'gemar_'+j,
        _selected:  true,
        name:       name,
        quantity:   qty,
        unit:       'бр',
        price_eur:  priceVal,
        category:   'Балони · ' + lineVal,
        supplier:   'Gemar / Ukrasi.com',
        image_url:  '',
        name_original: name,
        order_date: new Date().toISOString().slice(0,10),
      });
    }

    if (items.length === 0) {
      throw new Error('Не намерих артикули с налично > 0. Попълни колоната "⭐ Налично" в Excel-а.');
    }

    window.importItems = items;
    if (status) status.className = 'alert green';
    if (statusText) statusText.textContent = '✅ Намерих ' + items.length + ' артикула с налични бройки!';
    if (typeof renderImportResults === 'function') renderImportResults(file.name);
    toast('Gemar импорт: ' + items.length + ' артикула ✅', 'ok');

  } catch(e) {
    console.error('Gemar import error:', e);
    if (status) status.className = 'alert red';
    if (statusText) statusText.textContent = '❌ ' + e.message;
    toast('Грешка: ' + e.message, 'err');
  }
};

              <input type="number" id="qa-w" min="0" step="0.1" placeholder="0" style="flex:1">
              <select id="qa-w-unit" style="width:56px;padding:6px 4px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;background:var(--card);color:var(--ink)">
                ${SIZE_UNITS.map(function(u){ return '<option>'+u+'</option>'; }).join('')}

            </div>
          </div>
          <div class="fg" style="margin:0">
            <label>Дълбочина</label>
            <div style="display:flex;gap:4px">
              <input type="number" id="qa-d" min="0" step="0.1" placeholder="0" style="flex:1">
              <select id="qa-d-unit" style="width:56px;padding:6px 4px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;background:var(--card);color:var(--ink)">
                ${SIZE_UNITS.map(function(u){ return '<option>'+u+'</option>'; }).join('')}
              </select>
            </div>
          </div>
        </div>

        <div class="fr">
          <div class="fg">
            <label>Тежест</label>
            <div style="display:flex;gap:6px">
              <input type="number" id="qa-weight" min="0" step="0.01" placeholder="0" style="flex:1">
              <select id="qa-weight-unit" style="width:60px;padding:8px 6px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:13px;background:var(--card);color:var(--ink)">
                ${WEIGHT_UNITS.map(function(u){ return '<option>'+u+'</option>'; }).join('')}
              </select>
            </div>
          </div>
          <div class="fg">
            <label>Локация в склада</label>
            <input id="qa-location" placeholder="Напр. Кутия А3 · Рафт 2 · Чекмедже розово">
          </div>
        </div>
      </div>

      <!-- ФИНАНСОВИ -->
      <div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:var(--rose-d);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px">💶 Цени <span style="font-weight:400;color:var(--ink-l);text-transform:none;font-size:11px">(незадължително)</span></div>

        <div class="fr">
          <div class="fg">
            <label>Себестойност (€/бр)</label>
            <input type="number" id="qa-cost" value="0" min="0" step="0.01" oninput="updateQAMargin()">
          </div>
          <div class="fg">
            <label>Продажна цена (€/бр)</label>
            <input type="number" id="qa-price" value="0" min="0" step="0.01" oninput="updateQAMargin()">
          </div>
        </div>

        <div id="qa-margin-display" style="display:none;background:var(--bg);border-radius:var(--r-sm);padding:8px 12px;font-size:12px">
          Марж: <strong id="qa-margin-val" style="color:var(--green)">0%</strong>
          · Печалба/бр: <strong id="qa-profit-val" style="color:var(--green)">€0</strong>
        </div>

        <div class="fg" style="margin-top:10px">
          <label>Снимка (URL)</label>
          <input id="qa-image" placeholder="https://..." oninput="updateQAImagePreview()">
          <div id="qa-img-preview" style="margin-top:6px"></div>
        </div>
      </div>

      <!-- БУТОНИ -->
      <div style="display:flex;gap:10px;margin-bottom:30px">
        <button class="btn btn-secondary" onclick="go('inventory')" style="flex:1">Отказ</button>
        <button class="btn btn-secondary" onclick="saveQuickAdd(false)" style="flex:1">💾 Запази и добави още</button>
        <button class="btn btn-primary" onclick="saveQuickAdd(true)" style="flex:2">✅ Запази и виж инвентара</button>
      </div>

    </div>
  </div>`;
};

function updateQAMargin() {
  var cost  = +document.getElementById('qa-cost')?.value||0;
  var price = +document.getElementById('qa-price')?.value||0;
  var div   = document.getElementById('qa-margin-display');
  var mval  = document.getElementById('qa-margin-val');
  var pval  = document.getElementById('qa-profit-val');
  if (!div) return;
  if (cost > 0 || price > 0) {
    div.style.display = 'block';
    var margin = price>0&&cost>0 ? Math.round((1-cost/price)*100) : 0;
    var profit = price - cost;
    if (mval) { mval.textContent = margin+'%'; mval.style.color = margin>=50?'var(--green)':margin>=30?'var(--amber)':'var(--red)'; }
    if (pval) { pval.textContent = '€'+profit.toFixed(2); pval.style.color = profit>=0?'var(--green)':'var(--red)'; }
  } else {
    div.style.display = 'none';
  }
}

function updateQAImagePreview() {
  var url  = document.getElementById('qa-image')?.value.trim();
  var prev = document.getElementById('qa-img-preview');
  if (!prev) return;
  if (url) {
    prev.innerHTML = '<img src="'+url+'" style="width:100%;max-height:160px;object-fit:cover;border-radius:var(--r-sm)" onerror="this.style.display=\'none\'">';
  } else {
    prev.innerHTML = '';
  }
}

async function saveQuickAdd(navigateAfter) {
  var name = document.getElementById('qa-name')?.value.trim();
  if (!name) { toast('Въведи наименование', 'err'); return; }

  var cat  = document.getElementById('qa-cat')?.value;
  var qty  = +document.getElementById('qa-qty')?.value||0;
  var unit = document.getElementById('qa-unit')?.value||'бр';

  // Събираме размерите като notes допълнение
  var h    = document.getElementById('qa-h')?.value;
  var hu   = document.getElementById('qa-h-unit')?.value||'см';
  var w    = document.getElementById('qa-w')?.value;
  var wu   = document.getElementById('qa-w-unit')?.value||'см';
  var d    = document.getElementById('qa-d')?.value;
  var du   = document.getElementById('qa-d-unit')?.value||'см';
  var wt   = document.getElementById('qa-weight')?.value;
  var wtu  = document.getElementById('qa-weight-unit')?.value||'г';
  var loc  = document.getElementById('qa-location')?.value.trim()||null;

  var dims = [];
  if (h) dims.push('В:'+h+hu);
  if (w) dims.push('Ш:'+w+wu);
  if (d) dims.push('Д:'+d+du);
  if (wt) dims.push('Тегло:'+wt+wtu);
  var dimsStr = dims.length > 0 ? ' · Размери: '+dims.join(' × ') : '';

  var colorName  = document.getElementById('qa-color-name')?.value.trim()||null;
  var series     = document.getElementById('qa-series')?.value||null;
  var gemarCode  = document.getElementById('qa-gemar-code')?.value.trim()||null;
  var baseNotes  = document.getElementById('qa-notes')?.value.trim()||'';
  var extraNotes = [colorName?'Цвят: '+colorName:'', series?'Серия: '+series:'', gemarCode?'Gemar: '+gemarCode:'', dimsStr].filter(Boolean).join(' · ');
  var finalNotes = [extraNotes, baseNotes].filter(Boolean).join('\n') || null;

  var supId = document.getElementById('qa-supplier')?.value||null;
  // Ако е текстов доставчик (temu/gemar...) → null за supplier_id
  var knownSups = S.suppliers.map(function(s){return s.id;});
  var supplierId = knownSups.includes(supId) ? supId : null;

  // Намираме category_id по name
  var catObj = S.categories.find(function(c){ return cat && c.name && cat.includes(c.name); });

  var payload = {
    name:         name,
    quantity:     qty,
    unit:         unit,
    min_quantity: +document.getElementById('qa-min')?.value||0,
    cost_price:   +document.getElementById('qa-cost')?.value||0,
    price:        +document.getElementById('qa-price')?.value||0,
    image_url:    document.getElementById('qa-image')?.value.trim()||null,
    notes:        finalNotes,
    location:     loc,
    status:      'available',
    supplier_id:  supplierId,
    category_id:  catObj ? catObj.id : null,
  };

  try {
    await db.from('products').insert(payload);
    await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
    toast('✅ '+name+' е добавен в инвентара!', 'ok');

    if (navigateAfter) {
      go('inventory');
    } else {
      // Изчистваме формата за следващ артикул
      ['qa-name','qa-color-name','qa-gemar-code','qa-notes','qa-image',
       'qa-h','qa-w','qa-d','qa-weight','qa-location'].forEach(function(id){
        var el2 = document.getElementById(id);
        if (el2) el2.value = '';
      });
      ['qa-qty','qa-min','qa-cost','qa-price'].forEach(function(id){
        var el2 = document.getElementById(id);
        if (el2) el2.value = id==='qa-qty'?'1':id==='qa-min'?'5':'0';
      });
      document.getElementById('qa-img-preview').innerHTML = '';
      document.getElementById('qa-margin-display').style.display = 'none';
      document.getElementById('qa-name').focus();
      updateBadges();
    }
  } catch(e) {
    console.error('saveQuickAdd error:', e);
    toast('Грешка при запис: ' + (e.message||e), 'err');
  }
}

console.log('✅ Бърза форма за артикул заредена!');
</script>

<script>
'use strict';

// ТИПОВЕ АРТИКУЛИ — ИНВЕНТАР + ФИНАНСИ
// ════════════════════════════════════════════

var PRODUCT_TYPES = {

// ── Patch render_inventory да показва типове ────────────────
var _origInventory = window.render_inventory;

var _currentTypeFilter = '';

        (PRODUCT_TYPES[curType]?.desc||'')+

    // Добавяме полета за asset
    var formActions = modal.querySelector('.form-actions');

        '<div class="fg"><label>Макс. употреби (0=неогр.)</label><input type="number" id="mp-max-uses" value="'+(p?.max_uses||0)+'" min="0"></div>';

function updateProductTypeHint(val) {

// Patch saveProduct да включва product_type
var _origSaveProd = window.saveProduct;
window.saveProduct = async function() {
  var typeEl    = document.getElementById('mp-product-type');
  var maxUsesEl = document.getElementById('mp-max-uses');

  // Добавяме product_type към payload преди запис
  var origFrom = db.from.bind(db);
  var patched  = false;
  db.from = function(table) {
    var builder = origFrom(table);
    if (table === 'products' && !patched) {
      patched = true;
      var origIns = builder.insert.bind(builder);
      var origUpd = builder.update.bind(builder);
      var extra   = {
        product_type: typeEl ? typeEl.value : 'consumable',
        max_uses:     maxUsesEl ? +maxUsesEl.value||0 : 0,
      };
      builder.insert = function(pl){ return origIns(Object.assign({}, pl, extra)); };
      builder.update = function(pl){ return origUpd(Object.assign({}, pl, extra)); };
    }
    return builder;
  };
  await _origSaveProd();
  db.from = origFrom;
};

// ════════════════════════════════════════════
// СТОЙНОСТ НА ИНВЕНТАРА — ФИНАНСОВ ОТЧЕТ
// ════════════════════════════════════════════

// Добавяме в Отчети
var _origReports2 = window.render_reports;
window.render_reports = function(el) {

    var content = el.querySelector('.content');

    // Изчисляваме стойност по тип

      var t    = p.product_type||'consumable';
      var cost = (p.cost_price||0) * (p.quantity||0);
      var sell = (p.price||0)      * (p.quantity||0);
      byType[t]     = (byType[t]||0)     + cost;
      byTypeSell[t] = (byTypeSell[t]||0) + sell;
      totalCost += cost;
      totalSell += sell;
    });

    // По категории (top 8)
    var byCat = {};
    S.products.forEach(function(p){
      var cn = p.categories?.name || 'Без категория';
      if (!byCat[cn]) byCat[cn] = { cost:0, sell:0, cnt:0 };
      byCat[cn].cost += (p.cost_price||0)*(p.quantity||0);
      byCat[cn].sell += (p.price||0)*(p.quantity||0);
      byCat[cn].cnt++;

    var topCats = Object.entries(byCat)

              var k=x[0], t=x[1];

          S.products
            .filter(function(p){ return (p.cost_price||0)>0||(p.price||0)>0; })
            .sort(function(a,b){ return ((b.cost_price||0)*(b.quantity||0)) - ((a.cost_price||0)*(a.quantity||0)); })
            .slice(0,30)
            .map(function(p){
              var t   = PRODUCT_TYPES[p.product_type||'consumable']||PRODUCT_TYPES.consumable;
              var tot = (p.cost_price||0)*(p.quantity||0);
              var sel = (p.price||0)*(p.quantity||0);
              return '<tr>'+
                '<td><strong>'+p.name+'</strong>'+(p.categories?.name?'<div style="font-size:10px;color:var(--ink-l)">'+p.categories.name+'</div>':'')+' </td>'+

                '<td>'+eur(p.cost_price||0)+'</td>'+

                '<td style="color:var(--green)">'+eur0(sel)+'</td>'+

    content.appendChild(div);
  }, 200);
};

// ════════════════════════════════════════════
// АВТОМАТИЧНО НАМАЛЯВАНЕ НА КОНСУМАТИВИ
// ════════════════════════════════════════════

// При приключване на оферта → намаляваме консумативите
var _origComplete2 = window.completeEvent;
window.completeEvent = async function(qid) {
  // Намаляваме консумативите от офертата
  var q = S.quotes.find(function(x){ return x.id===qid; });
  if (q && q.quote_items && q.quote_items.length) {
    for (var item of q.quote_items) {
      var p = S.products.find(function(pr){ return pr.id===item.product_id; });
      if (!p) continue;
      var pt = p.product_type||'consumable';
      if (pt === 'consumable' || pt === 'handmade') {
        // Намаляваме количеството
        var newQty = Math.max(0, (p.quantity||0) - (item.quantity||0));
        await db.from('products').update({ quantity: newQty }).eq('id', p.id);
      } else if (pt === 'asset' || pt === 'asset_rental' || pt === 'rental') {
        // Увеличаваме usage_count
        await db.from('products').update({
          usage_count: (p.usage_count||0) + 1
        }).eq('id', p.id);
        // Предупреждение ако достигне макс
        if (p.max_uses > 0 && (p.usage_count||0)+1 >= p.max_uses) {
          toast('⚠️ '+p.name+' достигна максималния брой употреби!', 'err');
        }
      }
    }
    await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
  }
  // Извикваме оригиналния
  if (_origComplete2) return _origComplete2(qid);
};

// BADGE В QUICK ADD ФОРМА — добавяме типа
// ════════════════════════════════════════════
var _origSaveQA = window.saveQuickAdd;
window.saveQuickAdd = async function(nav) {
  // Добавяме product_type към payload
  var typeEl = document.getElementById('qa-prod-type');
  if (!typeEl) {
    // Добавяме поле ако липсва
    var priceEl = document.getElementById('qa-cost');
    if (priceEl) {
      var parent = priceEl.closest('.fr') || priceEl.parentNode.parentNode;
      if (parent && !document.getElementById('qa-prod-type-wrap')) {
        var wrap = document.createElement('div');
        wrap.id = 'qa-prod-type-wrap';
        wrap.className = 'fg';
        wrap.innerHTML = '<label>Тип артикул</label><select id="qa-prod-type">'+
          Object.entries(PRODUCT_TYPES).map(function(x){ return '<option value="'+x[0]+'">'+x[1].l+'</option>'; }).join('')+
        '</select>';
        parent.parentNode.insertBefore(wrap, parent);
      }
    }
  }

  var origFrom = db.from.bind(db);
  var done = false;
  db.from = function(t) {
    var b = origFrom(t);
    if (t==='products' && !done) {
      done = true;
      var ptVal = document.getElementById('qa-prod-type')?.value || 'consumable';
      var origI = b.insert.bind(b);
      b.insert = function(pl){ return origI(Object.assign({}, pl, { product_type: ptVal })); };
    }
    return b;
  };
  await _origSaveQA(nav);
  db.from = origFrom;
};

// Добавяме типа в Quick Add рендирането
var _origRenderQA = window.render_quickAdd;
window.render_quickAdd = function(el) {
  _origRenderQA(el);
  // Добавяме тип поле преди Цени секцията
  setTimeout(function(){
    var priceCard = el.querySelectorAll('[style*="background:var(--card)"]');
    var lastCard  = priceCard[priceCard.length-1];
    if (!lastCard || document.getElementById('qa-type-card')) return;

    var typeCard = document.createElement('div');
    typeCard.id  = 'qa-type-card';
    typeCard.style.cssText = 'background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px';
    typeCard.innerHTML =
      '<div style="font-size:12px;font-weight:700;color:var(--rose-d);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px">🏷 Тип артикул</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="qa-type-grid">'+
        Object.entries(PRODUCT_TYPES).map(function(x){
          var k=x[0], t=x[1];
          var isDefault = k==='consumable';
          return '<div onclick="selectQAType(\''+k+'\')" id="qatype-'+k+'" '+
            'style="padding:10px 12px;border-radius:var(--r-sm);border:1.5px solid '+(isDefault?'var(--rose)':'var(--border)')+';background:'+(isDefault?'var(--rose-l)':'var(--card)')+';cursor:pointer;transition:.15s">'+
            '<div style="font-size:13px;font-weight:700">'+t.l+'</div>'+
            '<div style="font-size:10px;color:var(--ink-m);margin-top:2px">'+t.desc+'</div>'+
          '</div>';
        }).join('')+
      '</div>'+
      '<input type="hidden" id="qa-prod-type" value="consumable">';

    lastCard.parentNode.insertBefore(typeCard, lastCard);
  }, 100);

window.selectQAType = function(val) {
  document.querySelectorAll('[id^="qatype-"]').forEach(function(d){
    var isOn = d.id === 'qatype-'+val;
    d.style.borderColor = isOn ? 'var(--rose)' : 'var(--border)';

<script>
'use strict';
// ════════════════════════════════════════════
// ПОПРАВКА — dbLoad limit за продукти
// ════════════════════════════════════════════

// Презаписваме dbLoad с по-голям limit за products
var _origDbLoad = window.dbLoad;
window.dbLoad = async function(key, table, order, select, opts) {
  order  = order  || 'created_at';
  select = select || '*';
  opts   = opts   || {};

  // За products увеличаваме лимита значително
  if (table === 'products') {
    opts = Object.assign({}, opts, { limit: 5000 });
  }

  var asc   = opts.asc !== undefined ? opts.asc : true;
  var limit = opts.limit || 500;

  try {
    var result = await db.from(table)
      .select(select)
      .order(order, { ascending: order === 'name' ? true : asc })
      .limit(limit);
    S[key] = result.data || [];
  } catch(e) {
    console.error('dbLoad error:', table, e);
    S[key] = S[key] || [];
  }
};

// Презареждаме продуктите веднага с новия лимит
(async function reloadProducts() {
  try {
    var result = await db.from('products')
      .select('*,categories(name,color),suppliers(name)')
      .order('name', { ascending: true })
      .limit(5000);
    S.products = result.data || [];
    console.log('✅ Продукти презаредени:', S.products.length, 'артикула');
    updateBadges();
    // Ако сме на инвентар страница — рефрешваме
    if (typeof curPage !== 'undefined' && curPage === 'inventory') {
      go('inventory');
    }
  } catch(e) {
    console.error('Reload products error:', e);
  }
})();

// Поправяме confirmImport да записва с по-добра грешка обработка
window.confirmImport = async function() {
  var selected = importItems ? importItems.filter(function(i){ return i._selected; }) : [];
  if (!selected.length) { toast('Избери поне един артикул', 'err'); return; }

  var btn = document.querySelector('[onclick="confirmImport()"]');
  if (btn) { btn.textContent = '⏳ Записвам...'; btn.disabled = true; }

  var errors = 0, added = 0, updated = 0;

  for (var item of selected) {
    try {
      // Проверка по наименование
      var existing = S.products.find(function(p){
        return (p.name||'').toLowerCase().trim() === (item.name||'').toLowerCase().trim();
      });

      if (existing) {
        var res = await db.from('products').update({
          quantity: (existing.quantity||0) + (item.quantity||0),
          cost_price: item.price_eur > 0 ? item.price_eur : (existing.cost_price||0),
        }).eq('id', existing.id);
        if (res.error) throw res.error;
        updated++;
      } else {
        var ins = await db.from('products').insert({
          name:         (item.name||'Артикул').trim(),
          quantity:     item.quantity || 0,
          unit:         item.unit || 'бр',
          price:        item.price_eur || 0,
          cost_price:   item.price_eur || 0,
          status:       'available',
          notes:        [
            item.name_original && item.name_original !== item.name ? 'Оригинал: '+item.name_original : '',
            item.category ? 'Категория: '+item.category : '',
            item.size ? 'Размер: '+item.size : '',
          ].filter(Boolean).join(' · ') || null,
          image_url:    item.image_url || null,
          location:     'Склад',
          product_type: item.category && item.category.toLowerCase().includes('геmar') ? 'consumable' : 'consumable',
          supplier_id:  null,
        });
        if (ins.error) throw ins.error;
        added++;
      }
    } catch(e) {
      console.error('Import error for:', item.name, e);
      errors++;
    }
  }

  // Презареждаме с новия лимит
  var reloaded = await db.from('products')
    .select('*,categories(name,color),suppliers(name)')
    .order('name', { ascending: true })
    .limit(5000);
  S.products = reloaded.data || [];

  if (btn) { btn.textContent = '✅ Добави в инвентара'; btn.disabled = false; }

  var msg = [];
  if (added)   msg.push(added + ' нови');
  if (updated) msg.push(updated + ' обновени');
  if (errors)  msg.push(errors + ' грешки');

  toast((errors ? '⚠️' : '✅') + ' ' + msg.join(' · '), errors ? 'err' : 'ok');

  if (typeof clearImport === 'function') clearImport();
  updateBadges();

  // Навигираме към инвентара
  setTimeout(function(){ go('inventory'); }, 500);
};

console.log('✅ dbLoad limit поправен — products до 5000 артикула');
</script>

<script>
'use strict';
// ════════════════════════════════════════════
// GEMAR ДИРЕКТЕН ИМПОРТ — записва веднага
// ════════════════════════════════════════════

window.handleGemarExcelImport = async function(file) {
  var statusEl = document.getElementById('temu-status');
  var textEl   = document.getElementById('temu-status-text');

  function setStatus(msg, type) {
    if (statusEl) { statusEl.style.display='flex'; statusEl.className='alert '+(type||'blue'); }
    if (textEl)   textEl.textContent = msg;
  }

  setStatus('📊 Зареждам SheetJS...', 'blue');

  try {
    // Зареждаме SheetJS
    if (typeof XLSX === 'undefined') {
      await new Promise(function(res, rej){
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    setStatus('📖 Чета Excel файла...', 'blue');

    var buf  = await file.arrayBuffer();
    var wb   = XLSX.read(new Uint8Array(buf), { type:'array' });

    // Дебъг — показваме листовете
    console.log('Листове:', wb.SheetNames);

    // Намираме листа с инвентара
    var sheetName = wb.SheetNames.find(function(n){
      return n.includes('Инвентар') || n.includes('инвент');
    }) || wb.SheetNames[1] || wb.SheetNames[0];

    console.log('Използвам лист:', sheetName);
    var ws   = wb.Sheets[sheetName];
    var rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });

    console.log('Общо редове:', rows.length);
    console.log('Ред 0:', rows[0]);
    console.log('Ред 1:', rows[1]);
    console.log('Ред 2:', rows[2]);

    // Намираме header ред
    var hdr = -1;
    for (var i=0; i<Math.min(rows.length,5); i++) {
      var r = rows[i];
      var hasArt = r.some(function(c){ 
        return String(c).includes('Артикул') || String(c).includes('артикул'); 
      });
      var hasQty = r.some(function(c){ 
        return String(c).includes('Налично') || String(c).includes('налично') || String(c).includes('⭐'); 
      });
      if (hasArt || hasQty) { hdr = i; break; }
    }

    if (hdr < 0) {
      // Ако не намерим хедър — опитваме с ред 1 (стандарт на нашия файл)
      hdr = 1;
      console.warn('Хедър не намерен, използвам ред 1');
    }

    console.log('Хедър ред:', hdr, rows[hdr]);

    var headers = rows[hdr].map(function(c){ return String(c||'').trim(); });
    console.log('Headers:', headers);

    // Намираме колоните по точни имена от нашия файл
    var colLinia  = headers.findIndex(function(h){ return h==='Линия' || h.includes('Лини'); });
    var colKod    = headers.findIndex(function(h){ return h==='Код #' || h==='Код'; });
    var colColor  = headers.findIndex(function(h){ return h.includes('Цвят') && !h.includes('◼'); });
    var colArt    = headers.findIndex(function(h){ return h==='Артикул'; });
    var colSize   = headers.findIndex(function(h){ return h==='Размер'; });
    var colPrice  = headers.findIndex(function(h){ return h.includes('Цена/бр'); });
    var colQty    = headers.findIndex(function(h){ return h.includes('Налично') || h.includes('⭐'); });
    var colMin    = headers.findIndex(function(h){ return h==='Минимум'; });

    console.log('Колони:', { colLinia, colKod, colColor, colArt, colSize, colPrice, colQty, colMin });

    if (colArt < 0) {
      throw new Error('Не намерих колона "Артикул". Провери формата на файла.');
    }
    if (colQty < 0) {
      throw new Error('Не намерих колона "⭐ Налично". Провери формата на файла.');
    }

    // Извличаме редовете
    var toInsert = [];
    for (var j = hdr+1; j < rows.length; j++) {
      var row = rows[j];
      if (!row || !row[colArt]) continue;

      var artVal = String(row[colArt]||'').trim();
      if (!artVal) continue;

      var qtyRaw = row[colQty];
      var qty    = typeof qtyRaw === 'number' ? qtyRaw : parseFloat(String(qtyRaw||'0').replace(',','.'));
      if (!qty || qty <= 0) continue;

      var linia  = colLinia>=0  ? String(row[colLinia]||'').trim()  : '';
      var kod    = colKod>=0    ? String(row[colKod]||'').trim()    : '';
      var color  = colColor>=0  ? String(row[colColor]||'').split('/')[0].trim() : '';
      var size   = colSize>=0   ? String(row[colSize]||'').trim()   : '';
      var price  = colPrice>=0  ? (typeof row[colPrice]==='number' ? row[colPrice] : parseFloat(String(row[colPrice]||'0').replace(',','.'))) : 0;
      var minQ   = colMin>=0    ? (typeof row[colMin]==='number'   ? row[colMin]   : parseFloat(String(row[colMin]||'10'))) : 10;

      // Наименование: "G90 · #001 · Бяло · 30см"
      var nameParts = [artVal];
      if (kod)   nameParts.push(kod);
      if (color) nameParts.push(color);
      if (size)  nameParts.push(size);
      var name = nameParts.join(' · ');

      toInsert.push({
        name:         name,
        quantity:     Math.round(qty),
        unit:         'бр',
        price:        price || 0,
        cost_price:   price || 0,
        min_quantity: Math.round(minQ)||10,
        status:       'available',
        product_type: 'consumable',
        notes:        linia ? 'Серия: '+linia : null,
        location:     'Склад',
        supplier_id:  null,
        category_id:  null,
        image_url:    null,
      });
    }

    console.log('Артикули за запис:', toInsert.length);
    if (toInsert.length === 0) {
      throw new Error('Няма артикули с налично > 0. Попълни колоната "⭐ Налично" в Excel файла!');
    }

    setStatus('💾 Записвам ' + toInsert.length + ' артикула...', 'blue');

    // Записваме на партиди от 50
    var BATCH = 50;
    var added = 0, errors = 0;

    for (var start = 0; start < toInsert.length; start += BATCH) {
      var batch = toInsert.slice(start, start + BATCH);
      try {
        var res = await db.from('products').upsert(batch, { 
          onConflict: 'name',
          ignoreDuplicates: false 
        });
        if (res.error) {
          console.warn('Upsert грешка, опитвам insert:', res.error.message);
          // Опитваме обикновен insert
          var res2 = await db.from('products').insert(batch);
          if (res2.error) {
            console.error('Insert грешка:', res2.error);
            errors += batch.length;
          } else {
            added += batch.length;
          }
        } else {
          added += batch.length;
        }
      } catch(e) {
        console.error('Batch грешка:', e);
        errors += batch.length;
      }

      setStatus('💾 Записано ' + Math.min(start+BATCH, toInsert.length) + ' / ' + toInsert.length + '...', 'blue');
    }

    // Презареждаме продуктите
    var reload = await db.from('products')
      .select('*,categories(name,color),suppliers(name)')
      .order('name', { ascending: true })
      .limit(5000);
    S.products = reload.data || [];

    console.log('✅ Продукти в S:', S.products.length);

    setStatus('✅ Готово! Добавени: ' + added + (errors?' · Грешки: '+errors:''), 'green');
    toast('🌿 Gemar: ' + added + ' артикула в инвентара!', 'ok');
    updateBadges();

    // Навигираме към инвентара
    setTimeout(function(){ go('inventory'); }, 800);

  } catch(e) {
    console.error('Gemar Import FATAL:', e);
    setStatus('❌ ' + e.message, 'red');
    toast('Грешка: ' + e.message, 'err');
  }
};

console.log('✅ Gemar директен импорт v2 зареден');
</script>

      if (!row || !row[cArt]) continue;
      var art = String(row[cArt]||'').trim();
      if (!art) continue;

      var qtyRaw = row[cQty];
      var qty = typeof qtyRaw==='number' ? qtyRaw : parseFloat(String(qtyRaw||'').replace(',','.'));
      if (!qty || qty<=0 || isNaN(qty)) continue;

      var linia = cLinia>=0 ? String(row[cLinia]||'').trim() : '';
      var kod   = cKod>=0   ? String(row[cKod]||'').trim()   : '';
      var color = cColor>=0 ? String(row[cColor]||'').split('/')[0].trim() : '';
      var size  = cSize>=0  ? String(row[cSize]||'').trim()  : '';
      var price = cPrice>=0 ? (typeof row[cPrice]==='number' ? row[cPrice] : parseFloat(String(row[cPrice]||'0').replace(',','.'))) : 0;
      var minQ  = cMin>=0   ? (typeof row[cMin]==='number'   ? row[cMin]   : parseFloat(String(row[cMin]||'10'))) : 10;

      // Наименование
      var parts = [art];
      if (kod)   parts.push(kod);
      if (color && color!=='Асорти') parts.push(color);
      if (size)  parts.push(size);
      var name = parts.join(' · ');

      toInsert.push({
        name:         name,
        quantity:     Math.round(qty),
        unit:         'бр',
        price:        price||0,
        cost_price:   price||0,
        min_quantity: Math.round(minQ)||10,
        status:       'available',
        product_type: 'consumable',
        notes:        linia ? 'Серия: '+linia : null,
        location:     'Склад',
      });
    }

    console.log('За запис:', toInsert.length, 'артикула');
    console.log('Пример:', toInsert[0]);

    if (!toInsert.length) {
      throw new Error('Няма артикули с Налично > 0. Попълни колона "⭐ Налично" в Excel-а!');
    }

    // Записваме на партиди от 50
    setStatus('💾 Записвам '+toInsert.length+' артикула...', 'blue');
    var added=0, errs=0;
    var BATCH=50;
    for (var s=0; s<toInsert.length; s+=BATCH) {
      var batch = toInsert.slice(s, s+BATCH);
      var res   = await db.from('products').insert(batch);
      if (res.error) {
        console.warn('Batch грешка:', res.error.message);
        // Опитваме един по един
        for (var b=0; b<batch.length; b++) {
          var r2 = await db.from('products').insert(batch[b]);
          if (r2.error) { console.error('Skip:', batch[b].name, r2.error.message); errs++; }
          else added++;
        }
      } else {
        added += batch.length;
      }
      setStatus('💾 Записано '+Math.min(s+BATCH,toInsert.length)+'/'+toInsert.length+'...','blue');
    }

    // Презареждаме
    var reload = await db.from('products')
      .select('*,categories(name,color),suppliers(name)')
      .order('name',{ascending:true}).limit(5000);
    S.products = reload.data||[];
    console.log('Продукти в S след импорт:', S.products.length);

    setStatus('✅ Добавени: '+added+(errs?' · Пропуснати: '+errs:''), 'green');
    toast('🌿 Gemar: '+added+' артикула добавени!', 'ok');
    updateBadges();
    setTimeout(function(){ go('inventory'); }, 800);

  } catch(e) {
    console.error('Gemar v3 грешка:', e);
    setStatus('❌ '+e.message, 'red');
    toast('Грешка: '+e.message, 'err');
  }
};
console.log('✅ Gemar v3 зареден');
</script>
