<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Eleya Decor · Studio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<meta name="theme-color" content="#c9748a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eleya">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ════════════════════════════════════════════
   RESET & ROOT
════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  /* Brand */
  --rose:   #c9748a;
  --rose-d: #a85570;
  --rose-l: #f2d5dc;
  --rose-ll:#fdf6f8;
  /* Neutrals */
  --ink:    #1c1118;
  --ink-m:  #6b4f5a;
  --ink-l:  #b89aa4;
  /* Surfaces */
  --card:   #ffffff;
  --bg:     #faf5f7;
  --border: #eedde3;
  /* Semantic */
  --green:  #3d7a56;
  --green-l:#e4f2ea;
  --amber:  #b87333;
  --amber-l:#fdf0e0;
  --red:    #c04040;
  --red-l:  #fdeaea;
  --blue:   #3a6cbd;
  --blue-l: #e4ecf9;
  --purple: #7050c0;
  --purple-l:#ede8f8;
  /* Layout */
  --sidebar-w: 228px;
  --topbar-h:  52px;
  /* Shape */
  --r:    12px;
  --r-sm: 8px;
  --r-xs: 6px;
  /* Typography */
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ════════════════════════════════════════════
   THEMES
════════════════════════════════════════════ */
body.theme-sage {
  --rose:   #5a8a6a;
  --rose-d: #3d6b50;
  --rose-l: #c8e0d0;
  --rose-ll:#f2faf5;
  --border: #d0e4d8;
}
body.theme-ocean {
  --rose:   #3a6cbd;
  --rose-d: #2550a0;
  --rose-l: #c0d4f0;
  --rose-ll:#f0f5fd;
  --border: #ccdaf0;
}
body.theme-dark {
  --rose:   #e090a8;
  --rose-d: #c06888;
  --rose-l: #3d2535;
  --rose-ll:#241820;
  --ink:    #f0e8ec;
  --ink-m:  #b090a0;
  --ink-l:  #705060;
  --card:   #1e1520;
  --bg:     #160f13;
  --border: #2d1e28;
  --green:  #5aaa7a;
  --green-l:#1a2f22;
  --amber:  #d4933a;
  --amber-l:#2a1f0e;
  --red:    #e06060;
  --red-l:  #2a1515;
  --blue:   #6090e0;
  --blue-l: #152035;
}

/* ════════════════════════════════════════════
   BASE
════════════════════════════════════════════ */
body {
  background: var(--bg);
  color: var(--ink);
  height: 100vh;
  display: flex;
  overflow: hidden;
  transition: background .3s, color .3s;
}

a { color: inherit; text-decoration: none; }

/* ════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: fixed;
  left: 0; top: 0;
  z-index: 50;
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}

.logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--rose), var(--rose-d));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px color-mix(in srgb, var(--rose) 40%, transparent);
}
.logo-text h1 {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
}
.logo-text p {
  font-size: 9.5px;
  color: var(--ink-l);
  margin-top: 1px;
  letter-spacing: .6px;
  text-transform: uppercase;
}

nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 10px;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }

.nav-section {
  font-size: 9px;
  font-weight: 700;
  color: var(--ink-l);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  padding: 12px 16px 4px;
  flex-shrink: 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 16px;
  font-size: 12.5px;
  color: var(--ink-m);
  cursor: pointer;
  transition: all .12s;
  border-left: 3px solid transparent;
  font-weight: 500;
  position: relative;
  user-select: none;
}
.nav-item:hover {
  background: var(--rose-ll);
  color: var(--ink);
}
.nav-item.active {
  background: var(--rose-ll);
  color: var(--rose-d);
  border-left-color: var(--rose);
  font-weight: 600;
}
.nav-item svg {
  width: 14px; height: 14px;
  flex-shrink: 0;
  opacity: .65;
}
.nav-item.active svg { opacity: 1; }

.nav-badge {
  margin-left: auto;
  background: var(--rose);
  color: #fff;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
  line-height: 1.6;
}

.sidebar-bottom {
  padding: 10px 16px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.theme-row {
  display: flex;
  gap: 7px;
  margin-bottom: 8px;
}
.theme-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  cursor: pointer;
  border: 2.5px solid transparent;
  transition: .15s;
  flex-shrink: 0;
}
.theme-dot:hover, .theme-dot.on {
  border-color: var(--ink);
  transform: scale(1.2);
}
.ver-tag {
  font-size: 10px;
  color: var(--ink-l);
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ════════════════════════════════════════════
   MAIN LAYOUT
════════════════════════════════════════════ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
}

#page-content {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#page-content::-webkit-scrollbar { width: 5px; }
#page-content::-webkit-scrollbar-track { background: transparent; }
#page-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ════════════════════════════════════════════
   TOPBAR
════════════════════════════════════════════ */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 22px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
  min-height: var(--topbar-h);
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar h2 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ════════════════════════════════════════════
   CONTENT
════════════════════════════════════════════ */
.content {
  padding: 20px 22px;
}

/* ════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 7px 15px;
  border-radius: var(--r-sm);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  white-space: nowrap;
  font-family: inherit;
  line-height: 1;
  text-decoration: none;
}
.btn:active { transform: scale(.97); }

.btn-primary {
  background: var(--rose);
  color: #fff;
  box-shadow: 0 2px 8px color-mix(in srgb, var(--rose) 35%, transparent);
}
.btn-primary:hover {
  background: var(--rose-d);
  box-shadow: 0 4px 12px color-mix(in srgb, var(--rose) 45%, transparent);
}
.btn-secondary {
  background: var(--bg);
  color: var(--ink);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover {
  background: var(--rose-ll);
  border-color: var(--rose-l);
}
.btn-success {
  background: var(--green-l);
  color: var(--green);
  border: 1.5px solid color-mix(in srgb, var(--green) 30%, transparent);
}
.btn-success:hover { background: color-mix(in srgb, var(--green) 15%, white); }
.btn-danger {
  background: var(--red-l);
  color: var(--red);
  border: 1.5px solid color-mix(in srgb, var(--red) 25%, transparent);
}
.btn-danger:hover { background: color-mix(in srgb, var(--red) 15%, white); }
.btn-ghost {
  background: transparent;
  color: var(--ink-m);
  border: 1.5px solid transparent;
}
.btn-ghost:hover { background: var(--rose-ll); color: var(--rose-d); }

.btn-sm { padding: 5px 10px; font-size: 11.5px; }
.btn-xs { padding: 3px 8px; font-size: 10.5px; }

.icon-btn {
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: var(--card);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .12s;
  color: var(--ink-m);
  font-size: 13px;
  flex-shrink: 0;
}
.icon-btn:hover {
  background: var(--rose-ll);
  color: var(--rose-d);
  border-color: var(--rose-l);
}
.icon-btn.danger:hover {
  background: var(--red-l);
  color: var(--red);
  border-color: color-mix(in srgb, var(--red) 30%, transparent);
}

/* ════════════════════════════════════════════
   CARDS & GRIDS
════════════════════════════════════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  transition: all .15s;
}
.stat-card:hover {
  border-color: var(--rose-l);
  box-shadow: 0 2px 12px color-mix(in srgb, var(--rose) 8%, transparent);
  transform: translateY(-1px);
}
.stat-card .lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-l);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 6px;
}
.stat-card .val {
  font-size: 26px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.stat-card .sub {
  font-size: 11px;
  color: var(--ink-m);
  margin-top: 4px;
}
.stat-card.good .val { color: var(--green); }
.stat-card.warn .val { color: var(--amber); }
.stat-card.bad  .val { color: var(--red); }
.stat-card.accent .val { color: var(--rose-d); }
.stat-card.clickable { cursor: pointer; }

/* ════════════════════════════════════════════
   TABLE
════════════════════════════════════════════ */
.table-wrap {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  margin-bottom: 14px;
}
.table-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1.5px solid var(--border);
}
.table-hdr h3 {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg); }
th {
  padding: 8px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-l);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1.5px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 10px 14px;
  font-size: 12.5px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .1s; }
tbody tr:hover td { background: var(--rose-ll); }

/* ════════════════════════════════════════════
   BADGES
════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10.5px;
  font-weight: 600;
  white-space: nowrap;
}
.bg { background: var(--green-l);  color: var(--green);  }
.bw { background: var(--amber-l);  color: var(--amber);  }
.br { background: var(--red-l);    color: var(--red);    }
.bb { background: var(--blue-l);   color: var(--blue);   }
.bm { background: var(--rose-l);   color: var(--rose-d); }
.bp { background: var(--purple-l); color: var(--purple); }
.bd { background: var(--bg);       color: var(--ink-m);  border: 1px solid var(--border); }

/* ════════════════════════════════════════════
   MODALS
════════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(28, 17, 24, .48);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  padding: 16px;
}
.overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card);
  border-radius: 16px;
  width: 520px;
  max-width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  padding: 22px;
  transform: translateY(14px) scale(.98);
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  border: 1.5px solid var(--border);
  box-shadow: 0 24px 60px rgba(0,0,0,.18), 0 8px 24px rgba(0,0,0,.1);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  position: relative;
}
.overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1.5px solid var(--border);
}
.modal-hdr h3 {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
}

.close-btn {
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  color: var(--ink-m);
  transition: .12s;
  flex-shrink: 0;
}
.close-btn:hover { background: var(--red-l); color: var(--red); border-color: transparent; }

/* ════════════════════════════════════════════
   FORMS
════════════════════════════════════════════ */
.fg {
  margin-bottom: 10px;
}
.fg label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-m);
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.fg input,
.fg select,
.fg textarea {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 13px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  background: var(--card);
  color: var(--ink);
  font-family: inherit;
  line-height: 1.4;
}
.fg input:focus,
.fg select:focus,
.fg textarea:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--rose) 18%, transparent);
}
.fg textarea { resize: vertical; min-height: 60px; }
input[type="color"] { cursor: pointer; padding: 3px; height: 38px; }
input[type="date"],
input[type="time"] { cursor: pointer; }

.fr  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1.5px solid var(--border);
}

/* ════════════════════════════════════════════
   QUICK DATE BUTTONS
════════════════════════════════════════════ */
.qdates {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.qd {
  padding: 2px 9px;
  font-size: 10px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--bg);
  color: var(--ink-m);
  cursor: pointer;
  transition: .12s;
}
.qd:hover { background: var(--rose); color: #fff; border-color: var(--rose); }

/* ════════════════════════════════════════════
   TABS
════════════════════════════════════════════ */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg);
  border-radius: var(--r-sm);
  padding: 3px;
  width: fit-content;
  max-width: 100%;
  margin-bottom: 14px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
  border: 1.5px solid var(--border);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 5px 14px;
  border-radius: var(--r-xs);
  font-size: 11.5px;
  font-weight: 600;
  cursor: pointer;
  color: var(--ink-m);
  transition: .12s;
  white-space: nowrap;
  user-select: none;
}
.tab.on {
  background: var(--card);
  color: var(--rose-d);
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
}

/* ════════════════════════════════════════════
   SECTION DIVIDER
════════════════════════════════════════════ */
.sdiv {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-l);
  text-transform: uppercase;
  letter-spacing: .8px;
  padding: 8px 0 5px;
  margin-bottom: 4px;
  border-bottom: 1.5px solid var(--border);
}

/* ════════════════════════════════════════════
   ALERT BANNERS
════════════════════════════════════════════ */
.alert {
  background: var(--amber-l);
  border: 1.5px solid color-mix(in srgb, var(--amber) 30%, transparent);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--amber);
  flex-wrap: wrap;
}
.alert.red   { background: var(--red-l);   color: var(--red);   border-color: color-mix(in srgb, var(--red) 30%, transparent);  }
.alert.blue  { background: var(--blue-l);  color: var(--blue);  border-color: color-mix(in srgb, var(--blue) 25%, transparent); }
.alert.green { background: var(--green-l); color: var(--green); border-color: color-mix(in srgb, var(--green) 25%, transparent); }

/* ════════════════════════════════════════════
   GREETING BANNER
════════════════════════════════════════════ */
.greet-banner {
  background: linear-gradient(135deg, var(--rose) 0%, var(--rose-d) 100%);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 16px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.greet-banner::before {
  content: '🌸';
  position: absolute;
  right: 16px; top: 8px;
  font-size: 64px;
  opacity: .12;
  pointer-events: none;
}

/* ════════════════════════════════════════════
   EMPTY STATE
════════════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--ink-m);
}
.empty-state .ico {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: .5;
}
.empty-state p { font-size: 14px; font-weight: 500; }
.empty-state small {
  font-size: 12px;
  opacity: .7;
  margin-top: 4px;
  display: block;
}

/* ════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════ */
.search-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  padding: 6px 12px;
  width: 210px;
  transition: border-color .15s, box-shadow .15s;
}
.search-wrap:focus-within {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--rose) 15%, transparent);
}
.search-wrap input {
  background: none;
  border: none;
  outline: none;
  font-size: 12px;
  color: var(--ink);
  width: 100%;
  font-family: inherit;
}
.search-wrap svg { color: var(--ink-l); flex-shrink: 0; }

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 22px;
  right: 22px;
  background: #1c1118;
  color: #fff;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  max-width: 300px;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--red);   }

/* ════════════════════════════════════════════
   MOBILE HEADER
════════════════════════════════════════════ */
.mob-hdr {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--card);
  border-bottom: 1.5px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
  min-height: 48px;
}
.mob-hdr-title {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ════════════════════════════════════════════
   MOBILE BOTTOM NAV
════════════════════════════════════════════ */
.mob-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1.5px solid var(--border);
  padding: 6px 0;
  padding-bottom: max(6px, env(safe-area-inset-bottom));
  z-index: 9999;
  box-shadow: 0 -4px 20px rgba(0,0,0,.1);
}
.mni {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  cursor: pointer;
  color: var(--ink-l);
  font-size: 9px;
  font-weight: 600;
  gap: 2px;
  transition: color .12s;
  position: relative;
  user-select: none;
}
.mni.on { color: var(--rose); }
.mni.on::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--rose);
  border-radius: 0 0 3px 3px;
}
.mni svg { width: 20px; height: 20px; }
.mob-badge {
  position: absolute;
  top: 1px;
  right: calc(50% - 16px);
  background: var(--rose);
  color: #fff;
  border-radius: 50%;
  width: 14px; height: 14px;
  font-size: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

/* ════════════════════════════════════════════
   SIDEBAR OVERLAY (mobile)
════════════════════════════════════════════ */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 49;
}

/* ════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); box-shadow: none; }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 8px 0 32px rgba(0,0,0,.2);
  }
  .sidebar-overlay.show { display: block; }
  .main { margin-left: 0 !important; padding-bottom: 68px; }
  .mob-hdr { display: flex !important; }
  .mob-nav { display: flex !important; }
  .stat-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
  .fr { grid-template-columns: 1fr !important; }
  .fr3 { grid-template-columns: 1fr !important; }
  .content { padding: 12px 14px; }
  .topbar { padding: 9px 14px; }
  .topbar .search-wrap { order: 10; width: 100%; }
  .modal { padding: 16px; max-height: 88vh; }
  .form-actions { flex-direction: column; }
  .form-actions .btn { width: 100%; justify-content: center; }
  .tabs { width: 100%; overflow-x: auto; }
  table { min-width: 500px; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .search-wrap { width: 100%; }
  .greet-banner { padding: 14px 16px; }
  .greet-banner::before { font-size: 44px; }
}

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card .val { font-size: 20px; }
}

/* ════════════════════════════════════════════
   PRINT
════════════════════════════════════════════ */
@media print {
  .sidebar, .mob-hdr, .mob-nav, .topbar, .toast { display: none !important; }
  .main { margin-left: 0 !important; }
  .content { padding: 0 !important; }
  body { background: #fff !important; color: #000 !important; }
  .card-print { break-inside: avoid; }
}

/* ════════════════════════════════════════════

      dbLoad('expenses',   'expenses',   'date',       '*,suppliers(name)', { asc: false, limit: 300 }),
      dbLoad('themes',     'themes',     'name',       '*,theme_items(*)'),
      dbLoad('team',       'team_members','name'),
      dbLoad('tasks',      'tasks',      'created_at', '*', { asc: false, limit: 200 }),
      dbLoad('portfolio',  'portfolio',  'created_at', '*', { asc: false }),
      loadNotifications()
    ]);
    await smartChecks();
  } catch (e) {
    console.error('Init error:', e);
    toast('Проблем с връзката — проверете интернет', 'err');
  }
  go('dashboard');
  loadWeather();
}

async function dbLoad(key, table, order = 'created_at', select = '*', opts = {}) {
  const { asc = true, limit = 500 } = opts;
  const { data } = await db.from(table).select(select)
    .order(order, { ascending: order === 'name' ? true : asc })
    .limit(limit);
  S[key] = data || [];
}

async function loadNotifications() {
  const { data } = await db.from('notifications')
    .select('*').eq('is_read', false)
    .order('created_at', { ascending: false }).limit(50);
  S.notifications = data || [];
  updateBadges();
}

// ── TIME AGO ──────────────────────────────────────────────────
function timeAgo(d) {
  if (!d) return '';
  const diff = Date.now() - new Date(d);
  const m = Math.floor(diff / 6e4), h = Math.floor(diff / 36e5), dy = Math.floor(diff / 864e5);
  if (m < 1) return 'Сега';
  if (m < 60) return `${m}мин`;
  if (h < 24) return `${h}ч`;
  return `${dy}д`;
}

// ── SMART CHECKS — известия ───────────────────────────────────
async function smartChecks() {
  const td = today();
  const tomorrow = new Date(Date.now() + 864e5).toISOString().slice(0, 10);
  const in7 = new Date(Date.now() + 7 * 864e5).toISOString().slice(0, 10);
  const checks = [];

  // Рождени дни
  S.clients.forEach(c => {
    if (!c.birthday) return;
    const md = c.birthday.slice(5);
    if (md === td.slice(5))       checks.push(addNotif('birthday', `🎂 Рожден ден: ${c.name}`, 'Поздрави ги!', 'clients', c.id));
    else if (md === tomorrow.slice(5)) checks.push(addNotif('birthday', `🎂 Рожден ден утре: ${c.name}`, 'Подгответе поздравление', 'clients', c.id));
    // Family birthdays
    (c.family_members || []).forEach(f => {
      if (!f.birthday) return;
      const fmd = f.birthday.slice(5);
      if (fmd === td.slice(5)) checks.push(addNotif('birthday', `🎂 ${f.name} (${c.name}) — рожден ден!`, `Клиентът ${c.name} може да е заинтересован`, 'clients', c.id));
    });
  });

  // Изтичащи оферти
  S.quotes.filter(q => (q.status === 'sent' || q.status === 'seen') && q.valid_until).forEach(q => {
    if (q.valid_until <= td) checks.push(addNotif('quote_exp', `⏰ Изтекла оферта: ${q.clients?.name}`, 'Офертата е изтекла', 'quotes', q.id));
    else if (q.valid_until === tomorrow) checks.push(addNotif('quote_exp', `⏰ Изтича утре: ${q.clients?.name}`, 'Напомни на клиента!', 'quotes', q.id));
  });

  // Просрочени депозити
  S.quotes.filter(q => q.status === 'accepted' && q.deposit_due_date && q.deposit_due_date < td).forEach(q => {
    checks.push(addNotif('dep_over', `💰 Просрочен депозит: ${q.clients?.name}`, `Дължимо от ${q.deposit_due_date}`, 'quotes', q.id));
  });

  // Предстоящи събития
  S.events.filter(e => e.status === 'confirmed' && e.date >= td && e.date <= in7).forEach(e => {
    const d = daysFrom(e.date);
    checks.push(addNotif('event_soon', `🎉 ${d === 0 ? 'ДНЕС' : d === 1 ? 'УТРЕ' : 'След ' + d + 'д'}: ${e.title}`, '', 'calendar', e.id));
  });

  // Ниски наличности
  S.products.filter(p => p.quantity <= (p.min_quantity || 0) && p.quantity > 0).slice(0, 5).forEach(p => {
    checks.push(addNotif('low_stock', `📦 Ниска наличност: ${p.name}`, `${p.quantity} ${p.unit} — мин. ${p.min_quantity}`, 'inventory', p.id));
  });

  // Просрочени доставки
  S.products.filter(p => p.status === 'ordered' && p.expected_date && p.expected_date < td).forEach(p => {
    checks.push(addNotif('late_del', `🚚 Закъснял: ${p.name}`, `Очакван на ${p.expected_date}`, 'inventory', p.id));
  });

  await Promise.all(checks);
  await loadNotifications();
}

async function addNotif(type, title, msg, link, lid) {
  const td = today();
  const ex = S.notifications.find(n => n.type === type && n.link_id === lid && n.created_at?.startsWith(td));
  if (ex) return;
  return db.from('notifications').insert({ type, title, message: msg, link_to: link, link_id: lid });
}

async function markRead(id) {
  await db.from('notifications').update({ is_read: true }).eq('id', id);
  S.notifications = S.notifications.filter(n => n.id !== id);
  updateBadges();
  if (curPage === 'notifications') go('notifications');
}

async function markAllRead() {
  if (!S.notifications.length) return;
  await db.from('notifications').update({ is_read: true }).in('id', S.notifications.map(n => n.id));
  S.notifications = [];
  updateBadges();
  if (curPage === 'notifications') go('notifications');
}

// markReceived helper
async function markReceived(pid) {
  await db.from('products').update({ status: 'available', received_date: today() }).eq('id', pid);
  await dbLoad('products', 'products', 'name', '*,categories(name,color),suppliers(name)');
  toast('Маркирано като получено ✅', 'ok');
  go('dashboard');
}

// quickMov — отваря movement modal за конкретен продукт
function quickMov(pid) {
  buildMovModal();
  setTimeout(() => {
    const sel = document.getElementById('mm-prod');
    if (sel) sel.value = pid;
    selMovType('in');
  }, 50);
  om('mod-movement');
}

// ── Task row helper ───────────────────────────────────────────

  const typeIco = { event: '📅', business: '💼', personal: '🌸', idea: '💡' }[t.type] || '📝';
  const td = today();
  return `
  <div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
    <input type="checkbox" ${t.completed ? 'checked' : ''}
      onchange="toggleTask('${t.id}',this.checked)"
      style="margin-top:3px;width:15px;height:15px;cursor:pointer;accent-color:var(--rose);flex-shrink:0">
    <div style="flex:1;min-width:0;opacity:${t.completed ? .45 : 1}">
      <div style="font-size:12.5px;font-weight:500;${t.completed ? 'text-decoration:line-through' : ''};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${typeIco} ${t.description}

      ${t.due_date
        ? `<div style="font-size:10px;font-weight:600;color:${t.due_date < td ? 'var(--red)' : 'var(--ink-l)'}">${t.due_date}</div>`
        : ''}
    </div>
    <div style="width:7px;height:7px;border-radius:50%;background:${pColor};flex-shrink:0;margin-top:5px"></div>
    <button class="icon-btn danger" onclick="delTask('${t.id}')" style="width:22px;height:22px;font-size:11px">🗑</button>

}

async function saveTask() {
  const desc = document.getElementById('mtask-desc').value.trim();
  if (!desc) { toast('Въведи описание', 'err'); return; }
  await db.from('tasks').insert({
    description: desc,
    type:     document.getElementById('mtask-type').value,
    priority: document.getElementById('mtask-prio').value,
    due_date: document.getElementById('mtask-due').value || null,
    completed: false
  });
  await dbLoad('tasks', 'tasks', 'created_at', '*', { asc: false, limit: 200 });
  cm('mod-task');
  toast('Задачата е добавена ✅', 'ok');
  if (curPage === 'myDay') go('myDay');
}

async function toggleTask(id, checked) {
  await db.from('tasks').update({ completed: checked }).eq('id', id);
  const t = S.tasks.find(x => x.id === id);
  if (t) t.completed = checked;
}

async function delTask(id) {
  await db.from('tasks').delete().eq('id', id);
  S.tasks = S.tasks.filter(t => t.id !== id);
  if (curPage === 'myDay') go('myDay');
}

// КАЛЕНДАР
// ════════════════════════════════════════════
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();

window.render_calendar = function(el) {
  const td  = today();
  const MONTHS = ['Януари','Февруари','Март','Април','Май','Юни','Юли','Август','Септември','Октомври','Ноември','Декември'];
  const DAYS   = ['Пон','Вт','Ср','Чет','Пет','Съб','Нед'];

  const first   = new Date(calYear, calMonth, 1);
  const last    = new Date(calYear, calMonth + 1, 0);
  const startDow = (first.getDay() + 6) % 7; // Mon=0

  // Build event map for month
  const evMap = {};
  const addToMap = (date, item) => { evMap[date] = (evMap[date] || []).concat(item); };

  S.events.forEach(e => {
    if (e.date) addToMap(e.date, { title: e.title, color: e.color || 'var(--rose-l)', textColor: 'var(--rose-d)', id: e.id, type: 'event' });
  });
  S.quotes.filter(q => q.event_date && (q.status === 'accepted' || q.status === 'deposit_paid')).forEach(q => {
    addToMap(q.event_date, { title: q.clients?.name || 'Оферта', color: 'var(--green-l)', textColor: 'var(--green)', id: q.id, type: 'quote' });
  });

  // Build cells
  let cells = '';
  for (let i = 0; i < startDow; i++) {
    cells += `<div style="min-height:80px;background:var(--bg);border-radius:var(--r-sm);opacity:.35"></div>`;
  }
  for (let d = 1; d <= last.getDate(); d++) {
    const dt = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvs = evMap[dt] || [];
    const isToday = dt === td;
    const isPast  = dt < td;
    cells += `
    <div onclick="calDayClick('${dt}')"
      style="min-height:80px;background:var(--card);border-radius:var(--r-sm);
             border:1.5px solid ${isToday ? 'var(--rose)' : 'var(--border)'};
             padding:6px;cursor:pointer;transition:.12s;opacity:${isPast ? '.7' : '1'}"

function calPrev() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  go('calendar');
}
function calNext() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  go('calendar');
}
function calDayClick(dt) {
  openEventModal();
  setTimeout(() => {
    const el = document.getElementById('mev-date');
    if (el) el.value = dt;
  }, 60);
}

  document.getElementById('mev-end').value     = e?.end_time   || '';

function editEvent(id) { openEventModal(id); }

async function saveEvent() {
  const title = document.getElementById('mev-name').value.trim();
  const date  = document.getElementById('mev-date').value;
  if (!title || !date) { toast('Въведи заглавие и дата', 'err'); return; }
  const payload = {
    title, date,
    type:             document.getElementById('mev-type').value,
    start_time:       document.getElementById('mev-start').value   || null,
    end_time:         document.getElementById('mev-end').value     || null,
    address:          document.getElementById('mev-addr').value.trim() || null,
    prep_time:        +document.getElementById('mev-prep').value   || 60,
    travel_time:      +document.getElementById('mev-travel').value || 30,
    assembly_time:    +document.getElementById('mev-asm').value    || 90,
    disassembly_time: +document.getElementById('mev-disasm').value || 60,
    status:           document.getElementById('mev-status').value,
    color:            document.getElementById('mev-color').value,
    notes:            document.getElementById('mev-notes').value.trim() || null,
    client_id:        document.getElementById('mev-client').value  || null
  };
  if (editId.event) await db.from('events').update(payload).eq('id', editId.event);
  else              await db.from('events').insert(payload);
  await dbLoad('events', 'events', 'date');
  cm('mod-event');
  toast('Събитието е записано ✅', 'ok');
  go(curPage);
}

async function delEvent(id) {
  const eid = id || editId.event;
  if (!eid || !confirm('Изтрий събитието?')) return;
  await db.from('events').delete().eq('id', eid);
  await dbLoad('events', 'events', 'date');
  cm('mod-event');
  toast('Изтрито', 'ok');
  go(curPage);
}

window.om = function(id) {
  if (id === 'mod-movement') {
    buildMovModal();
    fillSel('mm-prod', S.products, p => p.id, p => `${p.name} (${p.quantity} ${p.unit || 'бр'})`);
    selMovType('in');
  }
  _orig_om(id);

async function saveMov() {
  const pid = document.getElementById('mm-prod').value;
  const qty = +document.getElementById('mm-qty').value || 1;
  if (!pid) { toast('Избери продукт', 'err'); return; }
  const p = S.products.find(x => x.id === pid);
  if (!p) return;

  let newQty = p.quantity;
  if (movType === 'in')     newQty += qty;
  else if (movType === 'out') newQty = Math.max(0, newQty - qty);
  else                       newQty = qty;

  await db.from('movements').insert({
    product_id: pid,
    type: movType,
    quantity: qty,
    note: document.getElementById('mm-note').value.trim() || null
  });
  await db.from('products').update({ quantity: newQty }).eq('id', pid);
  await dbLoad('products',  'products',  'name',       '*,categories(name,color),suppliers(name)');
  await dbLoad('movements', 'movements', 'created_at', '*,products(name,unit)', { asc: false, limit: 200 });
  cm('mod-movement');
  toast('Движението е записано ✅', 'ok');
  updateBadges();
  if (['dashboard','inventory','movements'].includes(curPage)) go(curPage);
}

function clientCard(c, td, tom) {
  const cq     = S.quotes.filter(q => q.client_id === c.id);
  const spent  = cq.filter(q => q.status==='accepted'||q.status==='deposit_paid').reduce((s,q)=>s+(q.total_price||0),0);
  const lastQ  = cq.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
  const dAgo   = lastQ ? Math.floor((Date.now()-new Date(lastQ.created_at))/864e5) : null;
  const inactive = dAgo !== null && dAgo > 120;
  const initials = c.name.split(' ').map(n=>n[0]||'').join('').slice(0,2).toUpperCase();

  // Рожден ден
  let bdBadge = '';
  if (c.birthday) {
    const md = c.birthday.slice(5);
    if (md === td.slice(5))  bdBadge = '<span style="background:var(--rose-l);color:var(--rose-d);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:4px">🎂 ДНЕС!</span>';
    else if (md === tom.slice(5)) bdBadge = '<span style="background:var(--amber-l);color:var(--amber);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:4px">🎂 УТРЕ</span>';
  }

  // Family birthdays
  const famBdays = (c.family_members||[]).filter(f=>{
    if(!f.birthday) return false;
    const md = f.birthday.slice(5);
    return md===td.slice(5)||md===tom.slice(5);
  });

  const CONTACT_IC = { whatsapp:'💬', viber:'📱', phone:'📞', email:'📧' };
  const cic = CONTACT_IC[c.preferred_contact||'phone'] || '📞';
  const refBadge = (c.referral_count||0)>=5?'🥇 VIP Посланик':(c.referral_count||0)>=3?'🥈 Супер посланик':(c.referral_count||0)>=1?'🥉 Посланик':'';

function openClientModal(id = null) {
  buildClientModal();

  const c = id ? S.clients.find(x => x.id === id) : null;
  document.getElementById('mcl-title').textContent = id ? 'Редактирай клиент' : 'Нов клиент';
  document.getElementById('mcl-name').value    = c?.name || '';
  document.getElementById('mcl-phone').value   = c?.phone || '';
  document.getElementById('mcl-email').value   = c?.email || '';
  document.getElementById('mcl-bday').value    = c?.birthday || '';
  document.getElementById('mcl-found').value   = c?.how_found || '';
  document.getElementById('mcl-contact').value = c?.preferred_contact || 'whatsapp';
  document.getElementById('mcl-style').value   = c?.style_pref || '';
  document.getElementById('mcl-budget').value  = c?.budget_range || '';
  document.getElementById('mcl-rating').value  = c?.rating || 5;

function addFamilyRow() {
  familyRows.push({ name:'', relation:'Дете', birthday:'' });
  renderFamilyRows();
}

async function saveClient() {
  const name = document.getElementById('mcl-name').value.trim();
  if (!name) { toast('Въведи имeто на клиента', 'err'); return; }
  const payload = {
    name,
    phone:             document.getElementById('mcl-phone').value.trim()  || null,
    email:             document.getElementById('mcl-email').value.trim()  || null,
    birthday:          document.getElementById('mcl-bday').value          || null,
    how_found:         document.getElementById('mcl-found').value         || null,
    preferred_contact: document.getElementById('mcl-contact').value,
    style_pref:        document.getElementById('mcl-style').value         || null,
    budget_range:      document.getElementById('mcl-budget').value        || null,
    rating:            +document.getElementById('mcl-rating').value       || 5,
    is_vip:            document.getElementById('mcl-vip').checked,
    notes:             document.getElementById('mcl-notes').value.trim()  || null,
    family_members:    familyRows.filter(f => f.name)
  };
  if (editId.client) await db.from('clients').update(payload).eq('id', editId.client);
  else               await db.from('clients').insert(payload);
  await dbLoad('clients', 'clients', 'name');
  cm('mod-client');
  toast(editId.client ? 'Клиентът е обновен ✅' : 'Клиентът е добавен ✅', 'ok');
  go(curPage);
}

async function delClient(id) {
  const cid = id || editId.client;
  if (!cid || !confirm('Изтрий клиента?')) return;
  await db.from('clients').delete().eq('id', cid);
  await dbLoad('clients', 'clients', 'name');
  cm('mod-client');
  toast('Клиентът е изтрит', 'ok');
  go(curPage);
}

let quoteFilter = 'all';
// qiRows е декларирана глобално по-горе

window.render_quotes = function(el) {
  const q = searchQ.toLowerCase();
  let list = S.quotes.filter(x =>
    !q || (x.clients?.name||'').toLowerCase().includes(q) ||
    (x.event_type||'').toLowerCase().includes(q) ||
    (x.address||'').toLowerCase().includes(q)
  );
  if (quoteFilter !== 'all') list = list.filter(x => x.status === quoteFilter);

  const counts = {};
  Object.keys(QSTATUS).forEach(k => counts[k] = S.quotes.filter(x => x.status === k).length);

  el.innerHTML = `
  <div class="topbar">
    <h2>Оферти <span style="font-size:13px;color:var(--ink-m);font-weight:400">${S.quotes.length}</span></h2>
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Търси клиент, тип, адрес..." value="${q}"
        oninput="searchQ=this.value;render_quotes(document.getElementById('page-content'))">
    </div>
    <button class="btn btn-primary" onclick="openQuoteModal()">+ Нова оферта</button>
  </div>
  <div class="content">
    <!-- Status filter tabs -->
    <div class="tabs">
      <div class="tab ${quoteFilter==='all'?'on':''}"
        onclick="quoteFilter='all';render_quotes(document.getElementById('page-content'))">
        Всички ${S.quotes.length}
      </div>
      ${Object.entries(QSTATUS).map(([k,s]) => counts[k] > 0 ? `
        <div class="tab ${quoteFilter===k?'on':''}"
          onclick="quoteFilter='${k}';render_quotes(document.getElementById('page-content'))">
          ${s.l} ${counts[k]}
        </div>` : '').join('')}
    </div>

    ${list.length === 0
      ? `<div class="empty-state"><div class="ico">📄</div><p>Няма оферти тук</p></div>`
      : `<div style="display:flex;flex-direction:column;gap:8px">
          ${list.map(q => quoteCard(q)).join('')}
        </div>`}
  </div>`;
};

function quoteCard(q) {
  const st   = QSTATUS[q.status] || QSTATUS.draft;
  const dl   = q.event_date ? daysFrom(q.event_date) : null;
  const urgent = dl !== null && dl <= 7 && dl >= 0;
  const past   = dl !== null && dl < 0;
  const items  = q.quote_items || [];

  return `
  <div style="background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);
              padding:14px 16px;border-left:4px solid ${urgent?'var(--red)':past?'var(--ink-l)':'transparent'};
              transition:.15s"
    onmouseover="this.style.boxShadow='0 2px 12px rgba(0,0,0,.07)'"
    onmouseout="this.style.boxShadow=''">

    <div style="display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap">
      <!-- Left info -->
      <div style="flex:1;min-width:180px">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap">
          <strong style="font-size:14px">${q.clients?.name || '—'}</strong>
          <span class="badge ${st.cls}" style="font-size:10px">${st.l}</span>
          ${urgent ? `<span style="background:var(--red-l);color:var(--red);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">
            ⚡ ${dl===0?'ДНЕС!':dl+'д'}
          </span>` : ''}
        </div>
        <div style="font-size:11px;color:var(--ink-m);display:flex;gap:10px;flex-wrap:wrap;line-height:1.6">
          ${q.event_date ? `<span>📅 ${q.event_date}${q.event_time?' · '+q.event_time:''}</span>` : ''}
          ${q.event_type ? `<span>🎉 ${q.event_type}</span>` : ''}
          ${q.address    ? `<span>📍 ${q.address.slice(0,35)}</span>` : ''}
          ${q.guests     ? `<span>👥 ${q.guests} гости</span>` : ''}
          ${items.length ? `<span>📦 ${items.length} арт.</span>` : ''}
        </div>
      </div>
      <!-- Right price -->
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:24px;font-weight:900;color:var(--ink);font-variant-numeric:tabular-nums">
          ${q.total_price > 0 ? eur0(q.total_price) : '—'}
        </div>
        <div style="font-size:11px;color:var(--ink-m);margin-top:2px">
          ${q.deposit_amount > 0
            ? q.deposit_paid
              ? `<span style="color:var(--green);font-weight:700">✅ депозит платен</span>`
              : `⏳ депозит ${eur0(q.deposit_amount)}`
            : ''}
        </div>
        ${q.valid_until ? `<div style="font-size:10px;color:var(--ink-l)">валидна до ${q.valid_until}</div>` : ''}
      </div>
    </div>

    <!-- Action buttons -->
    <div style="display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-secondary btn-sm" onclick="openMsg('${q.id}')">💬 Съобщение</button>
      <button class="btn btn-secondary btn-sm" onclick="openStatusModal('${q.id}','${q.status}')">🔄 Статус</button>
      <button class="btn btn-secondary btn-sm" onclick="printQuote('${q.id}')">📄 PDF</button>
      <button class="btn btn-secondary btn-sm" onclick="printPacking('${q.id}')">📦 Пакинг</button>
      <button class="btn btn-secondary btn-sm" onclick="printContract('${q.id}')">📃 Договор</button>
      <div style="margin-left:auto;display:flex;gap:4px">
        <button class="icon-btn" onclick="openQuoteModal('${q.id}')" title="Редактирай">✏️</button>
        <button class="icon-btn danger" onclick="delQuote('${q.id}')" title="Изтрий">🗑</button>
      </div>
    </div>
  </div>`;
}

function addQI() {
  qiRows.push({ product_id:'', description:'', section:'Декорация', quantity:1, unit_price:0, cost_price:0 });
  renderQIRows(); updateQISummary();
}

function addQIService(type) {
  const map = {
    delivery:    { description:'🚚 Доставка',  section:'Услуги', unit_price:30, cost_price:10 },
    assembly:    { description:'🔧 Монтаж',    section:'Услуги', unit_price:50, cost_price:20 },
    disassembly: { description:'📦 Демонтаж',  section:'Услуги', unit_price:30, cost_price:10 }
  };
  const s = map[type]; if (!s) return;
  qiRows.push({ product_id:'', description:s.description, section:s.section, quantity:1, unit_price:s.unit_price, cost_price:s.cost_price });
  renderQIRows(); updateQISummary();
}

    <div>
      <select onchange="onQIProdChange(${i},this.value)"

        <option value="">— или въведи описание —</option>

      </select>
      <input value="${r.description}" placeholder="Описание..."
        onchange="qiRows[${i}].description=this.value"
        style="width:100%;padding:5px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;background:var(--card);color:var(--ink)">
    </div>

function onQIProdChange(i, pid) {
  const p = S.products.find(x => x.id === pid);
  if (p) {
    qiRows[i].product_id  = pid;
    qiRows[i].description = p.name;
    qiRows[i].unit_price  = p.price     || 0;
    qiRows[i].cost_price  = p.cost_price || 0;
    renderQIRows();
  }
  updateQISummary();
}

function updateQISummary() {
  const totalP  = qiRows.reduce((s,r) => s + r.unit_price * r.quantity, 0);
  const totalC  = qiRows.reduce((s,r) => s + r.cost_price * r.quantity, 0);
  const deliv   = +document.getElementById('mq-deliv-price')?.value || 0;
  const grand   = totalP + deliv;
  const margin  = grand > 0 ? (grand - totalC) / grand * 100 : 0;
  const el = document.getElementById('mq-summary');
  if (!el) return;
  el.innerHTML = `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;text-align:center">
    <div>
      <div style="font-size:10px;color:var(--ink-m);margin-bottom:2px">Себестойност</div>
      <div style="font-weight:800;font-size:15px">${eur(totalC)}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--ink-m);margin-bottom:2px">Цена клиент</div>
      <div style="font-weight:800;font-size:15px;color:var(--rose-d)">${eur(grand)}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--ink-m);margin-bottom:2px">Печалба</div>
      <div style="font-weight:800;font-size:15px;color:${margin>30?'var(--green)':margin>15?'var(--amber)':'var(--red)'}">
        ${eur(grand - totalC)}
      </div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--ink-m);margin-bottom:2px">Марж</div>
      <div style="font-weight:800;font-size:15px;color:${margin>30?'var(--green)':margin>15?'var(--amber)':'var(--red)'}">
        ${margin.toFixed(0)}%
      </div>
    </div>
  </div>`;
}

async function saveQuote() {
  const clientId = document.getElementById('mq-client').value;
  if (!clientId) { toast('Избери клиент', 'err'); return; }
  const totalP = qiRows.reduce((s,r) => s + r.unit_price * r.quantity, 0);
  const totalC = qiRows.reduce((s,r) => s + r.cost_price * r.quantity, 0);
  const deliv  = +document.getElementById('mq-deliv-price').value || 0;
  const payload = {
    client_id:        clientId,
    event_type:       document.getElementById('mq-type').value,
    event_date:       document.getElementById('mq-date').value       || null,
    event_time:       document.getElementById('mq-time').value       || null,
    address:          document.getElementById('mq-addr').value.trim()|| null,
    guests:           +document.getElementById('mq-guests').value    || 20,
    has_delivery:     document.getElementById('mq-delivery').checked,
    has_assembly:     document.getElementById('mq-assembly').checked,
    has_disassembly:  document.getElementById('mq-disassembly').checked,
    delivery_price:   deliv,
    total_price:      totalP + deliv,
    total_cost:       totalC,
    deposit_amount:   +document.getElementById('mq-deposit').value   || 0,
    deposit_due_date: document.getElementById('mq-dep-due').value    || null,
    valid_until:      document.getElementById('mq-valid').value      || null,
    notes:            document.getElementById('mq-notes').value.trim()|| null,
    status: editId.quote
      ? (S.quotes.find(q => q.id === editId.quote)?.status || 'draft')
      : 'draft'
  };
  let qid = editId.quote;
  if (editId.quote) {
    await db.from('quotes').update(payload).eq('id', editId.quote);
    await db.from('quote_items').delete().eq('quote_id', editId.quote);
  } else {
    const { data } = await db.from('quotes').insert(payload).select().single();
    qid = data?.id;
  }
  if (qid && qiRows.length) {
    await db.from('quote_items').insert(qiRows.map(r => ({ ...r, quote_id: qid })));
  }
  await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});
  cm('mod-quote');
  toast('Офертата е записана ✅', 'ok');
  go(curPage);
}

async function delQuote(id) {
  const qid = id || editId.quote;
  if (!qid || !confirm('Изтрий офертата?')) return;
  await db.from('quote_items').delete().eq('quote_id', qid);
  await db.from('quotes').delete().eq('id', qid);
  await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});
  cm('mod-quote');
  toast('Изтрито', 'ok');
  go(curPage);
}

async function applyStatus(id, status, current) {
  cm('mod-status');
  const q = S.quotes.find(x => x.id === id);
  if (!q) return;
  await db.from('quotes').update({ status, updated_at: new Date().toISOString() }).eq('id', id);
  // Reserve inventory on acceptance
  if (status === 'accepted' && current !== 'accepted') {
    for (const item of (q.quote_items||[]).filter(i => i.product_id)) {
      const p = S.products.find(x => x.id === item.product_id);
      if (p && p.status === 'available')
        await db.from('products').update({ status:'reserved' }).eq('id', item.product_id);
    }
    await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
    toast('Офертата е приета — инвентарът е резервиран! ✅', 'ok');
  } else {
    toast('Статусът е обновен', 'ok');
  }
  await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});
  updateBadges();
  go(curPage);
}

function selectMsgTmpl(k) {
  const t = window._msgTmpl?.[k]; if (!t) return;
  document.getElementById('mmsg-text').value = t.t;
  document.querySelectorAll('[id^="tmpl-"]').forEach(b => {
    b.classList.toggle('btn-primary', b.id === `tmpl-${k}`);
    b.classList.toggle('btn-secondary', b.id !== `tmpl-${k}`);
  });
}
function copyMsg() {
  const txt = document.getElementById('mmsg-text')?.value || '';
  navigator.clipboard.writeText(txt).then(() => toast('Копирано!', 'ok'));
}
function copyMsgFirst() {
  const txt = document.getElementById('mmsg-text')?.value || '';
  navigator.clipboard.writeText(txt).catch(() => {});
}
function sendMsgEmail(email) {
  const txt  = document.getElementById('mmsg-text')?.value || '';
  const subj = encodeURIComponent('Оферта от Eleya Decor 🌸');
  window.open(`mailto:${email}?subject=${subj}&body=${encodeURIComponent(txt)}`);
}

}

  <table>
    <thead><tr><th>✓</th><th>Артикул</th><th>Раздел</th><th>Количество</th><th>Локация</th></tr></thead>

        <td>${p?.location||'Склад'}</td>

  win.document.close();
}
function printContract(id) { toast('Договорът се добавя в Блок 7 🚧', 'ok'); }

<script>
'use strict';
// ════════════════════════════════════════════
// БЛОК 4 — ИНВЕНТАР
// ════════════════════════════════════════════
var invView = 'grid', invCatF = 'all', invStatusF = 'all';

var PROD_STATUS = {
  available:{ l:'✅ Наличен',    cls:'bg' },
  ordered:  { l:'🔵 Поръчан',    cls:'bb' },
  reserved: { l:'🟡 Резервиран', cls:'bw' },
  sent:     { l:'🚚 Изпратен',   cls:'bw' },
  rented:   { l:'🤝 Под наем',   cls:'bp' },
  depleted: { l:'🔴 Изчерпан',   cls:'br' }
};
var ECO_MARK = { biodegradable:'🌿', recyclable:'♻️', reusable:'🔄', non_eco:'⚠️' };

window.render_inventory = function(el) {
  var q = searchQ.toLowerCase();
  var list = S.products.filter(function(p) {
    return !q || p.name.toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q);
  });
  if (invCatF    !== 'all') list = list.filter(function(p){ return p.category_id === invCatF; });
  if (invStatusF !== 'all') list = list.filter(function(p){ return p.status === invStatusF; });
  var lowCount = S.products.filter(function(p){ return p.quantity <= (p.min_quantity||0); }).length;

  el.innerHTML = `
  <div class="topbar">
    <h2>Инвентар <span style="font-size:13px;color:var(--ink-m);font-weight:400">${S.products.length}</span></h2>
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Търси продукт, SKU..." value="${q}"
        oninput="searchQ=this.value;render_inventory(document.getElementById('page-content'))">
    </div>
    <button class="btn btn-secondary btn-sm" onclick="openCatModal()">+ Категория</button>
    <button class="btn btn-primary" onclick="openProductModal()">+ Продукт</button>
  </div>
  <div class="content">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
      <div class="tabs" style="margin:0">
        <div class="tab ${invView==='grid'?'on':''}" onclick="invView='grid';render_inventory(document.getElementById('page-content'))">⊞ Карти</div>
        <div class="tab ${invView==='list'?'on':''}" onclick="invView='list';render_inventory(document.getElementById('page-content'))">☰ Списък</div>
      </div>
      <select onchange="invCatF=this.value;render_inventory(document.getElementById('page-content'))"
        style="padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;background:var(--card);color:var(--ink)">
        <option value="all">Всички категории</option>
        ${S.categories.map(function(c){ return '<option value="'+c.id+'"'+(invCatF===c.id?' selected':'')+'>'+(c.icon||'')+c.name+'</option>'; }).join('')}
      </select>
      <select onchange="invStatusF=this.value;render_inventory(document.getElementById('page-content'))"
        style="padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;background:var(--card);color:var(--ink)">
        <option value="all">Всички статуси</option>
        ${Object.entries(PROD_STATUS).map(function(e){ return '<option value="'+e[0]+'"'+(invStatusF===e[0]?' selected':'')+'>'+e[1].l+'</option>'; }).join('')}
      </select>
      ${lowCount > 0 ? '<span class="badge br">⚠️ '+lowCount+' ниски наличности</span>' : ''}
      <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="exportInvCSV()">⬇ CSV</button>
    </div>
    ${list.length === 0
      ? '<div class="empty-state"><div class="ico">📦</div><p>Няма продукти</p></div>'
      : invView === 'grid'
        ? '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px">'+list.map(function(p){ return productCard(p); }).join('')+'</div>'
        : productTable(list)}
  </div>`;
};

function productCard(p) {
  var st  = PROD_STATUS[p.status] || PROD_STATUS.available;
  var low = p.quantity <= (p.min_quantity||0);
  var eco = p.eco_status ? (ECO_MARK[p.eco_status]||'') : '';
  return '<div style="background:var(--card);border:1.5px solid '+(low?'var(--amber)':'var(--border)')+';border-radius:var(--r);overflow:hidden;transition:.15s" onmouseover="this.style.boxShadow=\'0 4px 16px rgba(0,0,0,.08)\'" onmouseout="this.style.boxShadow=\'\'">'+
    (p.image_url ? '<img src="'+p.image_url+'" style="width:100%;height:120px;object-fit:cover" onerror="this.style.display=\'none\'">' : '<div style="width:100%;height:80px;background:var(--rose-l);display:flex;align-items:center;justify-content:center;font-size:32px">🎈</div>')+
    '<div style="padding:10px">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:4px">'+
        '<div style="font-size:13px;font-weight:700;line-height:1.3">'+p.name+' '+eco+'</div>'+
        '<span class="badge '+st.cls+'" style="font-size:9px;flex-shrink:0">'+st.l+'</span>'+
      '</div>'+
      (p.categories?.name ? '<div style="font-size:10px;color:var(--ink-l);margin-bottom:6px">'+p.categories.name+'</div>' : '')+
      '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">'+
        '<span style="font-size:20px;font-weight:900;color:'+(p.quantity===0?'var(--red)':low?'var(--amber)':'var(--ink)')+'">'+
          p.quantity+'<span style="font-size:11px;font-weight:500;color:var(--ink-m)"> '+(p.unit||'бр')+'</span>'+
        '</span>'+
        (p.price>0 ? '<span style="font-size:12px;font-weight:700;color:var(--rose-d)">'+eur(p.price)+'</span>' : '')+
      '</div>'+
      '<div style="display:flex;gap:4px">'+
        '<button class="btn btn-primary btn-sm" style="flex:1;font-size:11px" onclick="quickMov(\''+p.id+'\')">± Движение</button>'+
        '<button class="icon-btn" onclick="openProductModal(\''+p.id+'\')">✏️</button>'+
        '<button class="icon-btn danger" onclick="delProduct(\''+p.id+'\')">🗑</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function productTable(list) {
  return '<div class="table-wrap"><table><thead><tr><th>Продукт</th><th>Категория</th><th>Налично</th><th>Мин</th><th>Себест.</th><th>Цена</th><th>Доставчик</th><th>Статус</th><th>Еко</th><th></th></tr></thead><tbody>'+
    list.map(function(p) {
      var st = PROD_STATUS[p.status] || PROD_STATUS.available;
      var low = p.quantity <= (p.min_quantity||0);
      return '<tr><td><strong>'+p.name+'</strong>'+(p.sku?'<div style="font-size:10px;color:var(--ink-l)">SKU: '+p.sku+'</div>':'')+'</td>'+
        '<td style="font-size:11px">'+(p.categories?.name||'—')+'</td>'+
        '<td><span style="font-weight:800;color:'+(p.quantity===0?'var(--red)':low?'var(--amber)':'var(--ink)')+'">'+p.quantity+'</span> '+(p.unit||'')+'</td>'+
        '<td style="color:var(--ink-m)">'+(p.min_quantity||0)+'</td>'+
        '<td>'+(p.cost_price>0?eur(p.cost_price):'—')+'</td>'+
        '<td style="font-weight:700">'+(p.price>0?eur(p.price):'—')+'</td>'+
        '<td style="font-size:11px">'+(p.suppliers?.name||'—')+'</td>'+
        '<td><span class="badge '+st.cls+'">'+st.l+'</span></td>'+
        '<td>'+(p.eco_status?(ECO_MARK[p.eco_status]||''):'—')+'</td>'+
        '<td><div style="display:flex;gap:3px">'+
          '<button class="icon-btn" onclick="quickMov(\''+p.id+'\')" title="Движение">±</button>'+
          '<button class="icon-btn" onclick="openProductModal(\''+p.id+'\')">✏️</button>'+
          '<button class="icon-btn danger" onclick="delProduct(\''+p.id+'\')">🗑</button>'+
        '</div></td></tr>';
    }).join('')+
  '</tbody></table></div>';
}

function buildProductModal() {
  if (document.getElementById('mod-product')) return;
  var m = document.createElement('div');
  m.id = 'mod-product'; m.className = 'overlay';
  m.innerHTML = `<div class="modal" style="width:560px">
    <div class="modal-hdr"><h3 id="mprod-title">Нов продукт</h3><button class="close-btn" onclick="cm('mod-product')">×</button></div>
    <div class="fr">
      <div class="fg"><label>Наименование *</label><input id="mprod-name" placeholder="Розови латекс балони"></div>
      <div class="fg"><label>Категория</label><select id="mprod-cat"></select></div>
    </div>
    <div class="fg"><label>Снимка — URL</label><input id="mprod-img" placeholder="https://..."></div>
    <div class="fr3">
      <div class="fg"><label>Количество</label><input type="number" id="mprod-qty" value="0" min="0"></div>
      <div class="fg"><label>Минимум (алерт)</label><input type="number" id="mprod-min" value="5" min="0"></div>
      <div class="fg"><label>Мерна ед.</label>
        <select id="mprod-unit"><option>бр</option><option>кг</option><option>г</option><option>л</option><option>м</option><option>кутия</option><option>пакет</option><option>компл.</option></select>
      </div>
    </div>
    <div class="fr">
      <div class="fg"><label>Цена закупуване (€)</label><input type="number" id="mprod-cost" value="0" min="0" step="0.01"></div>
      <div class="fg"><label>Цена продажба (€)</label><input type="number" id="mprod-price" value="0" min="0" step="0.01"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Доставчик</label><select id="mprod-sup"></select></div>
      <div class="fg"><label>Локация</label>
        <select id="mprod-loc"><option value="">— Избери —</option><option>Вкъщи</option><option>Склад</option><option>Другаде</option></select>
      </div>
    </div>
    <div class="fr">
      <div class="fg"><label>SKU / Код</label><input id="mprod-sku" placeholder="По желание"></div>
      <div class="fg"><label>Статус</label>
        <select id="mprod-status">
          <option value="available">✅ Наличен</option><option value="ordered">🔵 Поръчан</option>
          <option value="reserved">🟡 Резервиран</option><option value="depleted">🔴 Изчерпан</option>
        </select>
      </div>
    </div>
    <div class="fr">
      <div class="fg"><label>Тип артикул</label>
        <select id="mprod-type">
          <option value="standard">Стандартен</option><option value="handmade">Собствено производство</option>
          <option value="rental">За наем</option><option value="gift">Подаръчета за гости</option><option value="consumable">Консуматив</option>
        </select>
      </div>
      <div class="fg"><label>Еко статус 🌿</label>
        <select id="mprod-eco">
          <option value="">— Без маркировка —</option>
          <option value="biodegradable">🌿 Биоразградим (Gemar)</option>
          <option value="recyclable">♻️ Рециклируем</option>
          <option value="reusable">🔄 Многократна употреба</option>
          <option value="non_eco">⚠️ Нееко</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>Очаквана дата на получаване</label>
      <input type="date" id="mprod-expected">
      <div class="qdates"><span class="qd" onclick="qd('mprod-expected',3)">+3д</span><span class="qd" onclick="qd('mprod-expected',7)">+7д</span><span class="qd" onclick="qd('mprod-expected',14)">+14д</span></div>
    </div>
    <div class="fg"><label>Бележки</label><textarea id="mprod-notes" rows="2"></textarea></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="cm('mod-product')">Отказ</button>
      <button id="mprod-del" class="btn btn-danger" style="display:none" onclick="delProduct()">🗑 Изтрий</button>
      <button class="btn btn-primary" onclick="saveProduct()">Запази</button>
    </div>
  </div>`;
  m.addEventListener('click', function(e){ if(e.target===m) cm('mod-product'); });
  document.body.appendChild(m);
}

function openProductModal(id) {
  id = id || null;
  buildProductModal();
  editId.product = id;
  var p = id ? S.products.find(function(x){ return x.id===id; }) : null;
  document.getElementById('mprod-title').textContent = id ? 'Редактирай продукт' : 'Нов продукт';
  document.getElementById('mprod-name').value     = p ? p.name        : '';
  document.getElementById('mprod-img').value      = p ? (p.image_url||'') : '';
  document.getElementById('mprod-qty').value      = p ? (p.quantity??0) : 0;
  document.getElementById('mprod-min').value      = p ? (p.min_quantity||5) : 5;
  document.getElementById('mprod-unit').value     = p ? (p.unit||'бр') : 'бр';
  document.getElementById('mprod-cost').value     = p ? (p.cost_price||0) : 0;
  document.getElementById('mprod-price').value    = p ? (p.price||0) : 0;
  document.getElementById('mprod-sku').value      = p ? (p.sku||'') : '';
  document.getElementById('mprod-status').value   = p ? (p.status||'available') : 'available';
  document.getElementById('mprod-type').value     = p ? (p.product_type||'standard') : 'standard';
  document.getElementById('mprod-eco').value      = p ? (p.eco_status||'') : '';
  document.getElementById('mprod-expected').value = p ? (p.expected_date||'') : '';
  document.getElementById('mprod-notes').value    = p ? (p.notes||'') : '';
  document.getElementById('mprod-loc').value      = p ? (p.location||'') : '';
  document.getElementById('mprod-del').style.display = id ? 'inline-flex' : 'none';
  fillSel('mprod-cat', S.categories, function(c){ return c.id; }, function(c){ return (c.icon||'')+c.name; });
  if (p && p.category_id) document.getElementById('mprod-cat').value = p.category_id;
  fillSel('mprod-sup', S.suppliers, function(s){ return s.id; }, function(s){ return s.name; });
  if (p && p.supplier_id) document.getElementById('mprod-sup').value = p.supplier_id;
  om('mod-product');
}

async function saveProduct() {
  var name = document.getElementById('mprod-name').value.trim();
  if (!name) { toast('Въведи наименование', 'err'); return; }
  var payload = {
    name: name,
    image_url:    document.getElementById('mprod-img').value.trim()   || null,
    quantity:     +document.getElementById('mprod-qty').value         || 0,
    min_quantity: +document.getElementById('mprod-min').value         || 5,
    unit:          document.getElementById('mprod-unit').value,
    cost_price:   +document.getElementById('mprod-cost').value        || 0,
    price:        +document.getElementById('mprod-price').value       || 0,
    sku:           document.getElementById('mprod-sku').value.trim()  || null,
    status:        document.getElementById('mprod-status').value,
    product_type:  document.getElementById('mprod-type').value,
    eco_status:    document.getElementById('mprod-eco').value         || null,
    expected_date: document.getElementById('mprod-expected').value    || null,
    notes:         document.getElementById('mprod-notes').value.trim()|| null,
    category_id:   document.getElementById('mprod-cat').value         || null,
    supplier_id:   document.getElementById('mprod-sup').value         || null,
    location:      document.getElementById('mprod-loc').value         || null
  };
  if (editId.product) await db.from('products').update(payload).eq('id', editId.product);
  else                await db.from('products').insert(payload);
  await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
  cm('mod-product');
  toast('Продуктът е записан ✅', 'ok');
  updateBadges();
  go(curPage);
}

async function delProduct(id) {
  var pid = id || editId.product;
  if (!pid || !confirm('Изтрий продукта?')) return;
  await db.from('products').delete().eq('id', pid);
  await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
  cm('mod-product');
  toast('Изтрито', 'ok');
  updateBadges();
  go(curPage);
}

function exportInvCSV() {
  var rows = [['Наименование','SKU','Категория','Количество','Мерна ед.','Себест.€','Цена€','Доставчик','Статус','Еко','Локация']];
  S.products.forEach(function(p) {
    rows.push([p.name,p.sku||'',p.categories?.name||'',p.quantity,p.unit||'',p.cost_price||0,p.price||0,p.suppliers?.name||'',p.status,p.eco_status||'',p.location||'']);
  });
  var csv = rows.map(function(r){ return r.map(function(v){ return '"'+v+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download = 'inventory-'+today()+'.csv';
  a.click();
  toast('CSV изтеглен ✅', 'ok');
}

function openCatModal() {
  var m = document.getElementById('mod-cat');
  if (!m) {
    m = document.createElement('div'); m.id='mod-cat'; m.className='overlay';
    m.innerHTML='<div class="modal" style="width:340px"><div class="modal-hdr"><h3>Нова категория</h3><button class="close-btn" onclick="cm(\'mod-cat\')">×</button></div><div class="fg"><label>Наименование</label><input id="mcat-name" placeholder="Латекс балони"></div><div class="fr"><div class="fg"><label>Икона (emoji)</label><input id="mcat-icon" placeholder="🎈" maxlength="4"></div><div class="fg"><label>Цвят</label><input type="color" id="mcat-color" value="#c9748a" style="height:38px;padding:3px;width:100%"></div></div><div class="form-actions"><button class="btn btn-secondary" onclick="cm(\'mod-cat\')">Отказ</button><button class="btn btn-primary" onclick="saveCat()">Запази</button></div></div>';
    m.addEventListener('click',function(e){if(e.target===m)cm('mod-cat');});
    document.body.appendChild(m);
  }
  document.getElementById('mcat-name').value=''; document.getElementById('mcat-icon').value='';
  om('mod-cat');
}
async function saveCat() {
  var name=document.getElementById('mcat-name').value.trim();
  if(!name){toast('Въведи наименование','err');return;}
  await db.from('categories').insert({name:name,icon:document.getElementById('mcat-icon').value||null,color:document.getElementById('mcat-color').value});
  await dbLoad('categories','categories','name');
  cm('mod-cat'); toast('Категорията е добавена ✅','ok');
}

// ════════════════════════════════════════════
// БЛОК 4 — ТЕМИ
// ════════════════════════════════════════════
window.render_themes = function(el) {
  var q = searchQ.toLowerCase();
  var list = S.themes.filter(function(t){ return !q||t.name.toLowerCase().includes(q)||(t.tags||'').toLowerCase().includes(q); });
  el.innerHTML = `
  <div class="topbar">
    <h2>🎀 Теми <span style="font-size:13px;color:var(--ink-m);font-weight:400">${S.themes.length}</span></h2>
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Търси тема, таг..." value="${q}" oninput="searchQ=this.value;render_themes(document.getElementById('page-content'))">
    </div>
    <button class="btn btn-primary" onclick="openThemeModal()">+ Нова тема</button>
  </div>
  <div class="content">
    ${list.length===0
      ? '<div class="empty-state"><div class="ico">🎀</div><p>Няма теми все още</p><small>Създай тема — тя ще зареди оферта автоматично</small></div>'
      : '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:14px">'+list.map(function(t){return themeCard(t);}).join('')+'</div>'}
  </div>`;
};

function themeCard(t) {
  var items = t.theme_items||[];
  var totalP = items.reduce(function(s,i){return s+(i.price||0)*i.quantity;},0);
  var totalC = items.reduce(function(s,i){var p=S.products.find(function(pr){return pr.id===i.product_id;});return s+(p?(p.cost_price||p.price||0)*i.quantity:0);},0);
  var margin = totalP>0?Math.round((1-totalC/totalP)*100):0;
  var avail='green',availTxt='🟢 Готова';
  for(var i=0;i<items.length;i++){var p=S.products.find(function(pr){return pr.id===items[i].product_id;});if(!p||p.quantity===0){avail='red';availTxt='🔴 Не може';break;}if(p.quantity<items[i].quantity){avail='yellow';availTxt='🟡 Частично';}}
  var availColor=avail==='green'?'var(--green)':avail==='yellow'?'var(--amber)':'var(--red)';
  var availBg=avail==='green'?'var(--green-l)':avail==='yellow'?'var(--amber-l)':'var(--red-l)';
  var tags=t.tags?t.tags.split(',').map(function(tg){return '<span style="background:var(--rose-l);color:var(--rose-d);border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700">'+tg.trim()+'</span>';}).join(''):'';
  return '<div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:.15s" onmouseover="this.style.boxShadow=\'0 4px 20px rgba(0,0,0,.09)\'" onmouseout="this.style.boxShadow=\'\'">'+
    (t.image_url?'<img src="'+t.image_url+'" style="width:100%;height:148px;object-fit:cover" onerror="this.style.display=\'none\'">':'<div style="width:100%;height:90px;background:linear-gradient(135deg,var(--rose-l),var(--rose-ll));display:flex;align-items:center;justify-content:center;font-size:44px">🎀</div>')+
    '<div style="padding:12px">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px">'+
        '<div><div style="font-size:14px;font-weight:700">'+t.name+'</div>'+(t.event_type?'<div style="font-size:10px;color:var(--ink-l);margin-top:1px">'+t.event_type+'</div>':'')+'</div>'+
        '<span style="background:'+availBg+';color:'+availColor+';border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap">'+availTxt+'</span>'+
      '</div>'+
      (tags?'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px">'+tags+'</div>':'')+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px">'+
        '<div style="background:var(--bg);border-radius:7px;padding:7px;text-align:center"><div style="font-size:16px;font-weight:900">'+items.length+'</div><div style="font-size:9px;color:var(--ink-l);font-weight:700;text-transform:uppercase;margin-top:1px">Арт.</div></div>'+
        '<div style="background:var(--bg);border-radius:7px;padding:7px;text-align:center"><div style="font-size:13px;font-weight:900;color:var(--rose-d)">'+(totalP>0?eur0(totalP):'—')+'</div><div style="font-size:9px;color:var(--ink-l);font-weight:700;text-transform:uppercase;margin-top:1px">Цена</div></div>'+
        '<div style="background:var(--bg);border-radius:7px;padding:7px;text-align:center"><div style="font-size:13px;font-weight:900;color:'+(margin>=30?'var(--green)':margin>=15?'var(--amber)':'var(--red)')+'">'+margin+'%</div><div style="font-size:9px;color:var(--ink-l);font-weight:700;text-transform:uppercase;margin-top:1px">Марж</div></div>'+
      '</div>'+
      (items.length>0?'<div style="margin-bottom:9px">'+items.slice(0,3).map(function(i){var p=S.products.find(function(pr){return pr.id===i.product_id;});var ok=p&&p.quantity>=i.quantity;return '<div style="display:flex;gap:6px;font-size:11px;padding:2px 0;align-items:center"><span style="color:'+(p?(ok?'var(--green)':'var(--amber)'):'var(--red)')+';width:12px;text-align:center">'+(p?(ok?'✓':'⚠'):'✗')+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(p?p.name:'Изтрит артикул')+'</span><span style="color:var(--ink-l)">×'+i.quantity+'</span></div>';}).join('')+(items.length>3?'<div style="font-size:10px;color:var(--ink-l);margin-top:2px">+ '+(items.length-3)+' още</div>':'')+'</div>':'')+
      '<div style="display:flex;gap:5px">'+
        '<button class="btn btn-primary btn-sm" style="flex:1;font-size:11px" onclick="createQuoteFromTheme(\''+t.id+'\')">🎉 Нова оферта</button>'+
        '<button class="icon-btn" onclick="openThemeModal(\''+t.id+'\')">✏️</button>'+
        '<button class="icon-btn danger" onclick="delTheme(\''+t.id+'\')">🗑</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function buildThemeModal() {
  if(document.getElementById('mod-theme'))return;
  var m=document.createElement('div');m.id='mod-theme';m.className='overlay';
  m.innerHTML=`<div class="modal" style="width:600px">
    <div class="modal-hdr"><h3 id="mth-title">Нова тема</h3><button class="close-btn" onclick="cm('mod-theme')">×</button></div>
    <div class="fr">
      <div class="fg"><label>Наименование *</label><input id="mth-name" placeholder="Принцеса Роза"></div>
      <div class="fg"><label>Тип събитие</label><select id="mth-type"><option value="">— Всякакви —</option><option>Рожден ден</option><option>Кръщене</option><option>Сватба</option><option>Корпоративно</option><option>Друго</option></select></div>
    </div>
    <div class="fg"><label>Описание</label><textarea id="mth-desc" rows="2"></textarea></div>

      <div class="fg"><label>Макс. гости</label><input type="number" id="mth-maxg" value="50" min="1"></div>
    </div>
