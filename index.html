    <div style="display:grid;grid-template-columns:1fr 55px 80px 75px 22px;gap:5px;margin-bottom:4px">
      <div style="font-size:9.5px;color:var(--ink-l);font-weight:700;text-transform:uppercase">Артикул</div>
      <div style="font-size:9.5px;color:var(--ink-l);font-weight:700;text-align:center">Бр</div>
      <div style="font-size:9.5px;color:var(--ink-l);font-weight:700;text-align:center">Цена €</div>
      <div style="font-size:9.5px;color:var(--ink-l);font-weight:700">Раздел</div><div></div>
    </div>
    <div id="mth-items"></div>
    <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="addThemeItemRow()">+ Добави артикул</button>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="cm('mod-theme')">Отказ</button>
      <button id="mth-del" class="btn btn-danger" style="display:none" onclick="delTheme()">🗑 Изтрий</button>
      <button class="btn btn-primary" onclick="saveTheme()">Запази темата</button>
    </div>
  </div>`;
  m.addEventListener('click',function(e){if(e.target===m)cm('mod-theme');});
  document.body.appendChild(m);
}

function openThemeModal(id){
  id=id||null; buildThemeModal(); editId.theme=id;
  var t=id?S.themes.find(function(x){return x.id===id;}):null;
  document.getElementById('mth-title').textContent=id?'Редактирай тема':'Нова тема';
  document.getElementById('mth-name').value=t?t.name:'';
  document.getElementById('mth-type').value=t?(t.event_type||''):'';
  document.getElementById('mth-desc').value=t?(t.description||''):'';
  document.getElementById('mth-tags').value=t?(t.tags||''):'';
  document.getElementById('mth-img').value=t?(t.image_url||''):'';
  document.getElementById('mth-ming').value=t?(t.min_guests||10):10;
  document.getElementById('mth-maxg').value=t?(t.max_guests||50):50;
  document.getElementById('mth-del').style.display=id?'inline-flex':'none';
  var el=document.getElementById('mth-items');el.innerHTML='';
  (t?t.theme_items||[]:[]).forEach(function(i){addThemeItemRow(i);});
  if(!t)addThemeItemRow();
  om('mod-theme');
}

function addThemeItemRow(existing){
  existing=existing||null;
  var rid='thr'+Date.now()+Math.random().toString(36).slice(2,5);
  var row=document.createElement('div');row.id=rid;
  row.style.cssText='display:grid;grid-template-columns:1fr 55px 80px 75px 22px;gap:5px;margin-bottom:5px;align-items:center';
  var opts=S.products.map(function(p){return '<option value="'+p.id+'"'+(existing&&existing.product_id===p.id?' selected':'')+'>'+p.name+' ('+p.quantity+' '+(p.unit||'бр')+')</option>';}).join('');
  row.innerHTML='<select style="padding:5px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;background:var(--card);color:var(--ink)"><option value="">— Артикул —</option>'+opts+'</select>'+
    '<input type="number" min="1" value="'+(existing?existing.quantity:1)+'" style="padding:5px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;text-align:center;background:var(--card);color:var(--ink)">'+
    '<input type="number" min="0" step="0.01" value="'+(existing?existing.price:0)+'" style="padding:5px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;text-align:center;background:var(--card);color:var(--ink)">'+
    '<select style="padding:5px 4px;border:1.5px solid var(--border);border-radius:6px;font-size:10px;background:var(--card);color:var(--ink)">'+
      [['balloon','🎈 Балони'],['table','🪑 Маси'],['equipment','🔧 Оборудв.'],['other','📦 Друго']].map(function(x){return '<option value="'+x[0]+'"'+(existing&&existing.section===x[0]?' selected':'')+'>'+x[1]+'</option>';}).join('')+
    '</select>'+
    '<button onclick="document.getElementById(\''+rid+'\').remove()" style="width:22px;height:22px;border:1px solid var(--red-l);background:var(--red-l);border-radius:5px;cursor:pointer;color:var(--red);font-size:14px;display:flex;align-items:center;justify-content:center;padding:0">×</button>';
  document.getElementById('mth-items').appendChild(row);
}

async function saveTheme(){
  var name=document.getElementById('mth-name').value.trim();
  if(!name){toast('Въведи наименование','err');return;}
  var payload={name:name,event_type:document.getElementById('mth-type').value||null,description:document.getElementById('mth-desc').value.trim()||null,tags:document.getElementById('mth-tags').value.trim()||null,image_url:document.getElementById('mth-img').value.trim()||null,min_guests:+document.getElementById('mth-ming').value||10,max_guests:+document.getElementById('mth-maxg').value||50};
  var tid=editId.theme;
  if(editId.theme){await db.from('themes').update(payload).eq('id',editId.theme);}
  else{var res=await db.from('themes').insert(payload).select().single();tid=res.data?.id;}
  if(tid){
    await db.from('theme_items').delete().eq('theme_id',tid);
    var rows=document.getElementById('mth-items').querySelectorAll('[id^="thr"]');
    var items=[];
    rows.forEach(function(row){var sels=row.querySelectorAll('select');var inps=row.querySelectorAll('input');var pid=sels[0].value;if(pid)items.push({theme_id:tid,product_id:pid,quantity:+inps[0].value||1,price:+inps[1].value||0,section:sels[1].value});});
    if(items.length)await db.from('theme_items').insert(items);
  }
  await dbLoad('themes','themes','name','*,theme_items(*)');
  cm('mod-theme');toast('Темата е записана ✅','ok');go(curPage);
}

async function delTheme(id){
  var tid=id||editId.theme;
  if(!tid||!confirm('Изтрий темата?'))return;
  await db.from('theme_items').delete().eq('theme_id',tid);
  await db.from('themes').delete().eq('id',tid);
  await dbLoad('themes','themes','name','*,theme_items(*)');
  cm('mod-theme');toast('Изтрито','ok');go(curPage);
}

function createQuoteFromTheme(tid){
  var t=S.themes.find(function(x){return x.id===tid;});
  if(!t)return;
  openQuoteModal();
  setTimeout(function(){
    qiRows=(t.theme_items||[]).map(function(i){
      var p=S.products.find(function(pr){return pr.id===i.product_id;});
      return {product_id:i.product_id,description:p?p.name:'',section:({'balloon':'Балони','table':'Маси','equipment':'Оборудване','other':'Декорация'}[i.section]||'Декорация'),quantity:i.quantity,unit_price:i.price||(p?p.price:0)||0,cost_price:p?(p.cost_price||0):0};
    });
    renderQIRows();updateQISummary();
    if(t.event_type)document.getElementById('mq-type').value=t.event_type;
    toast('Темата "'+t.name+'" е заредена 🎀','ok');
  },200);
}

<script>

var finTab = 'overview';

  m.innerHTML = `<div class="modal" style="width:460px">

    <div class="fr">
      <div class="fg"><label>Сума (€) *</label><input type="number" id="mex-amount" value="0" min="0" step="0.01"></div>
      <div class="fg"><label>Дата</label>
        <input type="date" id="mex-date">
        <div class="qdates">
          <span class="qd" onclick="qd('mex-date',0)">Днес</span>

          <option>Консумативи</option><option>Комунални</option><option>Друго</option>
        </select>
      </div>
      <div class="fg"><label>Доставчик</label><select id="mex-sup"></select></div>
    </div>
    <div class="fg"><label>Фактура № / Бележка</label><input id="mex-note" placeholder="Фактура 2024/0123..."></div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="cm('mod-expense')">Отказ</button>
      <button id="mex-del" class="btn btn-danger" style="display:none" onclick="delExpense()">🗑 Изтрий</button>
      <button class="btn btn-primary" onclick="saveExpense()">Запази</button>

function openExpenseModal(id) {
  id = id || null;
  buildExpenseModal();
  editId.expense = id;
  var e = id ? S.expenses.find(function(x){ return x.id===id; }) : null;
  document.getElementById('mex-title').textContent = id ? 'Редактирай разход' : 'Нов разход';
  document.getElementById('mex-desc').value   = e ? e.description       : '';
  document.getElementById('mex-amount').value = e ? (e.amount||0)       : 0;
  document.getElementById('mex-date').value   = e ? (e.date||today())   : today();
  document.getElementById('mex-cat').value    = e ? (e.category||'Материали') : 'Материали';
  document.getElementById('mex-note').value   = e ? (e.receipt_note||'') : '';
  document.getElementById('mex-del').style.display = id ? 'inline-flex' : 'none';
  fillSel('mex-sup', S.suppliers, function(s){ return s.id; }, function(s){ return s.name; });
  if (e && e.supplier_id) document.getElementById('mex-sup').value = e.supplier_id;
  om('mod-expense');
}

async function saveExpense() {
  var desc   = document.getElementById('mex-desc').value.trim();
  var amount = +document.getElementById('mex-amount').value || 0;
  if (!desc || !amount) { toast('Въведи описание и сума', 'err'); return; }
  var payload = {
    description:  desc,
    amount:       amount,
    date:         document.getElementById('mex-date').value   || today(),
    category:     document.getElementById('mex-cat').value,
    supplier_id:  document.getElementById('mex-sup').value    || null,
    receipt_note: document.getElementById('mex-note').value.trim() || null
  };
  if (editId.expense) await db.from('expenses').update(payload).eq('id', editId.expense);
  else                await db.from('expenses').insert(payload);
  await dbLoad('expenses','expenses','date','*,suppliers(name)',{asc:false,limit:300});
  cm('mod-expense');
  toast('Разходът е записан ✅', 'ok');
  if (curPage==='finances') go('finances');
}

async function delExpense(id) {
  var eid = id || editId.expense;
  if (!eid || !confirm('Изтрий разхода?')) return;
  await db.from('expenses').delete().eq('id', eid);
  await dbLoad('expenses','expenses','date','*,suppliers(name)',{asc:false,limit:300});
  cm('mod-expense');
  toast('Изтрито', 'ok');
  if (curPage==='finances') go('finances');
}

function exportFinCSV() {
  var rows = [['Тип','Дата','Описание','Категория','Контрагент','Сума €','Бележка']];
  S.quotes.filter(function(q){
    return (q.status==='accepted'||q.status==='deposit_paid');
  }).forEach(function(q){
    rows.push(['ПРИХОД', q.event_date||'', q.clients?q.clients.name:'', q.event_type||'', '', (q.total_price||0).toFixed(2), '']);
  });
  S.expenses.forEach(function(e){
    rows.push(['РАЗХОД', e.date||'', e.description, e.category||'', e.suppliers?e.suppliers.name:'', (e.amount||0).toFixed(2), e.receipt_note||'']);
  });
  var csv = rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'eleya-finances-'+today().slice(0,7)+'.csv';
  a.click();
  toast('CSV изтеглен ✅', 'ok');
}

            var accepted = S.quotes.filter(function(q){return q.status==='accepted'||q.status==='deposit_paid';}).length;
            var declined = S.quotes.filter(function(q){return q.status==='declined';}).length;
            var pending  = S.quotes.filter(function(q){return q.status==='sent'||q.status==='seen';}).length;
            var expired  = S.quotes.filter(function(q){return q.status==='expired';}).length;
            var convRate = total>0?(accepted/total*100):0;
            var items = [
              ['✅ Приети',    accepted, 'var(--green)'],
              ['📤 Чакат',     pending,  'var(--blue)'],
              ['❌ Отказани',  declined, 'var(--red)'],
              ['⏰ Изтекли',   expired,  'var(--amber)'],
            ];
            return '<div style="text-align:center;margin-bottom:16px">'+
              '<div style="font-size:42px;font-weight:900;color:var(--green)">'+convRate.toFixed(0)+'%</div>'+
              '<div style="font-size:12px;color:var(--ink-m)">конверсия (от '+total+' оферти)</div>'+
            '</div>'+
            items.map(function(x){ var pct=total>0?(x[1]/total*100):0; return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
              '<div style="width:80px;font-size:12px;font-weight:600">'+x[0]+'</div>'+
              '<div style="flex:1;height:8px;background:var(--border);border-radius:4px">'+
                '<div style="width:'+pct.toFixed(0)+'%;height:8px;background:'+x[2]+';border-radius:4px;transition:.3s"></div>'+
              '</div>'+
              '<div style="width:40px;text-align:right;font-size:12px;font-weight:700">'+x[1]+'</div>'+
            '</div>'; }).join('');
          })()}
        </div>
      </div>
    </div>

    <!-- Оферти по месец -->
    <div class="table-wrap" style="margin-top:14px">
      <div class="table-hdr"><h3>📅 Приходи по месец — ${yr}</h3></div>
      <table><thead><tr>
        <th>Месец</th><th>Оферти</th><th>Приход</th><th>Разходи</th><th>Нетно</th><th>Тренд</th>
      </tr></thead><tbody>
      ${['01','02','03','04','05','06','07','08','09','10','11','12'].map(function(mn,idx){
        var key   = yr+'-'+mn;
        var mRevQ2= S.quotes.filter(function(q){return q.event_date&&q.event_date.startsWith(key)&&(q.status==='accepted'||q.status==='deposit_paid');});
        var mR    = mRevQ2.reduce(function(s,q){return s+(q.total_price||0);},0);
        var mE    = S.expenses.filter(function(e){return e.date&&e.date.startsWith(key);}).reduce(function(s,e){return s+(e.amount||0);},0);
        var mN    = mR-mE;
        var MONTHS_BG2=['Януари','Февруари','Март','Април','Май','Юни','Юли','Август','Септември','Октомври','Ноември','Декември'];
        var isCur = key===tm;
        var barW  = totalRev>0?(mR/totalRev*120).toFixed(0):0;
        return '<tr style="'+(isCur?'background:var(--rose-ll);':'')+'">' +
          '<td style="font-weight:'+(isCur?'700':'400')+'">'+MONTHS_BG2[idx]+(isCur?' ◀':'')+' </td>'+
          '<td>'+mRevQ2.length+'</td>'+
          '<td style="font-weight:700;color:'+(mR>0?'var(--green)':'var(--ink-l)')+'">'+eur0(mR)+'</td>'+
          '<td style="color:'+(mE>0?'var(--red)':'var(--ink-l)')+'">'+eur0(mE)+'</td>'+
          '<td style="font-weight:700;color:'+(mN>=0?'var(--green)':'var(--red)')+'">'+eur0(mN)+'</td>'+
          '<td><div style="width:'+Math.min(barW,120)+'px;height:6px;background:var(--rose);border-radius:3px;min-width:'+(mR>0?4:0)+'px"></div></td>'+
        '</tr>';
      }).join('')}
      </tbody></table>
    </div>
  </div>`;
};
</script>

<script>
'use strict';
// ════════════════════════════════════════════
// БЛОК 6 — НАЕМИ
// ════════════════════════════════════════════
// rentalRows е декларирана глобално по-горе

window.render_rentals = function(el) {
  var td = today();
  var active   = S.rentals.filter(function(r){ return r.status==='active'; }).length;
  var overdue  = S.rentals.filter(function(r){ return r.status==='active'&&r.return_date&&r.return_date<td; }).length;
  var returned = S.rentals.filter(function(r){ return r.status==='returned'; }).length;

  el.innerHTML = `
  <div class="topbar">
    <h2>📅 Наеми <span style="font-size:13px;color:var(--ink-m);font-weight:400">${S.rentals.length}</span></h2>
    <button class="btn btn-primary" onclick="openRentalModal()">+ Нов наем</button>
  </div>
  <div class="content">
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="stat-card ${active>0?'accent':''}"><div class="lbl">Активни наеми</div><div class="val">${active}</div><div class="sub">дадени в момента</div></div>
      <div class="stat-card ${overdue>0?'bad':''}"><div class="lbl">Просрочени</div><div class="val">${overdue}</div><div class="sub">трябва да се върнат</div></div>
      <div class="stat-card"><div class="lbl">Върнати</div><div class="val">${returned}</div><div class="sub">приключени наеми</div></div>
    </div>
    ${overdue>0?'<div class="alert red">⚠️ <strong>'+overdue+'</strong> наема са просрочени — свържи се с клиентите!</div>':''}
    <div class="table-wrap">
      <table><thead><tr>
        <th>Клиент</th><th>Телефон</th><th>Събитие</th><th>Връщане</th>
        <th>Артикули</th><th>Цена</th><th>Депозит</th><th>Статус</th><th></th>
      </tr></thead><tbody>
      ${S.rentals.length===0
        ?'<tr><td colspan="9"><div class="empty-state"><div class="ico">📅</div><p>Няма наеми все още</p></div></td></tr>'
        :S.rentals.map(function(r){
          var isOverdue = r.status==='active'&&r.return_date&&r.return_date<td;
          var st = isOverdue?'overdue':r.status;
          var stMap = {active:{l:'Активен',cls:'bg'},returned:{l:'Върнат',cls:'bd'},overdue:{l:'⚠️ Просрочен!',cls:'br'},cancelled:{l:'Отказан',cls:'bd'}};
          var stInfo = stMap[st]||{l:st,cls:'bd'};
          var itemCount = (r.rental_items||[]).reduce(function(s,i){return s+i.quantity;},0);
          return '<tr style="'+(isOverdue?'background:var(--red-l)':'')+'">' +
            '<td><strong>'+r.client_name+'</strong>'+(r.note?'<div style="font-size:10px;color:var(--ink-l)">'+r.note.slice(0,30)+'</div>':'')+'</td>'+
            '<td style="font-size:12px">'+(r.client_phone||'—')+'</td>'+
            '<td style="font-size:12px">'+(r.event_date||'—')+'</td>'+
            '<td style="font-size:12px;color:'+(isOverdue?'var(--red)':'inherit')+'"><strong>'+(r.return_date||'—')+'</strong></td>'+
            '<td><span class="badge bb">'+itemCount+' арт.</span></td>'+
            '<td style="font-weight:700">'+(r.total_price>0?eur(r.total_price):'—')+'</td>'+
            '<td>'+(r.deposit>0?eur(r.deposit):'—')+'</td>'+
            '<td><span class="badge '+stInfo.cls+'">'+stInfo.l+'</span></td>'+
            '<td><div style="display:flex;gap:3px">'+
              (r.status==='active'?'<button class="btn btn-success btn-xs" onclick="returnRental(\''+r.id+'\')">↩ Върни</button>':'')+
              '<button class="icon-btn" onclick="viewRentalItems(\''+r.id+'\')" title="Артикули">📋</button>'+
              '<button class="icon-btn danger" onclick="delRental(\''+r.id+'\')">🗑</button>'+
            '</div></td>'+
          '</tr>';
        }).join('')}
      </tbody></table>
    </div>
  </div>`;
};

function buildRentalModal() {
  if (document.getElementById('mod-rental')) return;
  var m = document.createElement('div');
  m.id = 'mod-rental'; m.className = 'overlay';
  m.innerHTML = `<div class="modal" style="width:580px">
    <div class="modal-hdr"><h3>Нов наем</h3><button class="close-btn" onclick="cm('mod-rental')">×</button></div>
    <div class="fr">
      <div class="fg"><label>Клиент *</label><input id="mr-client" placeholder="Мария Иванова"></div>
      <div class="fg"><label>Телефон</label><input id="mr-phone" placeholder="+359..."></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Дата на събитие</label>
        <input type="date" id="mr-evdate">
        <div class="qdates">
          <span class="qd" onclick="qd('mr-evdate',0)">Днес</span>
          <span class="qd" onclick="qd('mr-evdate',1)">Утре</span>
          <span class="qd" onclick="qd('mr-evdate',7)">+7д</span>
        </div>
      </div>
      <div class="fg"><label>Дата на връщане</label>
        <input type="date" id="mr-retdate">
        <div class="qdates">
          <span class="qd" onclick="qd('mr-retdate',1)">+1д</span>
          <span class="qd" onclick="qd('mr-retdate',3)">+3д</span>
          <span class="qd" onclick="qd('mr-retdate',7)">+7д</span>
        </div>
      </div>
    </div>
    <div class="fr">
      <div class="fg"><label>Депозит (€)</label><input type="number" id="mr-deposit" value="0" min="0" step="0.01"></div>
      <div class="fg"><label>Обща цена (€)</label><input type="number" id="mr-total" value="0" min="0" step="0.01"></div>
    </div>
    <div class="fg"><label>Бележка / Адрес</label><textarea id="mr-note" rows="2" placeholder="Адрес, специални инструкции..."></textarea></div>
    <div class="sdiv">Артикули под наем</div>
    <div id="mr-items"></div>
    <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="addRentalRow()">+ Добави артикул</button>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="cm('mod-rental')">Отказ</button>
      <button class="btn btn-primary" onclick="saveRental()">Запази наема</button>
    </div>
  </div>`;
  m.addEventListener('click', function(e){ if(e.target===m) cm('mod-rental'); });
  document.body.appendChild(m);
}

function openRentalModal() {
  buildRentalModal();
  ['mr-client','mr-phone','mr-note'].forEach(function(id){ document.getElementById(id).value=''; });
  ['mr-deposit','mr-total'].forEach(function(id){ document.getElementById(id).value='0'; });
  ['mr-evdate','mr-retdate'].forEach(function(id){ document.getElementById(id).value=''; });
  rentalRows = [];
  renderRentalRows();
  om('mod-rental');
}

function addRentalRow() {
  rentalRows.push({ product_id:'', quantity:1 });
  renderRentalRows();
}

function renderRentalRows() {
  var el = document.getElementById('mr-items');
  if (!el) return;
  el.innerHTML = rentalRows.map(function(r,i){
    var opts = S.products.map(function(p){ return '<option value="'+p.id+'"'+(r.product_id===p.id?' selected':'')+'>'+p.name+' ('+p.quantity+' '+( p.unit||'бр')+')</option>'; }).join('');
    return '<div style="display:grid;grid-template-columns:1fr 80px 22px;gap:5px;margin-bottom:5px;align-items:center">'+
      '<select onchange="rentalRows['+i+'].product_id=this.value" style="padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;background:var(--card);color:var(--ink)">'+
        '<option value="">— Артикул —</option>'+opts+
      '</select>'+
      '<input type="number" min="1" value="'+r.quantity+'" onchange="rentalRows['+i+'].quantity=+this.value||1" style="padding:6px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:12px;text-align:center;background:var(--card);color:var(--ink)">'+
      '<button onclick="rentalRows.splice('+i+',1);renderRentalRows()" style="width:22px;height:22px;border:1px solid var(--red-l);background:var(--red-l);border-radius:5px;cursor:pointer;color:var(--red);font-size:14px;display:flex;align-items:center;justify-content:center;padding:0">×</button>'+
    '</div>';
  }).join('') || '<p style="font-size:12px;color:var(--ink-l);margin-bottom:6px">Добави артикули с бутона по-долу</p>';
}

async function saveRental() {
  var client = document.getElementById('mr-client').value.trim();
  if (!client) { toast('Въведи клиент', 'err'); return; }
  var res = await db.from('rentals').insert({
    client_name:  client,
    client_phone: document.getElementById('mr-phone').value.trim()||null,
    event_date:   document.getElementById('mr-evdate').value||null,
    return_date:  document.getElementById('mr-retdate').value||null,
    deposit:      +document.getElementById('mr-deposit').value||0,
    total_price:  +document.getElementById('mr-total').value||0,
    note:         document.getElementById('mr-note').value.trim()||null,
    status:       'active'
  }).select().single();
  var rid = res.data?.id;
  if (rid && rentalRows.length) {
    var items = rentalRows.filter(function(r){ return r.product_id; }).map(function(r){ return { rental_id:rid, product_id:r.product_id, quantity:r.quantity, returned_quantity:0 }; });
    if (items.length) await db.from('rental_items').insert(items);
  }
  await dbLoad('rentals','rentals','created_at','*,rental_items(id,quantity,returned_quantity,products(name,unit))');
  cm('mod-rental');
  toast('Наемът е записан ✅', 'ok');
  go(curPage);
}

async function returnRental(id) {
  if (!confirm('Маркирай наема като върнат?')) return;
  await db.from('rentals').update({ status:'returned', returned_date:today() }).eq('id',id);
  await dbLoad('rentals','rentals','created_at','*,rental_items(id,quantity,returned_quantity,products(name,unit))');
  toast('Наемът е върнат ✅', 'ok');
  go(curPage);
}

function viewRentalItems(id) {
  var r = S.rentals.find(function(x){ return x.id===id; });
  if (!r) return;
  var items = r.rental_items||[];
  var m = document.getElementById('mod-rental-view');
  if (!m) { m=document.createElement('div');m.id='mod-rental-view';m.className='overlay';document.body.appendChild(m); m.addEventListener('click',function(e){if(e.target===m)cm('mod-rental-view');}); }
  m.innerHTML = '<div class="modal" style="width:460px">'+
    '<div class="modal-hdr"><h3>📋 '+r.client_name+'</h3><button class="close-btn" onclick="cm(\'mod-rental-view\')">×</button></div>'+
    '<div style="font-size:12px;color:var(--ink-m);margin-bottom:12px">Събитие: '+(r.event_date||'—')+' · Връщане: '+(r.return_date||'—')+'</div>'+
    '<table><thead><tr><th>Артикул</th><th>Дадено</th><th>Върнато</th><th>Статус</th></tr></thead><tbody>'+
    items.map(function(i){
      var returned = i.returned_quantity||0;
      var ok = returned>=i.quantity;
      return '<tr>'+
        '<td><strong>'+(i.products?i.products.name:'—')+'</strong></td>'+
        '<td>'+i.quantity+' '+(i.products?i.products.unit||'бр':'бр')+'</td>'+
        '<td style="color:'+(ok?'var(--green)':returned>0?'var(--amber)':'var(--red)')+'"><strong>'+returned+'</strong></td>'+
        '<td><span class="badge '+(ok?'bg':returned>0?'bw':'br')+'">'+(ok?'✅ Върнат':returned>0?'⚠️ Частично':'❌ Не върнат')+'</span></td>'+
      '</tr>';
    }).join('')+
    '</tbody></table>'+
    '<div class="form-actions"><button class="btn btn-secondary" onclick="cm(\'mod-rental-view\')">Затвори</button></div>'+
  '</div>';
  om('mod-rental-view');
}

async function delRental(id) {
  if (!confirm('Изтрий наема?')) return;
  await db.from('rental_items').delete().eq('rental_id',id);
  await db.from('rentals').delete().eq('id',id);
  await dbLoad('rentals','rentals','created_at','*,rental_items(id,quantity,returned_quantity,products(name,unit))');
  toast('Изтрито', 'ok');
  go(curPage);
}

// ════════════════════════════════════════════
// БЛОК 6 — ДОСТАВЧИЦИ
// ════════════════════════════════════════════
window.render_suppliers = function(el) {
  var q = searchQ.toLowerCase();
  var list = S.suppliers.filter(function(s){ return !q||s.name.toLowerCase().includes(q); });

  el.innerHTML = `
  <div class="topbar">
    <h2>🏢 Доставчици <span style="font-size:13px;color:var(--ink-m);font-weight:400">${S.suppliers.length}</span></h2>
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Търси доставчик..." value="${q}"
        oninput="searchQ=this.value;render_suppliers(document.getElementById('page-content'))">
    </div>
    <button class="btn btn-primary" onclick="openSupplierModal()">+ Нов доставчик</button>
  </div>
  <div class="content">
    ${list.length===0
      ?'<div class="empty-state"><div class="ico">🏢</div><p>Няма доставчици</p><small>Добави доставчик за да следиш поръчките</small></div>'
      :`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">
        ${list.map(function(s){ return supplierCard(s); }).join('')}
      </div>`}
  </div>`;
};

function supplierCard(s) {
  var prods   = S.products.filter(function(p){ return p.supplier_id===s.id; }).length;
  var spent   = S.expenses.filter(function(e){ return e.supplier_id===s.id; }).reduce(function(sm,e){ return sm+(e.amount||0); },0);
  var ordered = S.products.filter(function(p){ return p.supplier_id===s.id&&p.status==='ordered'; }).length;
  var stars   = '⭐'.repeat(s.rating||5);
  var typeMap = { products:'Артикули', transport:'Транспорт', services:'Услуги', partner:'Партньор' };

  return '<div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px;transition:.15s"'+
    ' onmouseover="this.style.boxShadow=\'0 4px 16px rgba(0,0,0,.08)\'" onmouseout="this.style.boxShadow=\'\'">'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px">'+
      '<div>'+
        '<div style="font-size:15px;font-weight:700">'+s.name+(s.is_gemar?'<span style="margin-left:6px;background:var(--green-l);color:var(--green);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">🌿 Gemar</span>':'')+'</div>'+
        '<div style="font-size:11px;color:var(--ink-m);margin-top:2px">'+
          (typeMap[s.type]||'—')+
          (s.address?' · 📍'+s.address:'')+
        '</div>'+
        (s.notes?'<div style="font-size:11px;color:var(--ink-l);margin-top:3px">'+s.notes+'</div>':'')+
      '</div>'+
      '<div style="font-size:12px;color:var(--amber)">'+stars+'</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">'+
      '<div style="background:var(--bg);border-radius:7px;padding:7px;text-align:center">'+
        '<div style="font-size:16px;font-weight:800">'+prods+'</div>'+
        '<div style="font-size:9px;color:var(--ink-l);font-weight:700;text-transform:uppercase;margin-top:1px">Продукти</div>'+
      '</div>'+
      '<div style="background:var(--bg);border-radius:7px;padding:7px;text-align:center">'+
        '<div style="font-size:13px;font-weight:800;color:var(--red)">'+(spent>0?eur0(spent):'—')+'</div>'+
        '<div style="font-size:9px;color:var(--ink-l);font-weight:700;text-transform:uppercase;margin-top:1px">Похарчено</div>'+
      '</div>'+
      '<div style="background:var(--bg);border-radius:7px;padding:7px;text-align:center">'+
        '<div style="font-size:16px;font-weight:800;color:'+(ordered>0?'var(--blue)':'var(--ink)')+'">'+ordered+'</div>'+
        '<div style="font-size:9px;color:var(--ink-l);font-weight:700;text-transform:uppercase;margin-top:1px">Поръчани</div>'+
      '</div>'+
    '</div>'+
    '<div style="font-size:12px;color:var(--ink-m);margin-bottom:10px">'+
      (s.phone?'📞 '+s.phone+'  ':'')+
      (s.email?'<a href="mailto:'+s.email+'" style="color:var(--rose-d)">✉️ '+s.email+'</a>  ':'')+
      (s.website?'<a href="'+s.website+'" target="_blank" style="color:var(--blue);font-size:11px">🌐 сайт</a>':'')+
    '</div>'+
    '<div style="display:flex;gap:5px">'+
      (s.email?'<button class="btn btn-secondary btn-sm" onclick="emailSupplier(\''+s.id+'\')">📧 Email</button>':'')+
      (s.phone?'<button class="btn btn-secondary btn-sm" onclick="window.open(\'tel:'+s.phone+'\')">📞 Обади се</button>':'')+
      '<button class="icon-btn" style="margin-left:auto" onclick="openSupplierModal(\''+s.id+'\')">✏️</button>'+
      '<button class="icon-btn danger" onclick="delSupplier(\''+s.id+'\')">🗑</button>'+
    '</div>'+
  '</div>';
}

function buildSupplierModal() {
  if (document.getElementById('mod-supplier')) return;
  var m = document.createElement('div');
  m.id = 'mod-supplier'; m.className = 'overlay';
  m.innerHTML = `<div class="modal" style="width:500px">
    <div class="modal-hdr"><h3 id="ms-title">Нов доставчик</h3><button class="close-btn" onclick="cm('mod-supplier')">×</button></div>
    <div class="fr">
      <div class="fg"><label>Наименование *</label><input id="ms-name" placeholder="Florea ЕООД"></div>
      <div class="fg"><label>Тип</label>

function openSupplierModal(id) {
  id = id||null;
  buildSupplierModal();
  editId.supplier = id;
  var s = id ? S.suppliers.find(function(x){ return x.id===id; }) : null;
  document.getElementById('ms-title').textContent = id ? 'Редактирай доставчик' : 'Нов доставчик';

  document.getElementById('ms-phone').value  = s ? (s.phone||'') : '';
  document.getElementById('ms-email').value  = s ? (s.email||'') : '';
  document.getElementById('ms-addr').value   = s ? (s.address||''): '';

async function saveSupplier() {
  var name = document.getElementById('ms-name').value.trim();
  if (!name) { toast('Въведи наименование', 'err'); return; }
  var payload = {
    name:     name,
    type:     document.getElementById('ms-type').value,
    phone:    document.getElementById('ms-phone').value.trim()||null,
    email:    document.getElementById('ms-email').value.trim()||null,
    address:  document.getElementById('ms-addr').value.trim()||null,
    website:  document.getElementById('ms-web').value.trim()||null,
    rating:   +document.getElementById('ms-rating').value||5,
    is_gemar: document.getElementById('ms-gemar').checked,
    notes:    document.getElementById('ms-notes').value.trim()||null
  };
  if (editId.supplier) await db.from('suppliers').update(payload).eq('id', editId.supplier);
  else                 await db.from('suppliers').insert(payload);
  await dbLoad('suppliers','suppliers','name');
  cm('mod-supplier');
  toast('Доставчикът е записан ✅', 'ok');
  go(curPage);
}

async function delSupplier(id) {
  var sid = id || editId.supplier;
  if (!sid || !confirm('Изтрий доставчика?')) return;
  await db.from('suppliers').delete().eq('id', sid);
  await dbLoad('suppliers','suppliers','name');
  cm('mod-supplier');
  toast('Изтрито', 'ok');
  go(curPage);
}

function emailSupplier(sid) {
  var s = S.suppliers.find(function(x){ return x.id===sid; });
  if (!s) return;
  var prods = S.products.filter(function(p){ return p.supplier_id===sid; });
  var ordered = prods.filter(function(p){ return p.status==='ordered'; });
  var h = new Date().getHours();
  var greet = h<12?'Добро утро':'Добър ден';
  var body = greet+',\n\nОт Eleya Decor изпращам запитване за следните артикули:\n\n'+
    (ordered.length>0
      ? ordered.map(function(p){ return '- '+p.name+(p.sku?' ('+p.sku+')':'')+' — количество: ___'; }).join('\n')
      : prods.slice(0,5).map(function(p){ return '- '+p.name+(p.sku?' ('+p.sku+')':'')+' — количество: ___'; }).join('\n')
    )+'\n\nМоля потвърдете наличността и срока на доставка.\n\nС уважение,\nEleya Decor 🌸';
  window.open('mailto:'+s.email+'?subject='+encodeURIComponent('Запитване за наличности — Eleya Decor')+'&body='+encodeURIComponent(body));
}

<script>
'use strict';

window.render_execution = function(el) {
  var td = today();
  var upcoming = S.quotes
    .filter(function(q){ return q.event_date && q.event_date >= td && (q.status==='accepted'||q.status==='deposit_paid'); })
    .sort(function(a,b){ return a.event_date.localeCompare(b.event_date); });

  el.innerHTML = `
  <div class="topbar"><h2>✅ Event изпълнение</h2></div>
  <div class="content">
    ${upcoming.length===0
      ? '<div class="empty-state"><div class="ico">🎉</div><p>Няма предстоящи потвърдени събитяа</p><small>Приеми оферта за да се появи тук</small></div>'
      : upcoming.map(function(q){ return execCard(q,td); }).join('')}
  </div>`;
};

function execCard(q, td) {
  var items = q.quote_items || [];
  var cl    = S.clients.find(function(c){ return c.id===q.client_id; });
  var ev    = S.events.find(function(e){ return e.client_id===q.client_id && e.date===q.event_date; });
  var dl    = daysFrom(q.event_date);
  var urgentColor = dl<=0?'var(--red)':dl<=3?'var(--amber)':'var(--green)';

  // Packing check
  var allOk  = items.every(function(i){ var p=S.products.find(function(pr){return pr.id===i.product_id;}); return !p||p.quantity>=i.quantity; });
  var someWarn = !allOk && items.some(function(i){ var p=S.products.find(function(pr){return pr.id===i.product_id;}); return p&&p.quantity>0&&p.quantity<i.quantity; });

  return '<div style="background:var(--card);border:1.5px solid '+(dl<=3?'var(--rose)':'var(--border)')+';border-radius:14px;padding:16px;margin-bottom:14px">'+

    // Header
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap">'+
      '<div>'+
        '<div style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:700">'+( cl?cl.name:'—')+'</div>'+
        '<div style="font-size:12px;color:var(--ink-m);margin-top:3px">'+
          '📅 '+q.event_date+(q.event_time?' · '+q.event_time:'')+
          (q.event_type?' · 🎉 '+q.event_type:'')+
        '</div>'+
        (q.address?'<div style="font-size:12px;color:var(--ink-m)">📍 '+q.address+'</div>':'')+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:28px;font-weight:900;color:'+urgentColor+'">'+
          (dl===0?'ДНЕС 🔥':dl===1?'УТРЕ!':dl+'д')+
        '</div>'+
        '<div style="font-size:13px;font-weight:700;color:var(--green)">'+eur0(q.total_price)+'</div>'+
        (q.deposit_paid?'<div style="font-size:11px;color:var(--green)">✅ депозит платен</div>':
         q.deposit_amount>0?'<div style="font-size:11px;color:var(--amber)">⏳ депозит '+eur0(q.deposit_amount)+'</div>':'')+
      '</div>'+
    '</div>'+

    // Timings from event
    (ev?'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
      [['🚗 Транспорт',ev.travel_time||30],['⚙️ Подготовка',ev.prep_time||60],['🔧 Монтаж',ev.assembly_time||90],['📦 Демонтаж',ev.disassembly_time||60]].map(function(x){
        return '<div style="background:var(--bg);border-radius:7px;padding:6px 10px;font-size:11px;font-weight:600">'+x[0]+': '+x[1]+'мин</div>';
      }).join('')+
    '</div>':'')+

    // Packing list
    '<div style="background:var(--bg);border-radius:var(--r-sm);padding:12px;margin-bottom:12px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--ink-l);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">'+
        '📦 Пакинг лист '+
        (allOk?'<span style="color:var(--green)">— всичко налично ✅</span>':
         someWarn?'<span style="color:var(--amber)">— частично налично ⚠️</span>':
         '<span style="color:var(--red)">— недостатъчно количество! ❌</span>')+
      '</div>'+
      (items.length===0?'<div style="font-size:12px;color:var(--ink-l)">Няма артикули в офертата</div>':
        items.map(function(i){
          var p = S.products.find(function(pr){ return pr.id===i.product_id; });
          var avail = p?p.quantity:0;
          var ok    = avail>=i.quantity;
          var partial = avail>0&&avail<i.quantity;
          return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'+
            '<span style="font-size:18px;flex-shrink:0">'+(ok?'✅':partial?'⚠️':'❌')+'</span>'+
            '<div style="flex:1;min-width:0">'+
              '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(i.description||( p?p.name:'—'))+'</div>'+
              (p?'<div style="font-size:10px;color:var(--ink-l)">Локация: '+(p.location||'Склад')+'</div>':'')+
            '</div>'+
            '<div style="text-align:right;flex-shrink:0">'+
              '<div style="font-weight:700;font-size:13px;color:'+(ok?'var(--green)':partial?'var(--amber)':'var(--red)')+'">'+i.quantity+' '+(p?p.unit:'бр')+'</div>'+
              (!ok?'<div style="font-size:10px;color:var(--red)">налично: '+avail+'</div>':'')+
            '</div>'+
          '</div>';
        }).join(''))+
    '</div>'+

    // Pre-event checklist
    '<div style="background:var(--blue-l);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:6px">📋 Pre-Event чеклист</div>'+
      ['Потвърден финален план с клиента','Платен ли е остатъкът','Потвърден достъп до локацията','Заредена навигация','Взети инструменти и договор','Пълен резервоар / зареден транспорт'].map(function(item){
        return '<label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:3px 0">'+
          '<input type="checkbox" style="width:14px;height:14px;accent-color:var(--blue)"> '+item+
        '</label>';
      }).join('')+
    '</div>'+

    // Action buttons
    '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
      '<button class="btn btn-primary btn-sm" onclick="printPacking(\''+q.id+'\')">🖨 Пакинг лист</button>'+
      (cl&&cl.phone?'<a href="https://wa.me/'+(cl.phone||'').replace(/\D/g,'')+'" target="_blank" class="btn btn-sm" style="background:#25D366;color:#fff;text-decoration:none">💬 WhatsApp</a>':'')+
      (q.address?'<a href="https://maps.google.com/?q='+encodeURIComponent(q.address)+'" target="_blank" class="btn btn-sm btn-secondary">🗺 Навигация</a>':'')+
      '<button class="btn btn-secondary btn-sm" onclick="openMsg(\''+q.id+'\')">💬 Съобщение</button>'+
      '<button class="btn btn-secondary btn-sm" onclick="printContract(\''+q.id+'\')">📃 Договор</button>'+
      '<button class="btn btn-success btn-sm" style="margin-left:auto" onclick="completeEvent(\''+q.id+'\')">✅ Приключи събитието</button>'+
    '</div>'+
  '</div>';
}

async function completeEvent(qid) {
  if (!confirm('Маркирай събитието като приключено?')) return;
  await db.from('quotes').update({ status:'completed', updated_at:new Date().toISOString() }).eq('id',qid);
  await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});
  toast('Събитието е приключено ✅ — не забравяй да поискаш отзив!', 'ok');
  go(curPage);
}

window.render_portfolio = function(el) {
  var q = searchQ.toLowerCase();

  el.innerHTML = `
  <div class="topbar">
    <h2>📸 Портфолио <span style="font-size:13px;color:var(--ink-m);font-weight:400">${S.portfolio.length}</span></h2>
    <div class="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Търси тема, тип..." value="${q}"
        oninput="searchQ=this.value;render_portfolio(document.getElementById('page-content'))">

    <button class="btn btn-primary" onclick="openPortfolioModal()">+ Добави работа</button>

  <div class="content">

function portfolioCard(p) {
  return '<div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:.15s"'+
    ' onmouseover="this.style.boxShadow=\'0 4px 20px rgba(0,0,0,.1)\'" onmouseout="this.style.boxShadow=\'\'">'+
    (p.image_url
      ?'<img src="'+p.image_url+'" style="width:100%;height:180px;object-fit:cover" onerror="this.style.display=\'none\'" onclick="openPortfolioLightbox(\''+p.id+'\')" style="cursor:pointer">'
      :'<div style="width:100%;height:120px;background:linear-gradient(135deg,var(--rose-l),var(--rose-ll));display:flex;align-items:center;justify-content:center;font-size:48px">📸</div>')+
    '<div style="padding:12px">'+
      '<div style="font-size:14px;font-weight:700;margin-bottom:3px">'+p.title+'</div>'+
      '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">'+
        (p.theme_name?'<span class="badge bm">'+p.theme_name+'</span>':'')+
        (p.event_type?'<span class="badge bd">'+p.event_type+'</span>':'')+
        (p.is_public?'<span class="badge bg">🌐 Публично</span>':'<span class="badge bd">🔒 Лично</span>')+
      '</div>'+
      (p.event_date?'<div style="font-size:11px;color:var(--ink-l);margin-bottom:6px">📅 '+p.event_date+'</div>':'')+
      (p.description?'<div style="font-size:11px;color:var(--ink-m);margin-bottom:8px;line-height:1.4">'+p.description+'</div>':'')+

function openPortfolioModal(id) {
  id = id||null;
  buildPortfolioModal();
  editId.portfolio = id;
  var p = id ? S.portfolio.find(function(x){ return x.id===id; }) : null;
  document.getElementById('mpf-title').textContent = id ? 'Редактирай работа' : 'Добави в портфолио';
  document.getElementById('mpf-name').value  = p ? p.title        : '';
  document.getElementById('mpf-img').value   = p ? (p.image_url||'') : '';
  document.getElementById('mpf-imgs').value  = p ? (p.extra_images||[]).join('\n') : '';
  document.getElementById('mpf-theme').value = p ? (p.theme_name||'') : '';
  document.getElementById('mpf-type').value  = p ? (p.event_type||'Рожден ден') : 'Рожден ден';
  document.getElementById('mpf-date').value  = p ? (p.event_date||'') : '';
  document.getElementById('mpf-public').value= p ? (p.is_public?'1':'0') : '1';
  document.getElementById('mpf-desc').value  = p ? (p.description||'') : '';
  document.getElementById('mpf-del').style.display = id ? 'inline-flex' : 'none';
  updatePfPreview(p ? (p.image_url||'') : '');
  om('mod-portfolio');
}

function updatePfPreview(url) {
  var el = document.getElementById('mpf-preview');
  if (!el) return;
  el.innerHTML = url ? '<img src="'+url+'" style="width:100%;height:120px;object-fit:cover;border-radius:var(--r-sm)" onerror="this.style.display=\'none\'">' : '';
}

async function savePortfolio() {
  var title = document.getElementById('mpf-name').value.trim();
  if (!title) { toast('Въведи заглавие', 'err'); return; }
  var extraRaw = document.getElementById('mpf-imgs').value.trim();
  var extras   = extraRaw ? extraRaw.split('\n').map(function(s){ return s.trim(); }).filter(Boolean) : [];
  var payload  = {
    title:        title,
    image_url:    document.getElementById('mpf-img').value.trim()||null,
    extra_images: extras,
    theme_name:   document.getElementById('mpf-theme').value.trim()||null,
    event_type:   document.getElementById('mpf-type').value,
    event_date:   document.getElementById('mpf-date').value||null,
    is_public:    document.getElementById('mpf-public').value==='1',
    description:  document.getElementById('mpf-desc').value.trim()||null
  };
  if (editId.portfolio) await db.from('portfolio').update(payload).eq('id', editId.portfolio);
  else                  await db.from('portfolio').insert(payload);
  await dbLoad('portfolio','portfolio','created_at','*',{asc:false});
  cm('mod-portfolio');
  toast('Портфолиото е обновено ✅', 'ok');
  go(curPage);
}

async function delPortfolio(id) {
  var pid = id || editId.portfolio;
  if (!pid || !confirm('Изтрий тази работа от портфолиото?')) return;
  await db.from('portfolio').delete().eq('id', pid);
  await dbLoad('portfolio','portfolio','created_at','*',{asc:false});
  cm('mod-portfolio');
  toast('Изтрито', 'ok');
  go(curPage);
}

var importItems = [];

function handleTemuDrop(e) {

}

function handleTemuFile(input) {
  var file = input.files[0];

}

  var status = document.getElementById('temu-status');

  try {
    // Конвертираме PDF към base64
    var base64 = await new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function() { resolve(reader.result.split(',')[1]); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    statusText.textContent = '🤖 Claude анализира поръчката...';

    var prompt = `Това е PDF фактура/поръчка от Temu или друг онлайн магазин.

Извлечи ВСИЧКИ артикули и върни САМО валиден JSON масив (без markdown, без обяснения):

[

    "name": "кратко наименование на български (макс 50 символа)",

    "order_date": "дата YYYY-MM-DD"
  }
]

Важно:
- quantity е БРОЙ на конкретния артикул (обикновено 1 за покривала)
- price_eur е цената в евро
- Ако артикулът е покривало за арка — category = "Покривала за арки"
- Ако не можеш да извлечеш цена — сложи 0
- Върни САМО JSON, нищо друго`;

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function removeImportItem(i) {

}

function toggleAllImport(cb) {
  importItems.forEach(function(item){ item._selected = cb.checked; });

  updateImportSummary();

function updateImportSummary() {
  var selected = importItems.filter(function(i){ return i._selected; });

    ' · Кликни "Добави всички в инвентара" за да запазиш';

function clearImport() {

// ── Потвърждаване и запис в Supabase ─────────────────────────
async function confirmImport() {
  var selected = importItems.filter(function(i){ return i._selected; });
  if (!selected.length) { toast('Избери поне един артикул', 'err'); return; }

  var btn = event.target;
  btn.textContent = '⏳ Записвам...';
  btn.disabled = true;

  var errors = 0;
  for (var item of selected) {
    try {
      // Проверяваме дали артикулът вече съществува по наименование
      var existing = S.products.find(function(p){
        return p.name.toLowerCase() === item.name.toLowerCase();
      });

      if (existing) {
        // Обновяваме количеството
        await db.from('products').update({
          quantity: (existing.quantity || 0) + item.quantity
        }).eq('id', existing.id);
      } else {
        // Нов артикул
        await db.from('products').insert({
          name:         item.name,
          quantity:     item.quantity,
          unit:         item.unit || 'бр',
          price:        item.price_eur || 0,
          cost_price:   item.price_eur || 0,
          status:       'available',
          supplier_id:  null,
          notes:        item.name_original ? 'Оригинал: ' + item.name_original : null,
          image_url:    item.image_url || null,
          location:     'Склад'
        });
      }
    } catch(e) {
      console.error('Error importing:', item.name, e);
      errors++;
    }
  }

  await dbLoad('products','products','name','*,categories(name,color),suppliers(name)');
  btn.textContent = '✅ Добави всички в инвентара';
  btn.disabled = false;

  if (errors > 0) toast(errors + ' артикула не успяха да се запишат', 'err');
  else toast('✅ ' + selected.length + ' артикула добавени в инвентара!', 'ok');

  clearImport();
  updateBadges();
}

// ── CSV импорт ────────────────────────────────────────────────
function handleCSVFile(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var text = e.target.result;
    parseCSVText(text);
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSVText(text) {
  var lines = text.split('\n').filter(function(l){ return l.trim(); });
  if (lines.length < 2) { toast('CSV файлът е празен или невалиден', 'err'); return; }

  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/"/g,'').toLowerCase(); });
  importItems = lines.slice(1).map(function(line, i) {
    var cols = line.split(',').map(function(c){ return c.trim().replace(/"/g,''); });
    var obj = { _id: 'csv_'+i, _selected: true };
    headers.forEach(function(h, idx) {
      obj[h] = cols[idx] || '';
    });
    return {
      _id: obj._id, _selected: true,
      name:      obj['наименование'] || obj['name'] || obj['артикул'] || 'Артикул ' + (i+1),
      quantity:  +(obj['количество'] || obj['quantity'] || obj['qty'] || 1),
      unit:      obj['мерна ед.'] || obj['unit'] || 'бр',
      price_eur: +(obj['цена €'] || obj['цена'] || obj['price'] || 0),
      category:  obj['категория'] || obj['category'] || '',
      supplier:  obj['доставчик'] || obj['supplier'] || '',
      image_url: ''
    };
  }).filter(function(i){ return i.name; });

  if (importItems.length > 0) {
    renderImportResults('CSV импорт');
    toast('Разпознах ' + importItems.length + ' артикула от CSV', 'ok');
  } else {
    toast('Не намерих артикули в CSV файла', 'err');
  }
}

  try {
    var response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: 'Извлечи артикули от този текст и върни САМО JSON масив:\n\n' + text + '\n\nФормат: [{"name":"...","quantity":1,"unit":"бр","price_eur":0,"category":"..."}]\nВърни САМО JSON.'
        }]
      })
    });

    var data = await response.json();
    var txt = data.content.map(function(c){ return c.text||''; }).join('');
    var clean = txt.replace(/```json|```/g,'').trim();
    var match = clean.match(/\[[\s\S]*\]/);
    var items = match ? JSON.parse(match[0]) : JSON.parse(clean);

    importItems = items.map(function(item, i){
      return Object.assign({ _id:'man_'+i, _selected:true }, item);
    });

    document.getElementById('temu-status-text').textContent = '✅ Разпознах ' + importItems.length + ' артикула!';
    status.className = 'alert green';
    renderImportResults('Ръчен импорт');

  } catch(e) {
    status.className = 'alert red';
    document.getElementById('temu-status-text').textContent = '❌ Грешка: ' + e.message;
  }
}

// ── История на импортите ──────────────────────────────────────
var importHistory = JSON.parse(localStorage.getItem('eleya-import-history') || '[]');

function saveImportHistory(filename, count, orderId) {
  importHistory.unshift({
    filename: filename,
    count: count,
    orderId: orderId,
    date: new Date().toLocaleDateString('bg'),
    time: new Date().toLocaleTimeString('bg', {hour:'2-digit',minute:'2-digit'})
  });
  if (importHistory.length > 20) importHistory.pop();
  try { localStorage.setItem('eleya-import-history', JSON.stringify(importHistory)); } catch(e) {}
  renderImportHistory();
}

function renderImportHistory() {
  var el = document.getElementById('import-history-body');
  if (!el || !importHistory.length) return;
  el.innerHTML = importHistory.map(function(h) {
    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">' +
      '<div style="width:36px;height:36px;background:var(--blue-l);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📦</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (h.filename||'Импорт') + '</div>' +
        '<div style="font-size:11px;color:var(--ink-m)">' + h.date + ' ' + h.time + (h.orderId?' · Поръчка: '+h.orderId:'') + '</div>' +
      '</div>' +
      '<span class="badge bb">' + h.count + ' арт.</span>' +
    '</div>';
  }).join('');
}
</script>

<script>

// Статуси на теми
var THEME_STATUS = {

  ready80:    { l:'⚡ 80% готова',     cls:'bb', color:'var(--blue)' },
  catalog:    { l:'🌟 В каталога',     cls:'bg', color:'var(--green)' },
  executed:   { l:'✅ Изпълнена',      cls:'bg', color:'var(--green)' },

};

var tsTab = 'all'; // Текущ таб на Theme Studio
var editingTheme = null; // Темата която се редактира в Studio

// ── Theme Studio главна страница ──────────────────────────────
window.render_themeStudio = function(el) {
  var q = searchQ.toLowerCase();

};

// ── Тема карта в Studio ───────────────────────────────────────
function studioThemeCard(t) {
  var items = t.theme_items||[];
  var totalP = items.reduce(function(s,i){ return s+(i.price||0)*i.quantity; },0);
  var st = THEME_STATUS[t.studio_status||'idea']||THEME_STATUS.idea;

  // Наличност проверка
  var avail='green'; var availTxt='🟢 Готова';

    var p=S.products.find(function(pr){ return pr.id===items[i].product_id; });
    if(!p||p.quantity===0){avail='red';availTxt='🔴 Липсват артикули';break;}
    if(p.quantity<items[i].quantity){avail='yellow';availTxt='🟡 Частично';}

  var tags = t.tags ? t.tags.split(',').map(function(tg){
    return '<span style="background:var(--rose-l);color:var(--rose-d);border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700">'+tg.trim()+'</span>';

  if(t.primary_color||t.secondary_color||t.accent_color){
    dnaPreview = '<div style="display:flex;gap:4px;margin-bottom:8px">';

    if(t.secondary_color) dnaPreview += '<div style="width:20px;height:20px;border-radius:50%;background:'+t.secondary_color+';border:2px solid var(--border)" title="Вторичен"></div>';
    if(t.accent_color)    dnaPreview += '<div style="width:20px;height:20px;border-radius:50%;background:'+t.accent_color+';border:2px solid var(--border)" title="Акцент"></div>';
    if(t.mood) dnaPreview += '<span style="font-size:10px;color:var(--ink-m);margin-left:4px;align-self:center">'+t.mood+'</span>';
    dnaPreview += '</div>';
  }

  return '<div style="background:var(--card);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:.15s" onmouseover="this.style.boxShadow=\'0 4px 20px rgba(0,0,0,.09)\'" onmouseout="this.style.boxShadow=\'\'">'+
    (t.image_url
      ? '<img src="'+t.image_url+'" style="width:100%;height:140px;object-fit:cover;cursor:pointer" onclick="openThemeStudioEditor(\''+t.id+'\')" onerror="this.style.display=\'none\'">'
      : '<div style="width:100%;height:80px;background:linear-gradient(135deg,var(--rose-l),var(--rose-ll));display:flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer" onclick="openThemeStudioEditor(\''+t.id+'\')">🎨</div>')+
    '<div style="padding:12px">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px">'+
        '<div>'+
          '<div style="font-size:14px;font-weight:700">'+t.name+'</div>'+
          (t.event_type?'<div style="font-size:10px;color:var(--ink-l)">'+t.event_type+'</div>':'')+
        '</div>'+
        '<span class="badge '+st.cls+'">'+st.l+'</span>'+
      '</div>'+
      dnaPreview+
      (tags?'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px">'+tags+'</div>':'')+

      // Производство индикатор
      (t.production_hours?'<div style="font-size:10px;color:var(--ink-m);margin-bottom:6px">⏱ '+t.production_hours+'ч производство</div>':'')+

      // Canva линк
      (t.canva_url?'<div style="margin-bottom:8px"><a href="'+t.canva_url+'" target="_blank" style="font-size:11px;color:var(--blue);display:flex;align-items:center;gap:4px"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>Canva визуализация →</a></div>':'')+

      // Резюме
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:10px">'+
        '<div style="background:var(--bg);border-radius:7px;padding:6px;text-align:center"><div style="font-size:15px;font-weight:900">'+items.length+'</div><div style="font-size:9px;color:var(--ink-l);font-weight:700;margin-top:1px">АРТИКУЛИ</div></div>'+
        '<div style="background:var(--bg);border-radius:7px;padding:6px;text-align:center"><div style="font-size:13px;font-weight:900;color:var(--rose-d)">'+(totalP>0?eur0(totalP):'—')+'</div><div style="font-size:9px;color:var(--ink-l);font-weight:700;margin-top:1px">БАЗА</div></div>'+
        '<div style="background:var(--bg);border-radius:7px;padding:6px;text-align:center"><div style="font-size:11px;font-weight:700;color:'+(avail==='green'?'var(--green)':avail==='yellow'?'var(--amber)':'var(--red)')+'">'+availTxt+'</div><div style="font-size:9px;color:var(--ink-l);font-weight:700;margin-top:1px">ИНВЕНТАР</div></div>'+
      '</div>'+

      // История изпълнения
      (t.executions && t.executions.length > 0
        ? '<div style="font-size:10px;color:var(--ink-m);margin-bottom:8px">📋 Изпълнена '+t.executions.length+' пъти</div>'
        : '')+

      '<div style="display:flex;gap:5px">'+
        '<button class="btn btn-primary btn-sm" style="flex:1;font-size:11px" onclick="openThemeStudioEditor(\''+t.id+'\')">🎨 Отвори Studio</button>'+
        '<button class="btn btn-secondary btn-sm" onclick="createQuoteFromTheme(\''+t.id+'\')">📄 Оферта</button>'+
        '<button class="icon-btn danger" onclick="delTheme(\''+t.id+'\')">🗑</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

  // Зареждаме артикулите

}

function updatePriceCalc() {
  var t = editingTheme;
  var items = t ? (t.theme_items||[]) : [];
  var totalC = items.reduce(function(s,i){
    var p=S.products.find(function(pr){ return pr.id===i.product_id; });
    return s+(p?(p.cost_price||0)*i.quantity:0);
  },0);
  var lh = +document.getElementById('s-labor-h')?.value||0;
  var rate = +document.getElementById('s-rate')?.value||15;
  var laborCost = lh * rate;
  var realCost = totalC + laborCost;
  var base = +document.getElementById('s-base-price')?.value||0;
  var pers = +document.getElementById('s-personal-price')?.value||0;
  var sign = +document.getElementById('s-sign-price')?.value||0;
  var exp  = +document.getElementById('s-exp-price')?.value||0;
  var gift = +document.getElementById('s-gift-price')?.value||0;

  var lc = document.getElementById('s-labor-cost');
  var rc = document.getElementById('s-real-cost');
  var rp = document.getElementById('s-rec-price');
  var mp = document.getElementById('s-my-price-display');
  if(lc) lc.textContent = '= ' + eur(laborCost);
  if(rc) rc.textContent = eur(realCost);
  if(rp) rp.textContent = eur(realCost * 2.5);
  if(mp) mp.textContent = eur(base);

  var pcbase  = document.getElementById('pc-base');
  var pcpers  = document.getElementById('pc-pers');
  var pcsign  = document.getElementById('pc-sign');
  var pcexp   = document.getElementById('pc-exp');
  var pcgifts = document.getElementById('pc-gifts');
  var pctotal = document.getElementById('pc-total');
  if(pcbase)  pcbase.textContent  = eur(base);
  if(pcpers)  pcpers.textContent  = '+' + eur(pers);
  if(pcsign)  pcsign.textContent  = '+' + eur(sign);
  if(pcexp)   pcexp.textContent   = '+' + eur(exp);
  if(pcgifts) pcgifts.textContent = '+' + eur(gift*30);
  if(pctotal) pctotal.textContent = eur(base+pers+sign+exp+gift*30);
}

// ── Запазване на Studio темата ────────────────────────────────
async function saveStudioTheme(publish) {
  var name = document.getElementById('s-name')?.value.trim();
  if (!name) { toast('Въведи наименование на темата', 'err'); return; }

  // Събираме Canva вариации
  var variants = [];
  document.querySelectorAll('[id^="cv-name-"]').forEach(function(inp) {
    var i = inp.id.replace('cv-name-','');
    var url = document.getElementById('cv-url-'+i)?.value.trim();
    if(inp.value.trim() && url) variants.push({ name: inp.value.trim(), url: url });
  });

  // Събираме одобрени
  var approved = [];
  document.querySelectorAll('[id^="ca-client-"]').forEach(function(inp) {
    var i = inp.id.replace('ca-client-','');
    var url  = document.getElementById('ca-url-'+i)?.value.trim();
    var date = document.getElementById('ca-date-'+i)?.value;
    if(inp.value.trim()) approved.push({ client: inp.value.trim(), date: date||'', url: url||'' });
  });

  // Събираме оборудване
  var equipment = ['s-eq-cricut','s-eq-heat','s-eq-helium','s-eq-speaker','s-eq-lights','s-eq-projector']
    .filter(function(id){ return document.getElementById(id)?.checked; });

  var payload = {
    name:                name,
    event_type:          document.getElementById('s-evtype')?.value     || null,
    description:         document.getElementById('s-desc')?.value.trim() || null,
    tags:                document.getElementById('s-tags')?.value.trim() || null,
    image_url:           document.getElementById('s-img')?.value.trim()  || null,
    reference_urls:      (document.getElementById('s-refs')?.value||'').split('\n').map(function(s){return s.trim();}).filter(Boolean),
    studio_notes:        document.getElementById('s-notes')?.value.trim() || null,
    // ДНК
    primary_color:       document.getElementById('s-col1')?.value        || null,
    primary_color_name:  document.getElementById('s-col1-name')?.value.trim() || null,
    secondary_color:     document.getElementById('s-col2')?.value        || null,
    secondary_color_name:document.getElementById('s-col2-name')?.value.trim() || null,
    accent_color:        document.getElementById('s-col3')?.value        || null,
    accent_color_name:   document.getElementById('s-col3-name')?.value.trim() || null,
    gemar_codes:         document.getElementById('s-gemar-codes')?.value.trim() || null,
    motifs:              document.getElementById('s-motifs')?.value.trim() || null,
    figures_plan:        document.getElementById('s-figures')?.value.trim() || null,
    sign_type:           document.getElementById('s-sign-type')?.value   || null,
    clay_elements:       document.getElementById('s-clay')?.value.trim() || null,
    mood:                document.getElementById('s-mood')?.value        || null,
    target_age:          document.getElementById('s-age')?.value         || null,
    season:              document.getElementById('s-season')?.value      || null,
    min_guests:          +document.getElementById('s-ming')?.value       || 10,
    is_bulgarian_story:  document.getElementById('s-bulgarian')?.checked || false,
    // Canva
    canva_url:           document.getElementById('s-canva-master')?.value.trim()  || null,
    canva_catalog_url:   document.getElementById('s-canva-catalog')?.value.trim() || null,
    canva_variants:      JSON.stringify(variants),
    canva_approved:      JSON.stringify(approved),
    // Производство
    production_hours:    +document.getElementById('s-prod-hours')?.value    || 0,
    assembly_hours:      +document.getElementById('s-assembly-hours')?.value || 1.5,
    disassembly_hours:   +document.getElementById('s-disasm-hours')?.value   || 1,
    equipment:           equipment,
    production_advance:  document.getElementById('s-prod-advance')?.value.trim() || null,
    production_day:      document.getElementById('s-prod-day')?.value.trim()     || null,
    // Наем
    figures_for_rent:    document.getElementById('s-figures-rent')?.value.trim() || null,
    is_rentable:         document.getElementById('s-rentable')?.checked || false,
    // Experience
    playlist_url:        document.getElementById('s-playlist')?.value.trim()    || null,
    music_type:          document.getElementById('s-music-type')?.value.trim()  || null,
    lights_plan:         document.getElementById('s-lights')?.value.trim()      || null,
    // Цени
    base_price:          +document.getElementById('s-base-price')?.value         || 0,
    personalization_price:+document.getElementById('s-personal-price')?.value   || 40,
    signature_price:     +document.getElementById('s-sign-price')?.value        || 65,

    gift_price_per_guest:+document.getElementById('s-gift-price')?.value        || 3,
    hourly_rate:         +document.getElementById('s-rate')?.value              || 15,

    is_exclusive:        document.getElementById('s-exclusive')?.checked        || false,
    is_featured:         document.getElementById('s-featured')?.checked         || false,
    // История
    executions:          editingTheme ? (editingTheme.executions||[]) : []
  };

  if (publish) payload.studio_status = 'catalog';

  // Запазваме артикулите от Theme modal
  var themeItems = [];
  if (document.getElementById('mth-items')) {
    var rows = document.getElementById('mth-items').querySelectorAll('[id^="thr"]');
    rows.forEach(function(row){
      var sels=row.querySelectorAll('select');
      var inps=row.querySelectorAll('input');

  }

  try {
    var tid;
    if (editingTheme && editingTheme.id) {
      await db.from('themes').update(payload).eq('id', editingTheme.id);
      tid = editingTheme.id;
    } else {
      var res = await db.from('themes').insert(payload).select().single();
      tid = res.data?.id;
    }
    if (tid && themeItems.length) {
      await db.from('theme_items').delete().eq('theme_id', tid);
      await db.from('theme_items').insert(themeItems.map(function(i){ return Object.assign({theme_id:tid},i); }));
    }
    await dbLoad('themes','themes','name','*,theme_items(*)');
    toast(publish ? '🌟 Темата е публикувана в каталога!' : '💾 Темата е запазена', 'ok');
    if (publish) {
      editingTheme = null;
      go('themeStudio');
    } else {
      // Обновяваме editingTheme
      editingTheme = S.themes.find(function(x){ return x.id===tid; }) || editingTheme;
    }
  } catch(e) {
    console.error(e);
    toast('Грешка при записване: ' + e.message, 'err');
  }
}

function updateImgPreview(inputId, previewId) {

  if (url) {

  } else {
    prev.innerHTML = '';
  }
}

var catFilters = {

// ════════════════════════════════════════════
// ПУБЛИЧЕН КАТАЛОГ (вътрешен preview)

window.render_publicCatalog = function(el) {
  var publicThemes = S.themes.filter(function(t){
    return t.is_public && t.studio_status === 'catalog';
  });

  // Прилагаме филтри
  var filtered = publicThemes.filter(function(t){
    var ok = true;
    if (catFilters.occasion && t.event_type !== catFilters.occasion) ok = false;
    if (catFilters.season   && t.season !== catFilters.season)       ok = false;
    if (catFilters.age      && t.target_age !== catFilters.age)      ok = false;
    if (catFilters.style    && (t.mood||'') !== catFilters.style)    ok = false;
    if (catFilters.budget) {
      var bp = t.base_price||0;
      if (catFilters.budget === 'до €200'    && bp > 200)  ok = false;
      if (catFilters.budget === '€200-400'   && (bp < 200 || bp > 400)) ok = false;
      if (catFilters.budget === '€400+'      && bp < 400)  ok = false;
    }
    if (catFilters.search) {
      var s = catFilters.search.toLowerCase();
      if (!(t.name||'').toLowerCase().includes(s) &&
          !(t.tags||'').toLowerCase().includes(s) &&
          !(t.description||'').toLowerCase().includes(s)) ok = false;
    }
    return ok;
  });

  // Тема на месеца first
  filtered.sort(function(a,b){

    </div>` : ''}

    <!-- Occasion tabs -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${[['','Всички 🎉'],['Рожден ден','🎂 Рожден ден'],['Кръщене','🕊 Кръщене'],['Сватба','💍 Сватба'],['Абитуриентски','🎓 Абитур.'],['Корпоративно','🏢 Корпоративно'],['Имен ден','🌸 Имен ден']].map(function(x){
        var isOn = catFilters.occasion === x[0];
        return '<button onclick="catFilters.occasion=\''+x[0]+'\';render_publicCatalog(document.getElementById(\'page-content\'))" style="padding:6px 14px;border-radius:20px;border:1.5px solid '+(isOn?'var(--rose)':'var(--border)')+';background:'+(isOn?'var(--rose)':'var(--card)')+';color:'+(isOn?'#fff':'var(--ink-m)')+';font-size:12px;font-weight:600;cursor:pointer;transition:.12s">'+x[1]+'</button>';
      }).join('')}

      <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:var(--ink-l)"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
      <span style="font-size:11px;font-weight:700;color:var(--ink-l)">ФИЛТРИ:</span>

// ── Публична тема карта ───────────────────────────────────────

          '<div><input type="checkbox" id="det-exp" onchange="updateDetailTotal(\''+t.id+'\')" style="accent-color:var(--rose)"> + Experience (музика + светлини) 🎵💡</div>'+

function updateDetailTotal(tid) {
  var d = window._detTheme; if(!d) return;
  var total = d.base;
  if (document.getElementById('det-pers')?.checked) total += d.pers;
  if (document.getElementById('det-sign')?.checked) total += d.sign;
  if (document.getElementById('det-exp')?.checked)  total += d.exp;
  var guests = +document.getElementById('det-guests')?.value||20;
  var giftTotal = d.gift * guests;
  total += giftTotal;
  var gt = document.getElementById('det-gift-total');
  var tt = document.getElementById('det-total');
  if (gt) gt.textContent = '+'+eur0(giftTotal);
  if (tt) tt.textContent = eur0(total);
}

  }

  document.getElementById('mce-client').textContent = '🎉 ' + (cl ? cl.name : '—') + ' · ' + (q.event_date||'');

  document.getElementById('mce-note').value   = '';
  document.getElementById('mce-photos').value = '';
  m.querySelectorAll('input[name="baksish-yn"]').forEach(function(r){ r.checked = r.value==='no'; });

  // Confirm бутон
  document.getElementById('mce-confirm-btn').onclick = async function() {
    var hasBaksish = m.querySelector('input[name="baksish-yn"]:checked')?.value === 'yes';
    var amount     = hasBaksish ? +document.getElementById('mce-amount').value||0 : 0;
    var from_who   = document.getElementById('mce-from').value;
    var note       = document.getElementById('mce-note').value.trim();
    var photos     = document.getElementById('mce-photos').value.trim().split('\n').filter(Boolean);

    // Записваме в базата
    await db.from('quotes').update({
      status: 'completed',
      updated_at: new Date().toISOString(),
      baksish_amount: amount,
      baksish_from: from_who,
      baksish_note: note||null,
      completion_photos: photos
    }).eq('id', qid);

    // Ако бакшиш > 0 → известие
    if (amount > 0) {
      await db.from('notifications').insert({
        type: 'baksish',
        title: '🎁 Бакшиш от ' + (cl?cl.name:'клиент') + ': €' + amount,
        message: note || 'Получен при приключване на събитие',
        link_to: 'finances',
        link_id: qid

    // Ако има снимки → добавяме в портфолио
    if (photos.length > 0) {
      await db.from('portfolio').insert({
        title: (cl?cl.name:'Събитие') + ' · ' + (q.event_date||''),
        image_url: photos[0],

        description: note||null

    scheduleFollowUp(qid, q, cl);

    await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});

    if (photos.length > 0) msg += ' · Снимки добавени в портфолиото 📸';
    toast(msg, 'ok');
    go(curPage);
  };

  om('mod-complete-event');
};

// ════════════════════════════════════════════
function scheduleFollowUp(qid, q, cl) {
  if (!cl) return;
  var now = Date.now();
  var followUps = [
    { days: 1,  type: 'review_request',   title: '💌 Помоли за отзив: ' + (cl.name||''),        msg: 'Вчера беше събитието. Изпрати съобщение за отзив!' },
    { days: 7,  type: 'thank_you',         title: '🌸 Благодарствено: ' + (cl.name||''),          msg: 'Седмица след събитието — добър момент за лично съобщение.' },
    { days: 30, type: 'next_inquiry',      title: '🔔 Следваща поръчка?: ' + (cl.name||''),      msg: 'Мина месец. Питай дали има планиране за следващо събитие.' },
  ];

  // Рожден ден напомняне
  if (cl.birthday) {
    var bd    = new Date(cl.birthday);
    var thisY = new Date().getFullYear();
    var nextBd= new Date(thisY, bd.getMonth(), bd.getDate());
    if (nextBd < new Date()) nextBd = new Date(thisY+1, bd.getMonth(), bd.getDate());
    var daysUntilBd = Math.ceil((nextBd - new Date()) / 864e5);
    followUps.push({
      days: daysUntilBd - 30,
      type: 'birthday_reminder',
      title: '🎂 Рожден ден на ' + cl.name + ' след 30 дни!',
      msg: 'Подготви специална оферта за рождения ден на клиента.'
    });
  }

  // Записваме follow-up-ите
  followUps.forEach(function(fu) {
    if (fu.days <= 0) return;
    var dueDate = new Date(now + fu.days * 864e5).toISOString().slice(0,10);
    db.from('tasks').insert({
      description: fu.title,
      type: 'business',
      priority: fu.days <= 3 ? 'high' : 'medium',
      due_date: dueDate,
      completed: false
    }).then(function(){}).catch(function(){});
  });

  // Веднага показваме WhatsApp шаблон за следващия ден
  setTimeout(function(){
    if (!cl.phone) return;
    var msg2 = 'Здравейте, ' + (cl.name.split(' ')[0]||'') + '! 🌸\n\n' +
      'Надявам се събитието да е минало чудесно! ' +
      'Ще се радвам на отзив — помага ми да се подобрявам и достига до повече семейства. 🌟\n\n' +
      'Благодаря за доверието!\nEleya Decor 🌸';
    var link = 'https://wa.me/' + cl.phone.replace(/\D/g,'') + '?text=' + encodeURIComponent(msg2);
    var banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:80px;right:16px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9998';
    banner.innerHTML = '<div style="font-size:13px;font-weight:700;margin-bottom:6px">💌 Изпрати follow-up?</div>' +
      '<div style="font-size:11px;color:var(--ink-m);margin-bottom:8px">Готово съобщение за отзив от <strong>'+(cl.name.split(' ')[0]||'')+'</strong></div>' +
      '<div style="display:flex;gap:6px">'+
        '<a href="'+link+'" target="_blank" style="flex:1;padding:7px;background:#25D366;color:#fff;border-radius:7px;font-size:12px;font-weight:700;text-align:center;text-decoration:none">💬 Изпрати</a>'+
        '<button onclick="this.closest(\'div\').remove()" style="padding:7px 10px;border:1.5px solid var(--border);background:var(--card);border-radius:7px;font-size:12px;cursor:pointer">✕</button>'+
      '</div>';
    document.body.appendChild(banner);
    setTimeout(function(){ banner.remove(); }, 30000);
  }, 2000);
}

async function confirmSoftHold() {
  var qid  = editId.softHold;
  var days = +document.getElementById('msh-days').value || 3;
  var msg  = document.getElementById('msh-msg').value.trim();
  if (!qid) return;

  var deadline = new Date(Date.now() + days * 864e5).toISOString().slice(0,10);
  await db.from('quotes').update({
    status: 'soft_hold',
    soft_hold_deadline: deadline,
    updated_at: new Date().toISOString()
  }).eq('id', qid);

  // Задача за следене
  await db.from('tasks').insert({
    description: '🟡 Провери мека резервация — ' + (S.quotes.find(function(x){return x.id===qid;})?.clients?.name||'клиент'),
    type: 'business',
    priority: 'high',
    due_date: deadline,
    completed: false
  });

  await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});
  await dbLoad('tasks','tasks','created_at','*',{asc:false,limit:200});

  // Копираме съобщението
  if (msg) navigator.clipboard.writeText(msg).catch(function(){});
  cm('mod-soft-hold');
  toast('🟡 Мека резервация поставена до ' + deadline + ' · Съобщението е копирано!', 'ok');
  go(curPage);
}

// Проверка на изтекли меки резервации
async function checkSoftHoldExpiry() {
  var td = today();
  var expired = S.quotes.filter(function(q){
    return q.status === 'soft_hold' && q.soft_hold_deadline && q.soft_hold_deadline < td;
  });
  for (var q of expired) {
    await db.from('quotes').update({ status:'expired', updated_at:new Date().toISOString() }).eq('id',q.id);
    await db.from('notifications').insert({
      type: 'soft_hold_expired',
      title: '⏰ Изтекла мека резервация: ' + (q.clients?.name||''),
      message: 'Датата ' + (q.event_date||'') + ' е освободена автоматично',
      link_to: 'quotes',
      link_id: q.id
    });
  }
  if (expired.length > 0) {
    await dbLoad('quotes','quotes','created_at','*,clients(name,phone),quote_items(*)',{asc:false});
    await loadNotifications();
  }
}
