<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleya Decor · Инвентар</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f9;color:#1a1a2e;height:100vh;display:flex}
:root{--accent:#1D9E75;--accent-bg:#E1F5EE;--accent-dark:#0F6E56;--danger:#E24B4A;--danger-bg:#FCEBEB;--warn:#BA7517;--warn-bg:#FAEEDA;--border:#e5e7eb;--card:#fff;--muted:#6b7280}

/* SIDEBAR */
.sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo h1{font-size:16px;font-weight:700;color:#1a1a2e;letter-spacing:-.3px}
.logo p{font-size:11px;color:var(--muted);margin-top:2px}
nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{background:#f9fafb;color:#1a1a2e}
.nav-item.active{background:var(--accent-bg);color:var(--accent-dark);border-left-color:var(--accent);font-weight:600}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sidebar-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-bottom p{font-size:11px;color:var(--muted)}

/* MAIN */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar h2{font-size:16px;font-weight:700;flex:1}
.search-wrap{display:flex;align-items:center;gap:8px;background:#f4f6f9;border:1px solid var(--border);border-radius:8px;padding:7px 12px;width:240px}
.search-wrap input{background:none;border:none;outline:none;font-size:13px;color:#1a1a2e;width:100%}
.search-wrap svg{width:14px;height:14px;color:var(--muted);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:#f4f6f9;color:#1a1a2e;border:1px solid var(--border)}
.btn-secondary:hover{background:#e9edf2}
.btn-danger{background:var(--danger-bg);color:var(--danger)}
.btn-sm{padding:5px 10px;font-size:12px}
.content{padding:24px;flex:1}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.stat-card .label{font-size:12px;color:var(--muted);margin-bottom:6px}
.stat-card .value{font-size:24px;font-weight:800;color:#1a1a2e}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:3px}
.stat-card.warn .value{color:var(--warn)}
.stat-card.danger .value{color:var(--danger)}
.stat-card.good .value{color:var(--accent-dark)}

/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.table-header h3{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse}
thead tr{background:#f9fafb}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f3f4f6}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--accent-bg);color:var(--accent-dark)}
.badge-red{background:var(--danger-bg);color:var(--danger)}
.badge-yellow{background:var(--warn-bg);color:var(--warn)}
.badge-gray{background:#f3f4f6;color:var(--muted)}
.qty-cell{font-weight:700;font-size:14px}
.low-stock{color:var(--danger)}
.actions{display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;color:var(--muted)}
.icon-btn:hover{background:#f4f6f9;color:#1a1a2e}
.icon-btn.danger:hover{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px;transform:translateY(20px);transition:.2s}
.overlay.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-hdr h3{font-size:16px;font-weight:700}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted)}
.close-btn:hover{background:#f4f6f9}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:.15s;background:#fff;color:#1a1a2e}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* MOVEMENT MODAL */
.mov-types{display:flex;gap:8px;margin-bottom:16px}
.mov-type{flex:1;padding:10px;border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.mov-type.in{color:var(--accent-dark)}
.mov-type.out{color:var(--danger)}
.mov-type.adjust{color:var(--warn)}
.mov-type.selected.in{background:var(--accent-bg);border-color:var(--accent)}
.mov-type.selected.out{background:var(--danger-bg);border-color:var(--danger)}
.mov-type.selected.adjust{background:var(--warn-bg);border-color:var(--warn)}

/* HISTORY */
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f4f6}
.hist-item:last-child{border-bottom:none}
.hist-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hist-icon.in{background:var(--accent-bg)}
.hist-icon.out{background:var(--danger-bg)}
.hist-icon.adjust{background:var(--warn-bg)}
.hist-info{flex:1}
.hist-info .name{font-size:13px;font-weight:600}
.hist-info .meta{font-size:11px;color:var(--muted);margin-top:2px}
.hist-qty{font-size:14px;font-weight:800}
.hist-qty.in{color:var(--accent-dark)}
.hist-qty.out{color:var(--danger)}
.hist-qty.adjust{color:var(--warn)}

/* CATEGORIES PAGE */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;gap:14px}
.cat-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.cat-info{flex:1}
.cat-info h4{font-size:14px;font-weight:700}
.cat-info p{font-size:12px;color:var(--muted);margin-top:2px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:14px;gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{width:48px;height:48px;margin:0 auto 12px;display:block;opacity:.3}
.empty p{font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--accent-dark)}
.toast.error{background:var(--danger)}

/* REPORT */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.report-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.report-card h4{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.report-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.report-row:last-child{border-bottom:none}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <h1>🌸 Eleya Decor</h1>
    <p>Управление на инвентар</p>
  </div>
  <nav>
    <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h7v7H3zM3 16h7v4H3zM14 3h7v4h-7zM14 9h7v11h-7z"/></svg>
      Табло
    </div>
    <div class="nav-item" onclick="showPage('products')" id="nav-products">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      Продукти
    </div>
    <div class="nav-item" onclick="showPage('movements')" id="nav-movements">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
      Движения
    </div>
    <div class="nav-item" onclick="showPage('categories')" id="nav-categories">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
      Категории
    </div>
    <div class="nav-item" onclick="showPage('reports')" id="nav-reports">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      Отчети
    </div>
  </nav>
  <div class="sidebar-bottom">
    <p>Eleya Decor · inventory</p>
  </div>
</div>

<div class="main">
  <div id="page-content"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="product-modal">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="product-modal-title">Нов продукт</h3>
      <button class="close-btn" onclick="closeModal('product-modal')">×</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Наименование *</label>
        <input type="text" id="p-name" placeholder="Напр. Кафе Арабика">
      </div>
      <div class="form-group">
        <label>SKU / Код</label>
        <input type="text" id="p-sku" placeholder="Напр. KAF-001">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Баркод</label>
        <input type="text" id="p-barcode" placeholder="8901234567890">
      </div>
      <div class="form-group">
        <label>Категория</label>
        <select id="p-category"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Количество</label>
        <input type="number" id="p-quantity" value="0" min="0">
      </div>
      <div class="form-group">
        <label>Мин. количество (алерт)</label>
        <input type="number" id="p-min-qty" value="5" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Цена (лв)</label>
        <input type="number" id="p-price" value="0" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Мерна единица</label>
        <select id="p-unit">
          <option>бр</option><option>кг</option><option>г</option>
          <option>л</option><option>мл</option><option>м</option>
          <option>кутия</option><option>пакет</option><option>бутилка</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Описание</label>
      <textarea id="p-description" rows="2" placeholder="Допълнителна информация..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('product-modal')">Отказ</button>
      <button class="btn btn-primary" onclick="saveProduct()">Запази</button>
    </div>
  </div>
</div>

<!-- MOVEMENT MODAL -->
<div class="overlay" id="movement-modal">
  <div class="modal">
    <div class="modal-hdr">
      <h3>Движение на стока</h3>
      <button class="close-btn" onclick="closeModal('movement-modal')">×</button>
    </div>
    <div class="form-group">
      <label>Продукт</label>
      <select id="m-product"></select>
    </div>
    <div class="mov-types">
      <div class="mov-type in selected" onclick="selectMovType('in')">⬆ Вход</div>
      <div class="mov-type out" onclick="selectMovType('out')">⬇ Изход</div>
      <div class="mov-type adjust" onclick="selectMovType('adjust')">⚖ Корекция</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Количество</label>
        <input type="number" id="m-quantity" value="1" min="1">
      </div>
      <div class="form-group">
        <label>Бележка</label>
        <input type="text" id="m-note" placeholder="По желание...">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('movement-modal')">Отказ</button>
      <button class="btn btn-primary" onclick="saveMovement()">Запази</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="overlay" id="category-modal">
  <div class="modal" style="width:360px">
    <div class="modal-hdr">
      <h3>Нова категория</h3>
      <button class="close-btn" onclick="closeModal('category-modal')">×</button>
    </div>
    <div class="form-group">
      <label>Наименование</label>
      <input type="text" id="c-name" placeholder="Напр. Консумативи">
    </div>
    <div class="form-group">
      <label>Цвят</label>
      <input type="color" id="c-color" value="#1D9E75" style="height:40px;padding:4px">
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('category-modal')">Отказ</button>
      <button class="btn btn-primary" onclick="saveCategory()">Запази</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://wcmtzbpdyxjgccxpxsmv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_4VSnFfBqyw2uS3zZOO9H3g_gsQCZlVE';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [], categories = [], movements = [];
let editingProductId = null, selectedMovType = 'in';
let currentPage = 'dashboard', searchQuery = '';

async function init() {
  await Promise.all([loadCategories(), loadProducts(), loadMovements()]);
  showPage('dashboard');
}

async function loadCategories() {
  const { data } = await db.from('categories').select('*').order('name');
  categories = data || [];
}

async function loadProducts() {
  const { data } = await db.from('products').select('*, categories(name,color)').order('name');
  products = data || [];
}

async function loadMovements() {
  const { data } = await db.from('movements').select('*, products(name,unit)').order('created_at', {ascending:false}).limit(100);
  movements = data || [];
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const el = document.getElementById('page-content');
  if(page === 'dashboard') renderDashboard(el);
  else if(page === 'products') renderProducts(el);
  else if(page === 'movements') renderMovementsPage(el);
  else if(page === 'categories') renderCategories(el);
  else if(page === 'reports') renderReports(el);
}

function renderDashboard(el) {
  const total = products.length;
  const lowStock = products.filter(p => p.quantity <= p.min_quantity).length;
  const outOfStock = products.filter(p => p.quantity === 0).length;
  const totalValue = products.reduce((s,p) => s + (p.price * p.quantity), 0);
  const todayMov = movements.filter(m => m.created_at?.startsWith(new Date().toISOString().slice(0,10))).length;

  el.innerHTML = `
    <div class="topbar"><h2>Табло</h2>
      <button class="btn btn-primary" onclick="openMovementModal()">+ Движение</button>
    </div>
    <div class="content">
      <div class="stats-grid">
        <div class="stat-card good">
          <div class="label">Общо продукти</div>
          <div class="value">${total}</div>
          <div class="sub">${categories.length} категории</div>
        </div>
        <div class="stat-card ${lowStock>0?'warn':'good'}">
          <div class="label">Ниски наличности</div>
          <div class="value">${lowStock}</div>
          <div class="sub">под минимума</div>
        </div>
        <div class="stat-card ${outOfStock>0?'danger':'good'}">
          <div class="label">Изчерпани</div>
          <div class="value">${outOfStock}</div>
          <div class="sub">нулево количество</div>
        </div>
        <div class="stat-card">
          <div class="label">Стойност на склада</div>
          <div class="value">${totalValue.toFixed(2)} лв</div>
          <div class="sub">${todayMov} движения днес</div>
        </div>
      </div>

      ${lowStock > 0 ? `
      <div class="table-wrap" style="margin-bottom:24px">
        <div class="table-header">
          <h3>⚠️ Ниски наличности</h3>
        </div>
        <table><thead><tr>
          <th>Продукт</th><th>Категория</th><th>Наличност</th><th>Минимум</th><th>Действие</th>
        </tr></thead><tbody>
        ${products.filter(p=>p.quantity<=p.min_quantity).map(p=>`
          <tr>
            <td><strong>${p.name}</strong>${p.sku?`<br><span style="font-size:11px;color:var(--muted)">${p.sku}</span>`:''}</td>
            <td>${p.categories?`<span class="badge" style="background:${p.categories.color}20;color:${p.categories.color}">${p.categories.name}</span>`:'—'}</td>
            <td><span class="qty-cell ${p.quantity===0?'low-stock':''}">${p.quantity} ${p.unit}</span></td>
            <td>${p.min_quantity} ${p.unit}</td>
            <td><button class="btn btn-primary btn-sm" onclick="openMovementModalFor('${p.id}')">+ Зареди</button></td>
          </tr>`).join('')}
        </tbody></table>
      </div>` : ''}

      <div class="table-wrap">
        <div class="table-header"><h3>Последни движения</h3></div>
        <div style="padding:8px 20px">
          ${movements.slice(0,10).map(m => {
            const icons = {in:'⬆',out:'⬇',adjust:'⚖'};
            const labels = {in:'Вход',out:'Изход',adjust:'Корекция'};
            return `<div class="hist-item">
              <div class="hist-icon ${m.type}">${icons[m.type]}</div>
              <div class="hist-info">
                <div class="name">${m.products?.name || '—'}</div>
                <div class="meta">${labels[m.type]} · ${m.note||''} · ${new Date(m.created_at).toLocaleString('bg')}</div>
              </div>
              <div class="hist-qty ${m.type}">${m.type==='out'?'-':'+'} ${m.quantity} ${m.products?.unit||''}</div>
            </div>`;
          }).join('') || '<div class="empty"><p>Няма движения все още</p></div>'}
        </div>
      </div>
    </div>`;
}

function renderProducts(el) {
  const filtered = products.filter(p =>
    !searchQuery || p.name.toLowerCase().includes(searchQuery) ||
    (p.sku||'').toLowerCase().includes(searchQuery) ||
    (p.barcode||'').includes(searchQuery)
  );
  el.innerHTML = `
    <div class="topbar">
      <h2>Продукти <span style="font-size:13px;color:var(--muted);font-weight:400">${filtered.length} записа</span></h2>
      <div class="search-wrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input placeholder="Търси по име, SKU, баркод..." oninput="searchQuery=this.value.toLowerCase();renderProducts(document.getElementById('page-content'))" value="${searchQuery}">
      </div>
      <button class="btn btn-primary" onclick="openProductModal()">+ Нов продукт</button>
    </div>
    <div class="content">
      <div class="table-wrap">
        <table><thead><tr>
          <th>Продукт</th><th>Категория</th><th>SKU</th><th>Наличност</th><th>Цена</th><th>Стойност</th><th>Статус</th><th>Действия</th>
        </tr></thead><tbody>
        ${filtered.length === 0 ? `<tr><td colspan="8"><div class="empty"><p>Няма намерени продукти</p></div></td></tr>` :
          filtered.map(p => {
            const status = p.quantity === 0 ? ['badge-red','Изчерпан'] : p.quantity <= p.min_quantity ? ['badge-yellow','Малко'] : ['badge-green','Наличен'];
            return `<tr>
              <td><strong>${p.name}</strong>${p.barcode?`<br><span style="font-size:11px;color:var(--muted)">🔍 ${p.barcode}</span>`:''}</td>
              <td>${p.categories?`<span class="badge" style="background:${p.categories.color}20;color:${p.categories.color}">${p.categories.name}</span>`:'<span class="badge badge-gray">—</span>'}</td>
              <td style="color:var(--muted);font-size:12px">${p.sku||'—'}</td>
              <td><span class="qty-cell ${p.quantity<=p.min_quantity?'low-stock':''}">${p.quantity} ${p.unit}</span></td>
              <td>${p.price > 0 ? p.price.toFixed(2)+' лв' : '—'}</td>
              <td style="font-weight:600">${p.price > 0 ? (p.price*p.quantity).toFixed(2)+' лв' : '—'}</td>
              <td><span class="badge ${status[0]}">${status[1]}</span></td>
              <td><div class="actions">
                <button class="icon-btn" title="Движение" onclick="openMovementModalFor('${p.id}')">⬆</button>
                <button class="icon-btn" title="Редактирай" onclick="editProduct('${p.id}')">✏️</button>
                <button class="icon-btn danger" title="Изтрий" onclick="deleteProduct('${p.id}')">🗑</button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody></table>
      </div>
    </div>`;
}

function renderMovementsPage(el) {
  el.innerHTML = `
    <div class="topbar">
      <h2>История на движенията</h2>
      <button class="btn btn-primary" onclick="openMovementModal()">+ Ново движение</button>
    </div>
    <div class="content">
      <div class="table-wrap">
        <table><thead><tr>
          <th>Дата</th><th>Продукт</th><th>Тип</th><th>Количество</th><th>Бележка</th>
        </tr></thead><tbody>
        ${movements.length === 0 ? `<tr><td colspan="5"><div class="empty"><p>Няма движения все още</p></div></td></tr>` :
          movements.map(m => {
            const types = {in:['badge-green','⬆ Вход'],out:['badge-red','⬇ Изход'],adjust:['badge-yellow','⚖ Корекция']};
            const t = types[m.type];
            return `<tr>
              <td style="font-size:12px;color:var(--muted)">${new Date(m.created_at).toLocaleString('bg')}</td>
              <td><strong>${m.products?.name||'—'}</strong></td>
              <td><span class="badge ${t[0]}">${t[1]}</span></td>
              <td class="qty-cell">${m.quantity} ${m.products?.unit||''}</td>
              <td style="color:var(--muted)">${m.note||'—'}</td>
            </tr>`;
          }).join('')}
        </tbody></table>
      </div>
    </div>`;
}

function renderCategories(el) {
  el.innerHTML = `
    <div class="topbar">
      <h2>Категории</h2>
      <button class="btn btn-primary" onclick="openCategoryModal()">+ Нова категория</button>
    </div>
    <div class="content">
      <div class="cat-grid">
        ${categories.map(c => {
          const count = products.filter(p=>p.category_id===c.id).length;
          return `<div class="cat-card">
            <div class="cat-dot" style="background:${c.color}"></div>
            <div class="cat-info">
              <h4>${c.name}</h4>
              <p>${count} продукта</p>
            </div>
            <button class="icon-btn danger" onclick="deleteCategory('${c.id}')">🗑</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderReports(el) {
  const byCategory = categories.map(c => {
    const prods = products.filter(p=>p.category_id===c.id);
    const value = prods.reduce((s,p)=>s+(p.price*p.quantity),0);
    return {name:c.name, count:prods.length, value, color:c.color};
  }).filter(c=>c.count>0).sort((a,b)=>b.value-a.value);

  const topProducts = [...products].sort((a,b)=>(b.price*b.quantity)-(a.price*a.quantity)).slice(0,10);
  const totalValue = products.reduce((s,p)=>s+(p.price*p.quantity),0);
  const totalMovIn = movements.filter(m=>m.type==='in').reduce((s,m)=>s+m.quantity,0);
  const totalMovOut = movements.filter(m=>m.type==='out').reduce((s,m)=>s+m.quantity,0);

  el.innerHTML = `
    <div class="topbar"><h2>Отчети</h2></div>
    <div class="content">
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card good"><div class="label">Обща стойност</div><div class="value">${totalValue.toFixed(2)} лв</div></div>
        <div class="stat-card"><div class="label">Всичко входове</div><div class="value">${totalMovIn}</div><div class="sub">единици</div></div>
        <div class="stat-card"><div class="label">Всичко изходи</div><div class="value">${totalMovOut}</div><div class="sub">единици</div></div>
        <div class="stat-card"><div class="label">Движения общо</div><div class="value">${movements.length}</div></div>
      </div>
      <div class="report-grid">
        <div class="report-card">
          <h4>По категории</h4>
          ${byCategory.map(c=>`
            <div class="report-row">
              <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c.color};margin-right:8px"></span>${c.name}</span>
              <span><strong>${c.value.toFixed(2)} лв</strong> · ${c.count} прод.</span>
            </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Няма данни</p>'}
        </div>
        <div class="report-card">
          <h4>Топ продукти по стойност</h4>
          ${topProducts.map((p,i)=>`
            <div class="report-row">
              <span style="color:var(--muted);margin-right:8px">${i+1}.</span>
              <span style="flex:1">${p.name}</span>
              <strong>${(p.price*p.quantity).toFixed(2)} лв</strong>
            </div>`).join('') || '<p style="color:var(--muted);font-size:13px">Няма данни</p>'}
        </div>
      </div>
    </div>`;
}

// MODALS
function openProductModal(id) {
  editingProductId = null;
  document.getElementById('product-modal-title').textContent = 'Нов продукт';
  document.getElementById('p-name').value = '';
  document.getElementById('p-sku').value = '';
  document.getElementById('p-barcode').value = '';
  document.getElementById('p-quantity').value = '0';
  document.getElementById('p-min-qty').value = '5';
  document.getElementById('p-price').value = '0';
  document.getElementById('p-description').value = '';
  populateCategorySelect('p-category', null);
  openModal('product-modal');
}

function editProduct(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  editingProductId = id;
  document.getElementById('product-modal-title').textContent = 'Редактирай продукт';
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-sku').value = p.sku||'';
  document.getElementById('p-barcode').value = p.barcode||'';
  document.getElementById('p-quantity').value = p.quantity;
  document.getElementById('p-min-qty').value = p.min_quantity;
  document.getElementById('p-price').value = p.price;
  document.getElementById('p-description').value = p.description||'';
  populateCategorySelect('p-category', p.category_id);
  openModal('product-modal');
}

function openMovementModal() {
  populateProductSelect('m-product', null);
  selectedMovType = 'in';
  document.querySelectorAll('.mov-type').forEach(el => el.classList.remove('selected'));
  document.querySelector('.mov-type.in').classList.add('selected');
  document.getElementById('m-quantity').value = '1';
  document.getElementById('m-note').value = '';
  openModal('movement-modal');
}

function openMovementModalFor(productId) {
  populateProductSelect('m-product', productId);
  selectedMovType = 'in';
  document.querySelectorAll('.mov-type').forEach(el => el.classList.remove('selected'));
  document.querySelector('.mov-type.in').classList.add('selected');
  document.getElementById('m-quantity').value = '1';
  document.getElementById('m-note').value = '';
  openModal('movement-modal');
}

function openCategoryModal() {
  document.getElementById('c-name').value = '';
  document.getElementById('c-color').value = '#1D9E75';
  openModal('category-modal');
}

function populateCategorySelect(selectId, selectedId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '<option value="">— Без категория —</option>' +
    categories.map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.name}</option>`).join('');
}

function populateProductSelect(selectId, selectedId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = products.map(p=>`<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.name} (${p.quantity} ${p.unit})</option>`).join('');
}

function selectMovType(type) {
  selectedMovType = type;
  document.querySelectorAll('.mov-type').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.mov-type.${type}`).classList.add('selected');
}

async function saveProduct() {
  const name = document.getElementById('p-name').value.trim();
  if(!name) { showToast('Въведи наименование!', 'error'); return; }
  const data = {
    name, sku: document.getElementById('p-sku').value.trim()||null,
    barcode: document.getElementById('p-barcode').value.trim()||null,
    category_id: document.getElementById('p-category').value||null,
    quantity: parseInt(document.getElementById('p-quantity').value)||0,
    min_quantity: parseInt(document.getElementById('p-min-qty').value)||5,
    price: parseFloat(document.getElementById('p-price').value)||0,
    unit: document.getElementById('p-unit').value,
    description: document.getElementById('p-description').value.trim()||null,
    updated_at: new Date().toISOString()
  };
  if(editingProductId) {
    await db.from('products').update(data).eq('id', editingProductId);
    showToast('Продуктът е обновен', 'success');
  } else {
    await db.from('products').insert(data);
    showToast('Продуктът е добавен', 'success');
  }
  closeModal('product-modal');
  await loadProducts();
  showPage(currentPage);
}

async function saveMovement() {
  const product_id = document.getElementById('m-product').value;
  const quantity = parseInt(document.getElementById('m-quantity').value)||0;
  if(!product_id || quantity <= 0) { showToast('Попълни всички полета!', 'error'); return; }
  const note = document.getElementById('m-note').value.trim();
  await db.from('movements').insert({product_id, type:selectedMovType, quantity, note:note||null});
  const p = products.find(x=>x.id===product_id);
  if(p) {
    let newQty = p.quantity;
    if(selectedMovType==='in') newQty += quantity;
    else if(selectedMovType==='out') newQty = Math.max(0, newQty - quantity);
    else newQty = quantity;
    await db.from('products').update({quantity:newQty, updated_at:new Date().toISOString()}).eq('id',product_id);
  }
  showToast('Движението е записано', 'success');
  closeModal('movement-modal');
  await Promise.all([loadProducts(), loadMovements()]);
  showPage(currentPage);
}

async function saveCategory() {
  const name = document.getElementById('c-name').value.trim();
  if(!name) { showToast('Въведи наименование!', 'error'); return; }
  const color = document.getElementById('c-color').value;
  await db.from('categories').insert({name, color});
  showToast('Категорията е добавена', 'success');
  closeModal('category-modal');
  await loadCategories();
  showPage(currentPage);
}

async function deleteProduct(id) {
  if(!confirm('Сигурен ли си, че искаш да изтриеш този продукт?')) return;
  await db.from('products').delete().eq('id', id);
  showToast('Продуктът е изтрит', 'success');
  await loadProducts();
  showPage(currentPage);
}

async function deleteCategory(id) {
  if(!confirm('Изтриване на категорията?')) return;
  await db.from('categories').delete().eq('id', id);
  showToast('Категорията е изтрита', 'success');
  await loadCategories();
  showPage(currentPage);
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

init();
</script>
</body>
</html>
